nique names, logo, or watermark\n\n[Do not use at this stage]\nFire, sparks, heat distortion, aura, chains, weapons, explosions, signature-technique effects.\nFirst make only the body motion clear.\n\n[Prohibited]\nGiant horns, no cap, wings, tail, animal ears, long hair,\nheavyweight, bodybuilder, middle-aged man, slim handsome boy,\nsword, gun, armor, fire, enemies, background scenery,\nextra arms or legs, six fingers, fused fingers, double hands,\nbroken wrists, reversed joints, flipped ankles, floating supporting leg,\nmismatched knee and foot tip, separation of foot and boot,\ncamera gaze, foreground fists or feet that look severed from the body"},{"head":"01 正面 前手直突き","kind":"block","origLang":"ja","ja":"01だけを独立した一枚として生成する。\n\nカメラは牙焔の正面。\n左脚を前、右脚を後ろへ置いた半身から、左拳で前手の直突きを放つ。\n左拳は肩から胸の高さで相手の中心へ伸ばす。\n左肘を完全に伸ばし切らない。\n右拳は頬の近くへ残して顔を守る。\n後ろ足から骨盤、背骨、左肩、左拳へ力をつなげる。\n突く拳で顔を完全に隠さない。\n正面でも両脚の前後差を残す。\n静4、動6。","en":"Generate only 01 as an independent single image.\n\nCamera at Gaen\u0027s front.\nFrom a half-body stance with the left leg forward and right leg back, throw a lead-hand straight punch with the left fist.\nExtend the left fist toward the opponent\u0027s center at shoulder-to-chest height.\nDo not fully lock out the left elbow.\nKeep the right fist near the cheek to guard the face.\nConnect the force from the rear foot to the pelvis, spine, left shoulder, and left fist.\nDo not fully hide the face with the punching fist.\nKeep the front-back leg offset even from the front.\nStillness 4, motion 6."},{"head":"02 右前方45度 後手直突き","kind":"block","origLang":"ja","ja":"02だけを独立した一枚として生成する。\n\nカメラは牙焔の右前方45度。\n左脚を前、右脚を後ろに保ち、右拳で強い後手直突きを放つ。\n右踵、右膝、骨盤、背骨、右肩、右拳を一つの螺旋へつなげる。\n左拳は顎の横へ引き、顔を守る。\n胸郭は突く方向へ回すが、骨盤から切り離さない。\n拳を前景へ出すが、肩と肘の接続を残す。\n静3、動7。","en":"Generate only 02 as an independent single image.\n\nCamera at Gaen\u0027s front-right 45 degrees.\nKeeping the left leg forward and right leg back, throw a strong rear-hand straight punch with the right fist.\nConnect the right heel, right knee, pelvis, spine, right shoulder, and right fist into one spiral.\nPull the left fist beside the chin to guard the face.\nRotate the rib cage toward the punch direction, but do not separate it from the pelvis.\nBring the fist into the foreground, but keep the shoulder and elbow connection.\nStillness 3, motion 7."},{"head":"03 右側面 踏み込み掌底","kind":"block","origLang":"ja","ja":"03だけを独立した一枚として生成する。\n\nカメラは牙焔の右側面。\n前方へ一歩踏み込みながら、左掌底を相手の胸または顎の高さへ押し込む。\n左足を着地させた直後の瞬間。\n左手首を反らしすぎず、掌根を接触点にする。\n四本の指と親指一本を明確にする。\n右拳は胸の近くへ残す。\n側面から、歩幅、骨盤の移動、背骨、肩、掌底への力線を見せる。\n静3、動7。","en":"Generate only 03 as an independent single image.\n\nCamera at Gaen\u0027s right side.\nWhile stepping one step forward, drive the left palm heel toward the opponent\u0027s chest or chin height.\nThe moment just after the left foot lands.\nDo not over-bend the left wrist; make the palm heel the contact point.\nMake the four fingers and one thumb clear.\nKeep the right fist near the chest.\nFrom the side, show the stride, pelvis movement, spine, shoulder, and the force line into the palm heel.\nStillness 3, motion 7."},{"head":"04 右後方45度 右フック","kind":"block","origLang":"ja","ja":"04だけを独立した一枚として生成する。\n\nカメラは牙焔の右後方45度。\n右拳で中段から顔の高さへの横鉤突きを放つ。\n右肘を約90度に曲げ、拳、肘、肩を同じ水平面へ置く。\n軸足、骨盤、背骨、右肩を同じ回転方向へそろえる。\n左拳は顔の近くへ残す。\n背中、肩甲骨、骨盤の回転が見える構図にする。\n腕だけを横へ振らない。\n静3、動7。","en":"Generate only 04 as an independent single image.\n\nCamera at Gaen\u0027s rear-right 45 degrees.\nThrow a horizontal hook with the right fist, from mid-level up to face height.\nBend the right elbow to about 90 degrees and place the fist, elbow, and shoulder on the same horizontal plane.\nAlign the pivot foot, pelvis, spine, and right shoulder in the same direction of rotation.\nKeep the left fist near the face.\nMake a composition where the rotation of the back, shoulder blades, and pelvis is visible.\nDo not swing only the arm sideways.\nStillness 3, motion 7."},{"head":"05 背面 左後ろ肘","kind":"block","origLang":"ja","ja":"05だけを独立した一枚として生成する。\n\nカメラは牙焔の真後ろ。\n背後または側後方へ向け、左肘を短く鋭く打ち込む。\n左肘を接触点とし、左拳は顔の近くへ畳む。\n右拳は身体の中心線を守る。\n軸足を接地し、骨盤と胸郭を左肘の方向へ回す。\n背面から肩甲骨、背骨、骨盤、支持脚の連動を見せる。\n首だけをカメラへ振り返らせない。\n視線は肘を打つ方向へ向ける。\n静4、動6。","en":"Generate only 05 as an independent single image.\n\nCamera directly behind Gaen.\nDrive a short, sharp left elbow toward the rear or rear-side.\nMake the left elbow the contact point and fold the left fist near the face.\nThe right fist guards the body\u0027s center line.\nPlant the pivot foot and rotate the pelvis and rib cage toward the left elbow\u0027s direction.\nFrom the back, show the linkage of shoulder blades, spine, pelvis, and supporting leg.\nDo not turn only the neck back toward the camera.\nDirect the gaze toward the elbow strike direction.\nStillness 4, motion 6."},{"head":"06 左後方45度 右膝蹴り","kind":"block","origLang":"ja","ja":"06だけを独立した一枚として生成する。\n\nカメラは牙焔の左後方45度。\n左脚を支持脚にし、右膝を相手の腹部へ突き上げる。\n右足は膝の下へ自然に畳む。\n左足裏を完全に接地し、左膝を軽く曲げる。\n骨盤を前へ押し出すが、上体を反らしすぎない。\n両拳は顔の近くへ残す。\nコート裾は上げた右脚と支持脚の接続を隠さない。\n静3、動7。","en":"Generate only 06 as an independent single image.\n\nCamera at Gaen\u0027s rear-left 45 degrees.\nMake the left leg the supporting leg and thrust the right knee up toward the opponent\u0027s abdomen.\nFold the right foot naturally under the knee.\nPlant the left sole fully and bend the left knee slightly.\nPush the pelvis forward, but do not over-arch the upper body.\nKeep both fists near the face.\nThe coat hem must not hide the connection between the raised right leg and the supporting leg.\nStillness 3, motion 7."},{"head":"07 左側面 左前蹴り","kind":"block","origLang":"ja","ja":"07だけを独立した一枚として生成する。\n\nカメラは牙焔の左側面。\n右脚を支持脚にし、左脚で前蹴りを放つ。\n膝を先に引き上げ、ブーツの踵または靴底で前方を押す瞬間。\n左股関節、左膝、左足首、ブーツの踵を同じ進行面へ置く。\n右足裏を完全に接地し、右膝を軽く緩める。\n両拳は胸から顔の前で中心線を守る。\n横蹴りや回し蹴りへ変化させない。\n静4、動6。","en":"Generate only 07 as an independent single image.\n\nCamera at Gaen\u0027s left side.\nMake the right leg the supporting leg and throw a front kick with the left leg.\nThe moment of raising the knee first and pushing forward with the boot\u0027s heel or sole.\nPlace the left hip, left knee, left ankle, and the boot\u0027s heel on the same plane of travel.\nPlant the right sole fully and keep the right knee slightly relaxed.\nBoth fists guard the center line in front of the chest and face.\nDo not turn it into a side kick or roundhouse kick.\nStillness 4, motion 6."},{"head":"08 左前方45度 右中段回し蹴り","kind":"block","origLang":"ja","ja":"08だけを独立した一枚として生成する。\n\nカメラは牙焔の左前方45度。\n左脚を軸足として回し、右脚で中段回し蹴りを放つ。\n右膝、右脛、ブーツの甲を同じ回転面へ置く。\n左軸足、骨盤、胸郭、右脚を同じ回転方向へそろえる。\n蹴り脚の足裏を内側へ反転させない。\n上体を倒しすぎず、左手を顔の近くへ残す。\n右腕は回転と均衡を取る位置へ流す。\nコート裾は回転と逆側へ遅れ、一つの大きな弧を描く。\n完全な水平開脚や舞踊的な姿勢にしない。\n静2、動8。","en":"Generate only 08 as an independent single image.\n\nCamera at Gaen\u0027s front-left 45 degrees.\nPivot on the left leg and throw a middle roundhouse kick with the right leg.\nPlace the right knee, right shin, and boot instep on the same plane of rotation.\nAlign the left pivot foot, pelvis, rib cage, and right leg in the same direction of rotation.\nDo not flip the sole of the kicking foot inward.\nDo not over-tilt the upper body; keep the left hand near the face.\nLet the right arm flow to a position taking rotation and balance.\nThe coat hem lags to the opposite side of the rotation, drawing one large arc.\nDo not make it a full horizontal split or dance-like posture.\nStillness 2, motion 8."}]},{"id":"p19","file":"牙焔_戦闘プロンプト.md","character":"gaen","charLabel":"牙焔（ガエン）","title":"牙焔 戦闘プロンプト","intro":"地獄炎を纏って突撃する、牙焔の戦闘イメージ生成用。\n---","blocks":[{"head":"■ Prompt","kind":"prompt","origLang":"en","ja":"牙焔（ガエン）のダイナミックなアニメ・ライトノベル風バトルイラスト。中肉中背の青年で、地獄界の喧嘩屋。荒んだ不良の雰囲気をまとい、深紅のラインが入った黒い学ラン風のロング特攻コートを着用。やや皺の寄った生地、擦れたブーツ、使い込んだ手袋、チェーンの装飾。より威圧的で荒々しい不良顔、影の落ちた目元、緊張した眉、頬に鋭い影、笑わない硬い口元、鋭い睨み。目を覆うように目深に被った黒い帽子。帽子の前方左右から、額の上に短い赤い鬼角が左右対称に突き出し、斜め上外向きに角度がつく。角はこめかみや頭頂中央には無い。低い重心で前方へ突進し、片方の拳は赤黒い地獄炎に包まれ、もう一方の腕で身体を守る。\n\n踏み込んだ足元で地面が砕け、火の粉が四方へ弾け、熱で空気が歪み、拳から暗赤色の爆発的な衝撃波が広がる。長いコートの裾は燃える影のように背後へ翻る。表情は獰猛でまっすぐ、サディスティックではなく、逃げを拒む戦士。\n\n夜の都市境界域の戦場、背景にスケイルシティのコンクリートと非常灯がわずかに見える、混みすぎない。映画的な構図、力強いシルエット、高いインパクトの動き、精緻な衣装、赤黒い炎、焦げた空気、武器を主役にしない、文字なし、ロゴなし、透かしなし。","en":"Dynamic anime light novel battle illustration of Gaen, a medium-build young adult male hell-realm brawler with a rough street-delinquent presence in a black gakuran-inspired long delinquent coat with deep crimson lines, slightly rumpled fabric, scuffed boots, used gloves, and chain details. He has a stronger intimidating face, rougher delinquent face, shadowed eyes, tense brows, sharp cheek shadows, hard unsmiling mouth, and a hard glare. He wears a low black cap pulled down over his eyes. Two short red oni horns protrude symmetrically from the front-left and front-right area of the cap, above the forehead, angled upward and outward; the horns are not on the temples or top center. He is charging forward with a low center of gravity, one fist wreathed in red-black hellfire, the other arm guarding his body.\n\nThe ground cracks under his step, ember sparks burst outward, heat distortion bends the air, and a dark red explosive shockwave rolls from his fist. His long coat tails flare behind him like burning shadows. His expression is fierce and direct, not sadistic, a fighter who refuses to run.\n\nUrban boundary-zone battlefield at night, hints of Scale City concrete and emergency lights in the background, not too crowded. Cinematic composition, strong silhouette, high-impact motion, detailed clothing, red-black fire, scorched air, no weapon focus, no text, no logo, no watermark."},{"head":"■ Negative Prompt","kind":"negative","origLang":"en","ja":"邪悪な魔王、中世の鎧、巨大な剣、銃、槍、青い魔法、聖なる天使の光、こめかみの角、頭頂中央の角、非対称の角、片方だけの角、巨大な角、翼、尻尾、獣耳、細く優美な身体、柔らかく優しい顔、丸くかわいい目、清潔なアイドル顔、美少年顔、中性的な綺麗な少年、優雅な王子、洗練された紳士、上品な貴族、整いすぎた礼服、上級軍服、アイドル風、ホスト風、ファッションモデルのポーズ、笑う悪役、怪物への変身、過剰な流血、完全な怪物の顔、過剰装飾の鎧、見切れた身体、読み取れないシルエット、文字、ロゴ、透かし、ぼやけ、余分な手足、歪んだ手","en":"evil demon king, medieval armor, giant sword, gun, spear, blue magic, holy angel light, horns on temples, horns on top center of head, asymmetrical horns, one horn, huge horns, wings, tail, animal ears, slender elegant body, soft gentle face, round cute eyes, clean idol face, bishonen face, androgynous pretty boy, elegant prince, refined gentleman, graceful noble, polished formal uniform, high-class military uniform, idol look, host-club look, fashion model pose, smiling villain, monster transformation, excessive gore, full monster face, overdesigned armor, cropped body, unreadable silhouette, text, logo, watermark, blurry, extra limbs, distorted hands"},{"head":"■ クリーンアニメ品質ルール","kind":"block","origLang":"en","ja":"滑らかでクリーンなアニメイラスト、フラットカラー、セルシェーディング、柔らかなグラデーション、連続した色調、クリーンな線画、シャープだが鋭すぎない線、ノイズなし、グレインなし、ピクセル化なし、モザイクノイズなし、崩れたテクスチャなし、ディザリングなし、抑制されたディテール、不要な微細ディテールを最小限に、バランスのとれた構図、高解像度","en":"smooth clean anime illustration, flat colors, cel shading, soft gradients, continuous color tones, clean line art, sharp but not overly sharp lines, no noise, no grain, no pixelation, no mosaic artifacts, no broken textures, no dithering, controlled details, minimal unnecessary micro-detail, balanced composition, high resolution"},{"head":"■ クリーンアニメ品質ルール","kind":"block","origLang":"en","ja":"ノイズ、グレイン、ざらついたテクスチャ、ピクセル化、モザイクノイズ、崩れたテクスチャ、ディザリング、過度に強調された輪郭、過剰な微細ディテール、雑な線画、混沌とした構図、低解像度","en":"noise, grain, gritty texture, pixelation, mosaic artifacts, broken texture, dithering, over-sharpened edges, excessive micro-detail, messy linework, chaotic composition, low resolution"}]},{"id":"p20","file":"牙焔_戦闘構図ガイド.md","character":"gaen","charLabel":"牙焔（ガエン）","title":"牙焔 戦闘構図ガイド","intro":"牙焔の戦闘イラストを生成するときに、再現性の高かった構図と確認事項をまとめた資料。\nノベルゲーム用の横長画像と、後から背景へ合成する白背景素材を前提とする。\n- 画面比率は原則 `16:9` の横長。\n- 背景は均一な白。床、地平線、影、グラデーションを描かない。\n- 敵や人型の標的は描かない。\n- 黒、深紅、暗い赤を中心とし、黄色や橙色の炎は抑える。\n- 帽子、角、片目を隠す黒髪、赤い目、ロングコート、手袋、ブーツを維持する。\n- 技のエフェクトは使用してよいが、顔、手、足、関節を隠さない。\n- [爆炎踏破](../03_outputs/牙焔_戦闘04_爆炎踏破_白背景.png)\n  - 高めの三四分視点で、踏み足、支持脚、骨盤の荷重関係が読みやすい。\n  - 円形エフェクトを足元へ限定すると、全身の輪郭を保ちやすい。\n- [炎鎧・受けの型](../03_outputs/牙焔_戦闘05_炎鎧受けの型_白背景.png)\n  - 正面寄りの構図は、防御姿勢と表情を同時に見せやすい。\n  - 交差腕は左右を独立して描き、手首、肘、肩の順で接続を確認する。\n- [瞬火・高速接近](../03_outputs/牙焔_戦闘06_瞬火高速接近_白背景.png)\n  - 低い三四分視点と対角線移動で速度を表現できる。\n  - 前脚の膝と足先を進行方向へ揃え、接地手の掌を前下方へ向ける。\n- [墜炎・空中急襲](../03_outputs/牙焔_戦闘09_墜炎空中急襲_白背景.png)\n  - 拳、肩、背骨を一本の荷重線として描くと落下方向が明確になる。\n  - 両脚は前後に分け、交差や内向きの足先を避ける。\n- [炎獣形意拳・顎門](../03_outputs/牙焔_戦闘07B_炎獣形意拳・顎門_正面_白背景.png)\n  - 人物を正面中央へ置き、上下の腕と炎顎で縦方向の挟撃を表現する。\n  - 上の掌は下向き、下の掌は上向き。両手が同じ空間を挟むようにする。\n- [黒陽爆界](../03_outputs/牙焔_戦闘10_黒陽爆界_白背景.png)\n  - 静止した人物と巨大な円形エフェクトの対比が奥義表現に向く。\n  - 炎輪は人物の背後へ分離し、角、帽子、身体と接触させない。\n鎖、鞭、長布などは、複数の経路や交差を一度に指定すると分断、分岐、融合が起きやすい。\n武器の経路は文章ではなく、一本の順序として定義する。","blocks":[{"head":"長い武器の原則","kind":"block","origLang":"ja","ja":"握り手 -\u003e 小さい連続リンク -\u003e 中距離のリンク -\u003e 大きい前景リンク -\u003e 画面外","en":"grip hand -\u003e small continuous links -\u003e mid-range links -\u003e large foreground link -\u003e off-screen"},{"head":"顎門の手","kind":"block","origLang":"ja","ja":"上の手: 頭上、掌は下向き、指先は挟撃中心へ\n下の手: 腰下、掌は上向き、指先は同じ挟撃中心へ","en":"Upper hand: above the head, palm facing down, fingertips toward the pincer center.\nLower hand: below the waist, palm facing up, fingertips toward the same pincer center."},{"head":"プロンプト記述テンプレート","kind":"prompt","origLang":"ja","ja":"画面:\n16:9横長、均一な白背景、敵なし。\n\n身体:\n人物の位置、カメラ角度、胸と骨盤の向き、支持脚、進行方向を指定。\n\n手足:\n左右を明記し、肩・肘・手首、股関節・膝・足首の順で向きを指定。\n開いた手は四本指と親指一本。膝と足先は同じ方向。\n\n武器:\n握り手から終端まで、一本の連続経路を矢印順で指定。\n交差、分岐、背後への回り込み、腰への接続は禁止。\n\n遠近:\n奥の人物 -\u003e 小さい武器要素 -\u003e 中距離 -\u003e 大きい前景 -\u003e 画面外。\n\nエフェクト:\n武器や身体の運動方向へ沿わせる。\n顔、手、足、接続部を隠さない。","en":"Screen:\n16:9 landscape, uniform white background, no enemies.\n\nBody:\nSpecify the figure\u0027s position, camera angle, orientation of chest and pelvis, supporting leg, and direction of travel.\n\nLimbs:\nState left and right explicitly; specify orientation in order of shoulder-elbow-wrist and hip-knee-ankle.\nOpen hands have four fingers and one thumb. The knee and foot tip point the same direction.\n\nWeapon:\nSpecify a single continuous path from the grip hand to the free end, in arrow order.\nNo crossing, branching, wrapping behind the body, or connecting to the waist.\n\nPerspective:\nFigure in back -\u003e small weapon element -\u003e mid-range -\u003e large foreground -\u003e off-screen.\n\nEffect:\nAlign it with the direction of motion of the weapon or body.\nDo not hide the face, hands, feet, or connection points."}]},{"id":"p21","file":"牙焔_戦闘構図プロンプト.md","character":"gaen","charLabel":"牙焔（ガエン）","title":"牙焔 戦闘構図プロンプト","intro":"牙焔の戦闘時ビジュアルを作るためのプロンプト。\n---\n- 戦闘シーンイラスト\n- 表紙・挿絵候補\n- 能力演出確認\n---","blocks":[{"head":"■ 日本語プロンプト","kind":"prompt","origLang":"ja","ja":"牙焔（ガエン）の戦闘シーン。\n\n黒基調の学ラン風特攻服、深紅ライン、長いコート裾、目深に被った帽子、帽子から短く突き出る鬼角。鋭い目つきの20代前半男性。筋肉質で、低い重心から真正面へ突撃する前衛戦闘員。\n\n赤黒い地獄炎を全身に薄くまとい、拳撃で前方へ踏み込む瞬間。炎を推進力にして床を砕き、火花と熱歪みが周囲に広がる。攻撃的だが、暴走ではなく制御された火力。視線は敵を真正面から捉えている。\n\n背景はスケイルシティの温室街または暗い管理局封鎖区域。床に焼け跡、空気に熱歪み。牙焔のシルエットと表情が明確に見える構図。\n\n高品質な日本アニメ・ライトノベル挿絵風。ダイナミックな構図。画像内に文字なし。","en":"Battle scene of Gaen.\n\nA black-based gakuran-style delinquent coat with deep crimson lines and a long coat hem, a cap worn low over the eyes, and short oni horns protruding from the cap. A sharp-eyed male in his early twenties. Muscular, a frontline fighter charging straight ahead from a low center of gravity.\n\nHe wraps his whole body in a thin layer of red-black hellfire, at the instant of stepping forward into a punch. Using the flame as propulsion, he shatters the floor, and sparks and heat distortion spread around him. Aggressive but controlled firepower, not a berserk rampage. His gaze locks onto the enemy straight ahead.\n\nBackground: the greenhouse district of Scale City, or a dark sealed-off management bureau zone. Scorch marks on the floor, heat distortion in the air. A composition where Gaen\u0027s silhouette and expression are clearly visible.\n\nHigh-quality Japanese anime / light novel illustration style. Dynamic composition. No text in the image."},{"head":"■ English prompt","kind":"prompt","origLang":"en","ja":"WORLD ECLIPSE の牙焔（ガエン）のダイナミックなバトルイラスト。\n\n鋭い目つきの青年男性で、地獄界の前衛戦闘員。深紅のラインが入った黒い学ラン風のロングコート制服、目深に被った帽子、帽子から突き出る短い鬼角、長いコートの裾を身につける。筋肉質だが大きすぎない。低い重心で、まっすぐ前方へ突進する。\n\n彼は前方へ踏み込んで拳を放つところで、制御された赤黒い地獄炎に包まれている。炎を推進力として使い、足元の床を砕く。火花、熱歪み、火の粉の軌跡、圧力波が彼を取り巻く。表情は獰猛でまっすぐ、悪役的でも無思慮でもない。\n\n背景：スケイルシティの温室街、または暗い管理局の封鎖区域。焦げた床の跡と揺らめく熱。顔、シルエット、衣装、短い角がはっきり見えるように保つ。\n\n高品質な日本のアニメ・ライトノベル風アクションイラスト、ダイナミックな遠近、文字なし、透かしなし。","en":"Dynamic battle illustration of Gaen from WORLD ECLIPSE.\n\nA sharp-eyed young adult male Hell Realm frontline fighter wearing a black gakuran-inspired long coat uniform with deep crimson lines, a low-worn cap, short oni horns protruding from the cap, and a long coat hem. Muscular but not oversized. Low center of gravity, charging straight ahead.\n\nHe is stepping forward into a punch, wrapped in controlled red-black hellfire. The flame is used as propulsion, cracking the floor beneath him. Sparks, heat distortion, ember trails, and pressure waves surround him. His expression is fierce and direct, not villainous or mindless.\n\nBackground: Scale City greenhouse district or a dark management bureau sealed area, with scorched floor marks and shimmering heat. Keep his face, silhouette, outfit, and short horns clearly visible.\n\nHigh-quality Japanese anime / light novel action illustration, dynamic perspective, no text, no watermark."},{"head":"■ ネガティブ指定","kind":"negative","origLang":"en","ja":"文字なし、透かしなし、ロゴなし、余分なキャラクターなし、巨大な悪魔の角なし、翼なし、完全な悪魔変身なし、流血なし、剣なし、銃なし、フル装甲なし、SF的な鎧なし、炎で顔が隠れない、キャラクターを覆う制御不能な爆発なし、コメディ調の不良パロディなし","en":"no text, no watermark, no logo, no extra characters, no huge demon horns, no wings, no full demon transformation, no gore, no sword, no gun, no full armor, no sci-fi armor, no face hidden by fire, no uncontrolled explosion obscuring the character, no comedy delinquent parody"}]},{"id":"p22","file":"牙焔_日常プロンプト.md","character":"gaen","charLabel":"牙焔（ガエン）","title":"牙焔 日常プロンプト","intro":"牙焔の「乱暴な優しさ」を見せる日常・情緒絵用。\n---","blocks":[{"head":"■ Prompt","kind":"prompt","origLang":"en","ja":"牙焔（ガエン）のアニメ・ライトノベル風キャラクターシーン。地獄界の喧嘩屋の青年で、見た目は明らかに20代前半、中肉中背、平均〜引き締まった体型、鍛えてはいるが筋肉質すぎない。鋭く威圧的な目、より硬い睨み、緊張した眉、荒々しい不良顔、影の落ちた目元、笑わない硬い口元、荒んだ不良の雰囲気。深紅のアクセントが入った黒い学ラン風のロング特攻コート、やや皺の寄った生地、擦れたブーツ、使い込んだ黒い手袋、目深の黒い帽子。帽子の前方左右から、額の上に短い赤い鬼角が左右対称に突き出し、斜め上外向きに角度がつく。彼はスケイルシティの温室街で、明るい昼間または夕方前の日常シーンの中、暖かい温室のパイプの脇に座るかしゃがみ、最大でも2〜3匹の小さな野良動物を不器用に餌付けするか守っている。姿勢は荒っぽく身構えており、少し猫背で挑戦的だが、手つきは優しい。\n\n彼の周りにはかすかな残り火の光だけが漂い、戦闘シーンではない。雰囲気は暖かく明るく穏やかで、透明な温室のガラス、柔らかな日差し、淡い緑の植物、暖かいパイプ、優しい反射、澄んだ空気がある。表情は照れくさそうでぶっきらぼうで、自分の優しさを誰にも気づかれたくないかのよう。\n\n精緻なアニメイラスト、地に足のついた都市ファンタジーの日常的な雰囲気、明るい温室の背景に映える黒と深紅の衣装、ほのかな熱の揺らめき、情緒的だが感傷的すぎない、文字なし、ロゴなし、透かしなし。","en":"Anime light novel character scene of Gaen, a young adult male hell-realm brawler, clearly early twenties in appearance, medium build, average-to-fit body type, toned but not muscular, sharp intimidating eyes, harder glare, tense brows, rougher delinquent face, shadowed eyes, hard unsmiling mouth, rough street-delinquent presence, wearing a black gakuran-inspired long delinquent coat with deep crimson accents, slightly rumpled fabric, scuffed boots, used black gloves, and a low black cap. Two short red oni horns protrude symmetrically from the front-left and front-right area of the cap, above the forehead, angled upward and outward. He is sitting or crouching beside warm greenhouse pipes during a bright daytime or late-afternoon daily scene in Scale City\u0027s greenhouse district, awkwardly feeding or protecting two or three small stray animals at most. His posture is rough and guarded, a little slouched and confrontational, but his hand is gentle.\n\nOnly a faint ember glow remains around him, not a battle scene. The atmosphere is warm, bright, and calm, with clear greenhouse glass, soft sunlight, pale green plants, warm pipes, gentle reflections, and clean air. His expression is embarrassed and gruff, as if he does not want anyone to notice his kindness.\n\nDetailed anime illustration, grounded urban fantasy daily-life mood, black and crimson outfit against a brighter greenhouse background, subtle heat shimmer, emotional but <script>

const REF_IMAGES = {

};
const CHAR_ORDER = [['xiaoling','小鈴（シャオリン）'],['gaen','牙焔（ガエン）'],['lifan','リーファン'],['common','共通・ワークフロー']];
const KIND_LABEL = {prompt:'プロンプト', negative:'ネガティブ', block:'ブロック'};
let glang = localStorage.getItem('glang') || 'ja';
let current = null;
let query = '';

function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function countKinds(f){let p=0,n=0,b=0;f.blocks.forEach(x=>{if(x.kind==='prompt')p++;else if(x.kind==='negative')n++;else b++;});return{p,n,b};}
function isBoth(){return glang==='both';}
function copyLang(){return isBoth()?'both':(glang==='en'?'en':'ja');}
function copyLangLabel(){return glang==='en'?'英語':(isBoth()?'日英':'日本語');}
function blockBodyText(b,l){
  if(l==='both') return '【日本語】\n'+(b.ja||'')+'\n\n【English】\n'+(b.en||'');
  return b[l]||'';
}
function isOperationalBlock(b){
  if(b.kind!=='block') return false;
  const h=(b.head||'').toLowerCase();
  const patterns=[
    'gif','フレーム','生成後チェック','チェック','保存','管理','修正運用','運用',
    '次段階','出力方法','使用する参考画像','参考画像の役割'
  ];
  return patterns.some(p=>h.includes(p.toLowerCase()));
}
function generationSupportBlocks(f){
  return f.blocks.filter(b=>b.kind==='block' && !isOperationalBlock(b));
}
function formatBlockText(b,l,withKind=true){
  const kind=withKind?' ['+KIND_LABEL[b.kind]+']':'';
  return '## '+(b.head||KIND_LABEL[b.kind])+kind+'\n'+blockBodyText(b,l);
}
function formatBlocks(blocks,l,withKind=true){
  return blocks.map(b=>formatBlockText(b,l,withKind)).join('\n\n----\n\n');
}
function formatGenerationSet(f,l){
  const parts=['# '+f.title,'file: '+f.file];
  const prompts=f.blocks.filter(b=>b.kind==='prompt');
  const negatives=f.blocks.filter(b=>b.kind==='negative');
  const support=generationSupportBlocks(f);
  const groups=[
    [prompts,'PROMPT'],
    [negatives,'NEGATIVE PROMPT'],
    [support,(prompts.length||negatives.length)?'SUPPORT BLOCKS':'PROMPT BLOCKS']
  ];
  groups.forEach(([blocks,label])=>{
    if(!blocks.length) return;
    parts.push('## '+label+'\n'+blocks.map(b=>'### '+(b.head||KIND_LABEL[b.kind])+'\n'+blockBodyText(b,l)).join('\n\n'));
  });
  return parts.join('\n\n');
}
function formatPromptPlusBlock(f,b,l){
  const prompts=f.blocks.filter(x=>x.kind==='prompt');
  const negatives=f.blocks.filter(x=>x.kind==='negative');
  const parts=['# '+f.title+' / '+(b.head||KIND_LABEL[b.kind]),'file: '+f.file];
  if(prompts.length) parts.push('## PROMPT\n'+prompts.map(x=>'### '+(x.head||KIND_LABEL[x.kind])+'\n'+blockBodyText(x,l)).join('\n\n'));
  parts.push('## SELECTED BLOCK\n### '+(b.head||KIND_LABEL[b.kind])+'\n'+blockBodyText(b,l));
  if(negatives.length) parts.push('## NEGATIVE PROMPT\n'+negatives.map(x=>'### '+(x.head||KIND_LABEL[x.kind])+'\n'+blockBodyText(x,l)).join('\n\n'));
  return parts.join('\n\n');
}
function formatAllGeneration(l){
  return DATA.map(f=>formatGenerationSet(f,l)).join('\n\n========\n\n');
}
function refsFor(f,b){
  return REF_IMAGES[f.file+'::'+(b.head||'')] || [];
}
function refsHTML(f,b){
  const refs=refsFor(f,b);
  if(!refs.length) return '';
  return '<div class="refs">'+refs.map((r,idx)=>
    '<div class="ref-card">'+
      '<img src="'+esc(r.src)+'" alt="'+esc(r.title)+'">'+
      '<div class="ref-meta">'+
        '<span class="ref-title">'+esc(r.title)+'</span>'+
        '<div>'+esc(r.role)+'</div>'+
        '<div>判定: '+esc(r.status)+'</div>'+
        '<div class="ref-actions">'+
          '<button class="copy" data-copy-img="'+idx+'">画像コピー</button>'+
          '<button class="copy" data-copy-img-path="'+idx+'">パスコピー</button>'+
        '</div>'+
      '</div>'+
    '</div>'
  ).join('')+'</div>';
}

function matches(f){
  if(!query) return true;
  const q=query.toLowerCase();
  if(f.title.toLowerCase().includes(q)||f.file.toLowerCase().includes(q)||(f.intro||'').toLowerCase().includes(q)) return true;
  return f.blocks.some(b=>(b.ja+' '+b.en+' '+(b.head||'')).toLowerCase().includes(q));
}

function renderNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML='';
  let shown=0;
  CHAR_ORDER.forEach(([cid,clabel])=>{
    const items=DATA.filter(f=>f.character===cid && matches(f));
    if(!items.length) return;
    const g=document.createElement('div');g.className='grp';g.textContent=clabel;
    g.style.color='var(--'+cid+')';
    nav.appendChild(g);
    items.forEach(f=>{
      shown++;
      const k=countKinds(f);
      const btn=document.createElement('button');
      btn.className='nav-item'+(current===f.id?' active':'');
      btn.innerHTML='<span class="t">'+esc(f.title)+'</span><span class="c">'+
        (k.p?'<span class="pill p">P'+k.p+'</span>':'')+
        (k.n?'<span class="pill n">N'+k.n+'</span>':'')+
        (k.b?'<span class="pill b">'+k.b+'</span>':'')+'</span>';
      btn.onclick=()=>{location.hash=encodeURIComponent(f.id);};
      nav.appendChild(btn);
    });
  });
  if(!shown){nav.innerHTML='<div class="grp">該当なし</div>';}
  document.getElementById('hcount').textContent='全'+DATA.length+'件・'+DATA.reduce((a,f)=>a+f.blocks.length,0)+'ブロック';
}

function paneHTML(b){
  const wrap=(l)=>'<pre class="body '+l+'" data-lang="'+l+'">'+esc(b[l])+'</pre>';
  if(isBoth()) return '<div data-pane>'+wrap('ja')+wrap('en')+'</div>';
  const l=(glang==='en')?'en':'ja';
  return '<div data-pane>'+wrap(l)+'</div>';
}

function blockHTML(f,b,i){
  const skip=isOperationalBlock(b);
  const seg = isBoth()? '' :
    '<div class="seg" data-seg>'+
      '<button data-bl="ja" class="'+(glang==='en'?'':'on')+'">日本語</button>'+
      '<button data-bl="en" class="'+(glang==='en'?'on':'')+'">English</button>'+
    '</div>';
  return '<div class="block" data-block="'+i+'">'+
    '<div class="block-head">'+
      '<span class="h">'+esc(b.head||'')+'</span>'+
      '<span class="badge '+b.kind+'">'+KIND_LABEL[b.kind]+'</span>'+
      (skip?'<span class="badge skip">生成用から除外</span>':'')+
      '<span class="orig">原文:'+(b.origLang==='ja'?'日本語':'英語')+'</span>'+
      '<span class="bh-spacer"></span>'+seg+
      '<button class="copy" data-copy-combo style="display:none">共通+コピー</button>'+
      '<button class="copy" data-copy>📋 コピー</button>'+
    '</div>'+paneHTML(b)+refsHTML(f,b)+'</div>';
}

function renderDoc(f){
  const m=document.getElementById('main');
  if(!f){m.innerHTML='<div class="empty">左の一覧からプロンプトを選んでください。</div>';return;}
  const cl=CHAR_ORDER.find(c=>c[0]===f.character);
  m.innerHTML=
    '<div class="doc-head">'+
      '<span class="doc-char" style="background:var(--'+f.character+')">'+(cl?cl[1]:f.character)+'</span>'+
      '<h2 class="doc-title">'+esc(f.title)+'</h2>'+
      '<div class="doc-file">02_prompts / '+esc(f.file)+'</div>'+
    '</div>'+
    (f.intro?'<div class="intro">'+esc(f.intro)+'</div>':'')+
    '<div class="pagebar">'+
      '<button class="btn primary" id="copyGenSet">📋 生成用セットをコピー（運用メモ除外・'+copyLangLabel()+'）</button>'+
      '<button class="btn" id="copyAllP">プロンプト本文だけコピー</button>'+
      '<button class="btn" id="copyAll">全ブロックをコピー（資料確認用）</button>'+
    '</div>'+
    f.blocks.map((b,i)=>blockHTML(f,b,i)).join('');

  m.querySelectorAll('[data-block]').forEach(el=>{
    const idx=+el.getAttribute('data-block');
    const b=f.blocks[idx];
    const seg=el.querySelector('[data-seg]');
    if(seg){
      seg.querySelectorAll('button').forEach(btn=>{
        btn.onclick=()=>{
          const l=btn.getAttribute('data-bl');
          seg.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===btn));
          el.querySelector('[data-pane]').innerHTML='<pre class="body '+l+'" data-lang="'+l+'">'+esc(b[l])+'</pre>';
        };
      });
    }
    el.querySelector('[data-copy]').onclick=(ev)=>{
      let txt;
      if(isBoth()){txt='【日本語】\n'+b.ja+'\n\n【English】\n'+b.en;}
      else{txt=el.querySelector('pre.body').textContent;}
      copy(txt,ev.currentTarget);
    };
    const combo=el.querySelector('[data-copy-combo]');
    const hasPrompt=f.blocks.some(x=>x.kind==='prompt');
    if(combo && b.kind==='block' && !isOperationalBlock(b) && hasPrompt){
      combo.style.display='';
      combo.onclick=(ev)=>copy(formatPromptPlusBlock(f,b,copyLang()),ev.currentTarget);
    }
    const refs=refsFor(f,b);
    el.querySelectorAll('[data-copy-img]').forEach(btn=>{
      btn.onclick=(ev)=>{
        const ref=refs[+btn.getAttribute('data-copy-img')];
        copyImage(ref.src,ev.currentTarget);
      };
    });
    el.querySelectorAll('[data-copy-img-path]').forEach(btn=>{
      btn.onclick=(ev)=>{
        const ref=refs[+btn.getAttribute('data-copy-img-path')];
        copy(new URL(ref.src, location.href).href,ev.currentTarget);
      };
    });
  });

  const genSet=m.querySelector('#copyGenSet');
  genSet.onclick=(ev)=>{
    copy(formatGenerationSet(f,copyLang()),ev.currentTarget);
  };
  const allP=m.querySelector('#copyAllP');
  allP.onclick=(ev)=>{
    const l=copyLang();
    const ps=f.blocks.filter(b=>b.kind==='prompt');
    const src=ps.length?ps:f.blocks;
    const txt=formatBlocks(src,l,false);
    copy(txt,ev.currentTarget);
  };
  const allB=m.querySelector('#copyAll');
  allB.onclick=(ev)=>{
    const l=copyLang();
    const txt=formatBlocks(f.blocks,l,true);
    copy(txt,ev.currentTarget);
  };
  window.scrollTo(0,0);
}

function copy(text,btn){
  const ok=()=>{toast('コピーしました');if(btn&&(btn.classList.contains('copy')||btn.classList.contains('btn')||btn.classList.contains('topcopy'))){const o=btn.innerHTML;btn.classList.add('done');btn.innerHTML='✓ コピー済み';setTimeout(()=>{btn.classList.remove('done');btn.innerHTML=o;},1300);}};
  const fb=()=>{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');ok();}catch(e){toast('コピーできませんでした');}ta.remove();};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(ok,fb);}else{fb();}
}
function copyImage(src,btn){
  const ok=()=>{toast('画像をコピーしました');if(btn){const o=btn.innerHTML;btn.classList.add('done');btn.innerHTML='✓ コピー済み';setTimeout(()=>{btn.classList.remove('done');btn.innerHTML=o;},1300);}};
  const fallback=()=>copy(new URL(src, location.href).href,btn);
  if(!navigator.clipboard || !window.ClipboardItem){fallback();return;}
  const img=new Image();
  img.onload=()=>{
    try{
      const canvas=document.createElement('canvas');
      canvas.width=img.naturalWidth;
      canvas.height=img.naturalHeight;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0);
      canvas.toBlob(blob=>{
        if(!blob){fallback();return;}
        navigator.clipboard.write([new ClipboardItem({'image/png':blob})]).then(ok,fallback);
      },'image/png');
    }catch(e){fallback();}
  };
  img.onerror=fallback;
  img.src=src;
}
let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1500);}

function setGlang(l){
  glang=l;localStorage.setItem('glang',l);
  document.querySelectorAll('#glang button').forEach(b=>b.classList.toggle('on',b.getAttribute('data-l')===l));
  renderDoc(DATA.find(f=>f.id===current)||null);
}

function route(){
  const id=decodeURIComponent(location.hash.slice(1));
  current=id||null;
  renderNav();
  renderDoc(DATA.find(x=>x.id===id)||null);
  if(window.innerWidth<=820) document.getElementById('nav').classList.remove('open');
}

document.querySelectorAll('#glang button').forEach(b=>b.onclick=()=>setGlang(b.getAttribute('data-l')));
document.getElementById('copyAllGeneration').onclick=(ev)=>copy(formatAllGeneration(copyLang()),ev.currentTarget);
document.getElementById('search').oninput=(e)=>{query=e.target.value.trim();renderNav();};
document.getElementById('hamb').onclick=()=>document.getElementById('nav').classList.toggle('open');
window.addEventListener('hashchange',route);
document.querySelectorAll('#glang button').forEach(b=>b.classList.toggle('on',b.getAttribute('data-l')===glang));
route();
</script>
</body>
