<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロンプトビューアー｜モデルイラスト生成ワークフロー</title>
<style>
  :root{
    --bg:#f6f5f2; --panel:#ffffff; --ink:#23201c; --sub:#7c756c; --line:#e6e2db;
    --accent:#9a6a3a; --accent-soft:#f0e7dc;
    --green:#2f8a52; --green-bg:#e9f6ee; --red:#c0432f; --red-bg:#fbecea; --gray:#6b7280; --gray-bg:#eef0f2;
    --xiaoling:#c23a63; --gaen:#c0432f; --lifan:#2e7d36; --common:#3a6ea5;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;background:var(--bg);color:var(--ink);}
  header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:14px;padding:10px 18px;flex-wrap:wrap;}
  header h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.02em;white-space:nowrap;}
  header .meta{color:var(--sub);font-size:12px;}
  .spacer{flex:1;}
  .search{position:relative;}
  .search input{width:230px;max-width:48vw;padding:7px 12px 7px 30px;border:1px solid var(--line);border-radius:999px;font-size:13px;background:#fff;color:var(--ink);}
  .search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);opacity:.45;}
  .langtoggle{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;}
  .langtoggle button{border:none;background:#fff;color:var(--sub);padding:6px 12px;font-size:12px;cursor:pointer;}
  .langtoggle button.on{background:var(--accent);color:#fff;}
  .topcopy{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer;white-space:nowrap;}
  .topcopy:hover{border-color:var(--accent);color:var(--accent);}
  .topcopy.done{background:var(--green);border-color:var(--green);color:#fff;}

  .layout{display:flex;min-height:calc(100vh - 53px);}
  aside{width:300px;flex-shrink:0;border-right:1px solid var(--line);background:#fbfaf8;overflow-y:auto;height:calc(100vh - 53px);position:sticky;top:53px;}
  .grp{padding:14px 14px 4px;font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.08em;}
  .nav-item{display:block;width:100%;text-align:left;border:none;background:none;cursor:pointer;padding:9px 14px;border-left:3px solid transparent;color:var(--ink);}
  .nav-item:hover{background:var(--accent-soft);}
  .nav-item.active{background:#fff;border-left-color:var(--accent);}
  .nav-item .t{font-size:13.5px;line-height:1.4;display:block;}
  .nav-item .c{font-size:11px;color:var(--sub);margin-top:3px;display:flex;gap:5px;align-items:center;}
  .pill{display:inline-block;font-size:10px;line-height:1;padding:3px 6px;border-radius:999px;font-weight:700;}
  .pill.p{background:var(--green-bg);color:var(--green);}
  .pill.n{background:var(--red-bg);color:var(--red);}
  .pill.b{background:var(--gray-bg);color:var(--gray);}

  main{flex:1;min-width:0;padding:26px 30px 80px;overflow-x:hidden;}
  .doc-head{margin-bottom:6px;}
  .doc-char{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;color:#fff;margin-bottom:10px;}
  .doc-title{font-size:24px;margin:0 0 6px;font-weight:800;line-height:1.3;}
  .doc-file{font-size:12px;color:var(--sub);font-family:ui-monospace,Menlo,Consolas,monospace;}
  .intro{background:var(--accent-soft);border-radius:12px;padding:14px 18px;margin:16px 0 26px;font-size:13.5px;line-height:1.8;white-space:pre-wrap;color:#5a4a38;}
  .pagebar{display:flex;gap:10px;align-items:center;margin:0 0 20px;flex-wrap:wrap;}
  .btn{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn.primary:hover{filter:brightness(1.05);color:#fff;}
  .btn.done{background:var(--green);border-color:var(--green);color:#fff;}

  .block{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:18px;overflow:hidden;}
  .block-head{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .block-head .h{font-size:14px;font-weight:700;}
  .badge{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px;}
  .badge.prompt{background:var(--green-bg);color:var(--green);}
  .badge.negative{background:var(--red-bg);color:var(--red);}
  .badge.block{background:var(--gray-bg);color:var(--gray);}
  .badge.skip{background:#fff3cd;color:#8a6400;border:1px solid #f3d98b;}
  .orig{font-size:10.5px;color:var(--sub);}
  .bh-spacer{flex:1;}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;}
  .seg button{border:none;background:#fff;color:var(--sub);padding:5px 11px;font-size:12px;cursor:pointer;}
  .seg button.on{background:var(--ink);color:#fff;}
  .copy{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:7px;padding:5px 11px;font-size:12px;cursor:pointer;display:inline-flex;gap:5px;align-items:center;}
  .copy:hover{border-color:var(--accent);color:var(--accent);}
  .copy.done{background:var(--green);border-color:var(--green);color:#fff;}
  pre.body{margin:0;padding:16px 18px;font-family:ui-monospace,Menlo,Consolas,"Courier New",monospace;font-size:13px;line-height:1.7;
    white-space:pre-wrap;word-break:break-word;color:#2b2722;background:#fcfbf9;}
  pre.body.ja{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;}
  pre.body+pre.body{border-top:1px dashed var(--line);}
  .refs{border-top:1px solid var(--line);background:#fff;padding:14px 16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;}
  .ref-card{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fcfbf9;}
  .ref-card img{display:block;width:100%;height:180px;object-fit:contain;background:#fff;}
  .ref-meta{padding:10px 12px;font-size:12px;line-height:1.55;color:var(--sub);}
  .ref-title{display:block;font-weight:700;color:var(--ink);margin-bottom:3px;}
  .ref-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .empty{color:var(--sub);text-align:center;margin-top:18vh;font-size:14px;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .hamb{display:none;border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:14px;}
  @media (max-width:820px){
    aside{position:fixed;left:0;top:53px;bottom:0;z-index:30;transform:translateX(-100%);transition:.25s;box-shadow:2px 0 18px rgba(0,0,0,.12);height:auto;}
    aside.open{transform:translateX(0);}
    .hamb{display:inline-block;}
    main{padding:20px 16px 70px;}
    .search input{width:150px;}
  }
</style>
</head>

"ja","ja":"【構図補助】\n・薄い床面と接地影を入れ、足裏の位置と重心を確認できるようにする。\n・全パネルでアイレベル、床の高さ、カメラ距離、人物サイズを統一する。\n・遠近がある動作では、画面内にアイレベルを想定し、攻撃方向または身体の奥行き方向に消失点を置く。\n・前景の手足だけを巨大化させず、肩、肘、股関節、膝との接続を残す。\n・床面上の足位置、骨盤、胸郭、頭部の奥行き関係が読めるようにする。\n・全身、両手、両足を画面内へ収め、手足を画面端やパネル境界で切らない。","en":"[Composition Support]\n- Add a faint floor plane and a contact shadow so the sole positions and center of gravity can be checked.\n- Unify eye level, floor height, camera distance, and figure size across all panels.\n- For poses with depth, assume an eye level within the frame and place the vanishing point along the attack direction or the body\u0027s depth axis.\n- Do not enlarge only the foreground hands/feet; keep the connection to the shoulders, elbows, hips, and knees.\n- Make the depth relationship of the feet on the floor, the pelvis, the rib cage, and the head readable.\n- Keep the full body and both hands and feet inside the frame; do not cut limbs at the frame edge or panel border."},{"head":"02 重心と力線","kind":"block","origLang":"ja","ja":"【重心と力線】\n・支持脚を床へ完全に接地させる。\n・支持脚の膝を軽く緩める。\n・重心線が支持脚または両足の間へ落ちるようにする。\n・攻撃動作は、足、膝、骨盤、背骨、肩、肘、手先または足先まで一本の力線としてつなげる。\n・上体だけ、腕だけ、脚だけの動作にしない。\n・骨盤、胸郭、頭部の向きをそれぞれ指定し、身体のひねりを読めるようにする。","en":"[Center of Gravity and Force Lines]\n- Plant the supporting leg fully on the floor.\n- Keep the supporting leg\u0027s knee slightly relaxed.\n- Let the line of gravity fall onto the supporting leg or between both feet.\n- Connect attacking motions as a single force line from foot to knee, pelvis, spine, shoulder, elbow, and out to the hand or foot tip.\n- Do not make it a motion of only the upper body, only the arms, or only the legs.\n- Specify the orientation of the pelvis, rib cage, and head separately so the body\u0027s twist is readable."},{"head":"03 顔と視線","kind":"block","origLang":"ja","ja":"【顔と視線】\n・顔と視線はカメラではなく、攻撃または受け流しの方向を見る。\n・鼻先、顎、両目を技の到達方向へそろえる。\n・背面構図でも首だけを不自然に振り返らせない。\n・回転動作では、顔と視線を身体の回転より少し先行させる。","en":"[Face and Gaze]\n- The face and gaze look toward the direction of the attack or parry, not at the camera.\n- Align the tip of the nose, the chin, and both eyes with the direction the technique reaches.\n- Even in a rear composition, do not unnaturally turn only the neck back.\n- In rotational motions, lead the face and gaze slightly ahead of the body\u0027s rotation."},{"head":"04 前蹴り","kind":"block","origLang":"ja","ja":"【前蹴り補助】\n・支持脚を床へ完全に接地させる。\n・蹴り脚の膝を先に引き上げ、踵または足裏で前方を押す。\n・蹴り脚の股関節、膝、足首、踵を同じ進行面へ置く。\n・上体は蹴り方向と反対へわずかに傾けるが、反りすぎない。\n・両手は顔または身体の中心線を守る。\n・横蹴りや回し蹴りへ変化させない。","en":"[Front Kick Support]\n- Plant the supporting leg fully on the floor.\n- Raise the knee of the kicking leg first, then push forward with the heel or sole.\n- Place the hip, knee, ankle, and heel of the kicking leg on the same plane of travel.\n- Tilt the upper body slightly opposite to the kick direction, but do not over-arch.\n- Both hands guard the face or the body\u0027s center line.\n- Do not turn it into a side kick or roundhouse kick."},{"head":"05 横蹴り・ミドルキック","kind":"block","origLang":"ja","ja":"【横蹴り・ミドルキック補助】\n・軸足を床へ完全に接地させ、足裏とつま先の方向を明確にする。\n・蹴り脚の股関節を開き、膝、脛、足先を同じ回転面へ置く。\n・上体を蹴り脚と反対側へ自然に倒し、重心を軸足上へ残す。\n・片手は顔を守り、もう片手は回転またはバランスを取る位置へ置く。\n・完全な水平開脚や舞踊的な姿勢にしない。\n・足裏を内側へ反転させない。","en":"[Side Kick / Middle Kick Support]\n- Plant the pivot foot fully on the floor and make the direction of the sole and toes clear.\n- Open the hip of the kicking leg and place the knee, shin, and foot tip on the same plane of rotation.\n- Lean the upper body naturally to the opposite side of the kicking leg, keeping the center of gravity over the pivot foot.\n- One hand guards the face; the other is positioned to control rotation or balance.\n- Do not make it a full horizontal split or a dance-like posture.\n- Do not flip the sole inward."},{"head":"06 直突き","kind":"block","origLang":"ja","ja":"【直突き補助】\n・後ろ足で床を押す。\n・後ろ足、膝、骨盤、背骨、肩、肘、拳を一本の力線へつなげる。\n・突く腕の肘を完全に伸ばし切らない。\n・引き手は顔または胸の近くへ残す。\n・肩をすくめない。\n・拳で顔を完全に隠さない。","en":"[Straight Punch Support]\n- Push the floor with the rear foot.\n- Connect the rear foot, knee, pelvis, spine, shoulder, elbow, and fist into a single force line.\n- Do not fully lock out the elbow of the punching arm.\n- Keep the pulling hand near the face or chest.\n- Do not shrug the shoulders.\n- Do not fully hide the face with the fist."},{"head":"07 回転動作","kind":"block","origLang":"ja","ja":"【回転動作補助】\n・軸足を明確にし、床へ接地させる。\n・軸足、骨盤、胸郭、肩、肘、手先または足先を同じ回転方向へつなげる。\n・背面構図では、肩甲骨、背骨、骨盤の回転が読めるようにする。\n・顔と視線は回転方向へ少し先行させる。\n・首だけをカメラへ振り返らせない。\n・腕、胴体、脚が重なりすぎる場合は、間に小さな空間を残す。","en":"[Rotational Motion Support]\n- Make the pivot foot clear and planted on the floor.\n- Connect the pivot foot, pelvis, rib cage, shoulder, elbow, and hand or foot tip in the same direction of rotation.\n- In a rear composition, make the rotation of the shoulder blades, spine, and pelvis readable.\n- Lead the face and gaze slightly ahead of the rotation direction.\n- Do not turn only the neck back toward the camera.\n- If the arms, torso, and legs overlap too much, leave a small gap between them."},{"head":"08 八方向構え","kind":"block","origLang":"ja","ja":"【八方向構え補助】\n・8種類の異なる構えではなく、一つの同じ構えを固定し、カメラだけを45度ずつ移動させる。\n・前後脚を途中で入れ替えない。\n・足幅、膝の曲げ、骨盤の向き、胸郭の向き、手の高さを全パネルで維持する。\n・背面カメラでも首をカメラへ向けない。\n・全パネルで床面、接地影、アイレベル、人物サイズを統一する。","en":"[Eight-Direction Stance Support]\n- Instead of 8 different stances, fix one single identical stance and move only the camera by 45 degrees each.\n- Do not switch the front and rear legs partway through.\n- Maintain the foot width, knee bend, pelvis orientation, rib cage orientation, and hand height across all panels.\n- Even on the rear camera, do not turn the neck toward the camera.\n- Unify the floor plane, contact shadow, eye level, and figure size across all panels."}]},{"id":"p02","file":"マネキン経由_戦闘イラスト制作ワークフロー.md","character":"common","charLabel":"共通・ワークフロー","title":"マネキン経由 戦闘イラスト制作ワークフロー","intro":"ChatGPTの画像生成で、キャラクターの外見を維持しながら複雑な戦闘構図を作るための手順。\nポーズ、キャラクターデザイン、衣装、エフェクトを一度に決めようとすると、関節、顔の向き、指、衣装丈などが崩れやすい。そのため、以下の役割へ分離する。\n1. 技の目的と身体運動を文章で設計する。\n2. 白い3Dデッサン人形でポーズを可視化する。\n3. 立ち絵とマネキン資料を同時に参照し、キャラクター化する。\n4. 技ごとに検品し、問題のある画像だけを再生成する。\nこの方式では、マネキン画像を完成品ではなく「骨格、重心、カメラ、顔向きの指示書」として扱う。\n- **立ち絵**: 顔、髪型、体格、衣装、装飾、靴、配色の正本。\n- **マネキン**: 姿勢、支持脚、重心、関節角度、手足の前後関係、カメラ方向の正本。\n- **文章プロンプト**: 技の意味、視線、衣装の動き、エフェクト、禁止事項を補う。\nプロンプト内で、どの画像が何の正本かを明記する。\n- マネキン段階は複数ポーズを一枚へまとめてよい。\n- キャラクター化の段階は、一枚につき一人、一技だけ生成する。\n- 「複数種類を作成」は、分割シートではなく独立画像を順番に生成すると明記する。\nマネキンの関節や手の形にも誤りは発生する。文章側に次の条件を残す。","blocks":[{"head":"マネキンを絶対視しない","kind":"block","origLang":"ja","ja":"指定ポーズの支持脚、重心、身体の向き、手足の前後関係を維持する。\n人体として不自然な関節角度だけを、技の目的を変えずに修正する。","en":"Maintain the supporting leg, center of gravity, body orientation, and front-back relationship of the limbs of the specified pose.\nOnly correct joint angles that are anatomically unnatural, without changing the purpose of the technique."},{"head":"1. 技を文章で設計する","kind":"block","origLang":"ja","ja":"技名:\n技の目的:\n動作の瞬間:\n支持脚:\n重心:\n胸郭と骨盤の向き:\n両手の役割:\n顔と視線:\nカメラ方向:\n遠近:\n静と動:\nエフェクトの開始点と出口:\n重点確認する関節:","en":"Technique name:\nPurpose of the technique:\nMoment of the motion:\nSupporting leg:\nCenter of gravity:\nOrientation of rib cage and pelvis:\nRole of both hands:\nFace and gaze:\nCamera direction:\nPerspective:\nStillness vs. motion:\nStart point and exit of the effect:\nJoints to check carefully:"},{"head":"1. 技を文章で設計する","kind":"block","origLang":"ja","ja":"技名: 光華拳・返葉\n技の目的: 後退しながら力を引き込み、側方へ反転させる\n動作の瞬間: 重心が後脚へ移り、前方の力をS字に逃がす途中\n支持脚: 後脚\n顔と視線: 後退方向ではなく前方の相手を見る","en":"Technique name: Guanghua Fist - Fanye (Returning Leaf)\nPurpose: Pull in force while retreating, then reverse it to the side.\nMoment of the motion: Mid-way as the center of gravity shifts to the rear leg and the forward force is led away in an S-curve.\nSupporting leg: Rear leg.\nFace and gaze: Look at the opponent ahead, not toward the retreat direction."},{"head":"2. マネキン一覧を生成する","kind":"block","origLang":"ja","ja":"白い3Dデッサン人形を使い、指定した技を一枚のポーズ資料へまとめる。\n各パネルに一体、一技だけを配置する。\n全パネルで同じ頭身、体格、材質、関節構造を維持する。\n髪、衣装、装飾、武器は付けない。\n薄いグレー背景、薄い床面、接地影を使う。\n各人物の全身、両手、両足をパネル内へ収める。","en":"Use a white 3D drawing mannequin and compile the specified techniques into a single pose-reference sheet.\nPlace one figure and one technique per panel.\nMaintain the same head-to-body ratio, build, material, and joint structure across all panels.\nDo not add hair, clothing, accessories, or weapons.\nUse a light gray background, a faint floor plane, and a contact shadow.\nKeep each figure\u0027s full body and both hands and feet inside its panel."},{"head":"3. キャラクター化する","kind":"block","origLang":"ja","ja":"参考画像1はキャラクター外見の正本。\n参考画像2は指定番号のポーズ、支持脚、重心、関節、カメラ方向の正本。\n参考画像2の人形の顔、材質、体格は引き継がない。\n指定番号以外のポーズを混合しない。","en":"Reference image 1 is the master for the character\u0027s appearance.\nReference image 2 is the master for the specified numbered pose, supporting leg, center of gravity, joints, and camera direction.\nDo not inherit the face, material, or build of the mannequin in reference image 2.\nDo not mix in poses other than the specified number."},{"head":"出力方法","kind":"block","origLang":"ja","ja":"各技を独立した画像として一枚ずつ生成する。\n一枚に複数ポーズを並べない。\nモデルシート、グリッド、分割パネル、一覧表、コラージュにしない。\n一枚につきキャラクター一人、一つの技だけを描く。","en":"Generate each technique one at a time as an independent image.\nDo not line up multiple poses in one image.\nDo not make a model sheet, grid, split panels, list table, or collage.\nDraw only one character and one technique per image."},{"head":"出力方法","kind":"block","origLang":"ja","ja":"まず01だけを、新しい独立した一枚として生成する。","en":"First, generate only 01 as a new, independent single image."},{"head":"出力方法","kind":"block","origLang":"ja","ja":"次は02だけを、新しい独立した一枚として生成する。\n外見と共通画像仕様は直前と同じ条件を維持する。","en":"Next, generate only 02 as a new, independent single image.\nKeep the same appearance and shared image specifications as the previous one."},{"head":"顔と視線","kind":"block","origLang":"ja","ja":"顔は原則としてカメラではなく、技の到達方向を見る。\n鼻先、両目、顎を技の方向へそろえる。\n首だけをカメラ正面へ戻さない。\n回転技では、顔と視線を身体の回転より少し先行させる。","en":"As a rule, the face and gaze look toward the direction the technique reaches, not at the camera.\nAlign the tip of the nose, both eyes, and the chin with the technique\u0027s direction.\nDo not turn only the neck back to face the camera.\nIn rotational techniques, lead the face and gaze slightly ahead of the body\u0027s rotation."},{"head":"ショートパンツ","kind":"block","origLang":"ja","ja":"ドレスの下に不透明な淡い桃色のフィットショートパンツを着用する。\n股下は太腿全長の約3分の1。\n左右同じ丈にする。\n裾は太腿上部を水平に一周する。\n動作やカメラ角度によって短縮しない。\nハイウエストで骨盤を完全に覆う。\n下着として描かない。","en":"Wear opaque, pale-pink fitted shorts under the dress.\nThe inseam is about one-third of the full thigh length.\nMake the left and right the same length.\nThe hem wraps horizontally around the upper thigh.\nDo not shorten it depending on the motion or camera angle.\nHigh-waisted, fully covering the pelvis.\nDo not draw it as underwear."},{"head":"靴","kind":"block","origLang":"ja","ja":"支持脚と動作脚の両方に、正本と同じ閉じた桃色の靴を維持する。\n足指や生身の足裏を描かない。\n踵、靴底、つま先の方向は靴の輪郭で表現する。","en":"Keep the same closed pink shoes as the master on both the supporting leg and the moving leg.\nDo not draw toes or a bare sole.\nExpress the heel, sole, and toe direction through the outline of the shoe."},{"head":"手と指","kind":"block","origLang":"ja","ja":"すべての手は五本指。\n四本の指と親指一本を明確に分ける。\n掌の向きと親指の位置を一致させる。\n左右の親指を鏡像関係にする。\nリボン、蔦、光、花弁を指へ重ねない。","en":"All hands have five fingers.\nClearly separate the four fingers and the one thumb.\nMatch the palm orientation with the thumb position.\nMake the left and right thumbs mirror images of each other.\nDo not overlay ribbons, vines, light, or petals onto the fingers."},{"head":"エフェクト","kind":"block","origLang":"ja","ja":"エフェクトは一本の連続した流れに限定する。\n開始点と画面から抜ける出口を指定する。\n閉じた魔法陣、複数の輪、爆発へ変化させない。\n顔、指、手首、膝、足首を隠さない。","en":"Limit the effect to a single continuous flow.\nSpecify its start point and the exit where it leaves the frame.\nDo not turn it into a closed magic circle, multiple rings, or an explosion.\nDo not hide the face, fingers, wrists, knees, or ankles."},{"head":"左右対称へ寄りすぎる","kind":"block","origLang":"ja","ja":"一方の掌を少し前景へ、もう一方を少し奥へ置く。\n両掌の角度と大きさに自然な遠近差を付ける。","en":"Place one palm slightly toward the foreground and the other slightly toward the back.\nAdd a natural difference in perspective in the angle and size of both palms."},{"head":"保存と管理","kind":"block","origLang":"ja","ja":"リーファン_光華拳_穿華_v01.png\nリーファン_光華拳_穿華_v02.png\nリーファン_光華拳_環流_採用.png","en":"Lifan_Guanghua-Fist_Chuanhua_v01.png\nLifan_Guanghua-Fist_Chuanhua_v02.png\nLifan_Guanghua-Fist_Huanliu_adopted.png"}]},{"id":"p03","file":"リーファン_戦闘構図設計.md","character":"lifan","charLabel":"リーファン","title":"リーファン 戦闘構図設計","intro":"リーファンの戦闘イラストを、基礎武術から独自技へ段階的に展開するための設計資料。\n戦闘イラストでは、次の画像を最優先の外見参照とする。\n- [リーファン 立ち絵](../../../../リーファン/リーファン　立ち絵.png)\n顔、髪型、体格、衣装、装飾はこの立ち絵を基準とする。\n旧全身立ち絵や既存戦闘画像と差異がある場合も、この立ち絵を優先する。\n- 黄緑からオリーブ色の短い髪。\n- 左右の控えめな中サイズの植物編み込みお団子。\n- 両方のお団子に大きな桃色の蓮華。\n- 黄緑から金色の瞳と、柔らかく可憐な顔立ち。\n- 袖のないピンクのチャイナ風ドレス。\n- 肩、上腕、前腕を覆う布袖は付けない。\n- 両上腕に蓮華飾りを装着する。\n- 上腕の蓮華から、細長い桃色のリボンが複数垂れる。\n- 腕には細い蔦装飾を絡ませるが、筋肉や関節を隠さない。\n- 金色の縁取り、チャイナボタン、腰横の結び飾りを維持する。\n- 脚の蔦、足首の花飾り、桃色の靴を維持する。\n- 旧衣装の分離袖、長袖、フレア袖は使用しない。\n- 腕の動きは素肌の肩、肘、手首で明確に見せる。\n- リボンは袖の代わりに運動方向を示す補助線として使う。\n- リボンの流れは、腕や身体の進行方向と逆側へ遅れてついてくる。\n- リボンを腕、指、蔦、別の手と融合させない。\n- リボンは一つの腕から2から4本程度に抑え、過密な線を避ける。\nリーファンは戦闘時も立ち絵と同じ桃色の靴を着用する。蹴り足を強調する構図でも裸足へ変更しない。","blocks":[{"head":"靴のプロンプト制御","kind":"prompt","origLang":"en","ja":"両足とも、確定済みの金の装飾が付いたつま先の閉じたピンクの中華風ローヒールシューズを履く。\n支持脚と蹴り脚の両方に靴を維持する。\n蹴りの踵、靴底の向き、足首の角度は、靴のシルエットで表現する。\n素足なし、露出した足指なし、片方だけ靴がない状態なし、左右ちぐはぐな履物なし。","en":"Both feet wear the established closed-toe pink Chinese-style low-heeled shoes with gold ornaments.\nKeep the shoes on both the supporting foot and the kicking foot.\nThe kicking heel, sole direction, and ankle angle must be expressed through the shoe silhouette.\nNo bare feet, no exposed toes, no missing shoe, no mismatched footwear."},{"head":"奥から手前へ迫る構図","kind":"block","origLang":"ja","ja":"奥のリーファン\n-\u003e 肩または股関節\n-\u003e 前腕または大腿\n-\u003e 掌または足\n-\u003e 光華拳の流れ\n-\u003e 画面下または画面横へ抜ける","en":"Lifan in the back\n-\u003e shoulder or hip\n-\u003e forearm or thigh\n-\u003e palm or foot\n-\u003e the flow of Guanghua Fist\n-\u003e exiting toward the bottom or side of the frame"}]},{"id":"p04","file":"切り抜き用背景指定_共通ブロック.md","character":"common","charLabel":"共通・ワークフロー","title":"切り抜き用背景指定 共通ブロック","intro":"キャラクター画像を後で透過素材化・アニメーション素材化するための背景指定。\nマネキン検証用と、完成キャラクター切り抜き用では背景指定を分ける。\n重心、足裏接地、床面、アイレベルを確認したい段階。\n切り抜きやすさよりも、身体の成立を優先する。","blocks":[{"head":"01 マネキン検証用","kind":"block","origLang":"ja","ja":"【背景】\n・均一な薄いグレー背景\n・水平な薄いグレーの床面\n・足元に弱く自然な接地影\n・柔らかなスタジオ照明\n・輪郭と関節が背景へ溶けない陰影\n・床面と接地影で足裏の位置と重心を確認できるようにする\n・背景に模様、線、文字、家具、風景、敵、物体を入れない","en":"[Background]\n- Uniform light gray background\n- Horizontal light gray floor plane\n- A weak, natural contact shadow at the feet\n- Soft studio lighting\n- Shading where the outline and joints do not melt into the background\n- Make it possible to check the sole positions and center of gravity using the floor plane and contact shadow\n- Do not include patterns, lines, text, furniture, scenery, enemies, or objects in the background"},{"head":"02 切り抜き素材用","kind":"block","origLang":"ja","ja":"【切り抜き用背景】\n・完全な無地の白背景\n・背景は純白に近い単色\n・床、地平線、接地影、落ち影、グラデーション、模様を描かない\n・人物の周囲に白い縁取りや発光を付けない\n・髪、袖、前垂れ、靴の輪郭が背景と混ざらないよう、線画を明瞭にする\n・全身、髪、両手、両足、衣装の裾を画面内へ収める\n・手足や髪を画面端で切らない\n・人物と背景を融合させない\n・文字、番号、ロゴ、透かしを入れない","en":"[Background for Cutout]\n- Completely plain white background\n- A near-pure-white solid color\n- Do not draw a floor, horizon, contact shadow, cast shadow, gradient, or pattern\n- Do not add a white outline or glow around the figure\n- Keep the line art clear so the outlines of hair, sleeves, front cloth, and shoes do not blend with the background\n- Keep the full body, hair, both hands and feet, and the hem of the outfit inside the frame\n- Do not cut the limbs or hair at the frame edge\n- Do not fuse the figure with the background\n- Do not include text, numbers, logos, or watermarks"},{"head":"03 透明背景を狙う場合","kind":"block","origLang":"ja","ja":"【透明背景】\n・背景を完全に透明にする\n・人物だけを透過PNGとして描く\n・床、地平線、接地影、落ち影、白背景、グレー背景を描かない\n・人物の輪郭を明瞭にし、半透明の背景残りを作らない\n・全身、髪、両手、両足、衣装の裾を画面内へ収める","en":"[Transparent Background]\n- Make the background completely transparent\n- Draw only the figure as a transparent PNG\n- Do not draw a floor, horizon, contact shadow, cast shadow, white background, or gray background\n- Keep the figure\u0027s outline clear and avoid leaving any semi-transparent background residue\n- Keep the full body, hair, both hands and feet, and the hem of the outfit inside the frame"}]},{"id":"p05","file":"小鈴_マネキン実戦動作_キャラクター変換プロンプト.md","character":"xiaoling","charLabel":"小鈴（シャオリン）","title":"小鈴 マネキン実戦動作 キャラクター変換プロンプト","intro":"白い3D体格マネキンで作成した実戦基礎動作8種類を、同じ姿勢とカメラ方向のまま小鈴へ変換するためのプロンプト。\n1. 小鈴の正本立ち絵候補。\n2. 小鈴の基本武術構え画像。\n3. 白い3Dマネキンの実戦基礎動作8種類一覧。\n必要に応じて、小鈴の体格マネキン四面図も追加する。","blocks":[{"head":"共通変換プロンプト","kind":"prompt","origLang":"ja","ja":"添付した参考画像を使用し、白い3Dマネキンの実戦基礎動作01から08を、小鈴の戦闘イラストとして再現してください。\n\n【参考画像の役割】\n参考画像1：小鈴の正本立ち絵候補\n・顔、見た目年齢、髪型、目、衣装、レギンス、靴、配色の正本\n・キャラクターの外見は必ずこちらを優先する\n\n参考画像2：小鈴の基本武術構え画像\n・戦闘時の顔、体格、衣装の見え方、軽やかな重心の補助資料\n\n参考画像3：白い3Dマネキンの実戦基礎動作8種類\n・指定番号の姿勢、カメラ方向、支持脚、重心、骨盤、胸郭、手足の前後関係、接触部位の正本\n・マネキンの顔、白い材質、関節線、簡略化された手足は引き継がない\n・指定番号以外の動作を混合しない\n\n【最重要：出力方法】\n01から08を、必ず8枚の独立した画像として一枚ずつ順番に生成する。\n\n1枚目：01 弓歩直突き\n2枚目：02 穿掌\n3枚目：03 前蹴り\n4枚目：04 横蹴り\n5枚目：05 円掌受け\n6枚目：06 双掌押し\n7枚目：07 退歩引化\n8枚目：08 旋身換歩\n\n一枚に複数動作を並べない。\nモデルシート、グリッド、分割パネル、一覧表、コラージュにしない。\n一枚につき小鈴一人、一つの動作だけを描く。\n各画像を単独で使用できる完成イラストにする。\n\n【ポーズの再現】\n・指定番号のマネキンと同じカメラ方向を維持する\n・指定番号の支持脚、足幅、重心を維持する\n・骨盤と胸郭の向きを維持する\n・肩、肘、手首、拳または掌の位置を維持する\n・股関節、膝、足首、接触部位を維持する\n・攻撃していない手の防御位置を維持する\n・顔と視線を攻撃または受け流しの到達方向へ向ける\n・衣装の都合で関節や重心を変更しない\n・マネキンに解剖学的な小さな問題がある場合のみ、技の意味を変えず自然に修正する\n\n【構図と重心】\n・マネキン段階で決めたアイレベル、床面、足元の奥行き関係を維持する\n・支持脚を床へ接地させ、重心線が支持脚または両足の間へ落ちるようにする\n・攻撃動作は、足、膝、骨盤、背骨、肩、肘、手先または足先まで一本の力線としてつなげる\n・前景の拳、掌、足だけを巨大化させず、肩、肘、股関節、膝との接続を残す\n・上体だけ、腕だけ、脚だけの動作にしない\n\n【小鈴の固定外見】\n・21歳に見える成人女性\n・身長165cm、自然なアニメ調約7.3頭身\n・しなやかで均整の取れた健康的な武術体型\n・細すぎず、筋肉質すぎず、過剰にグラマーにしない\n・黒髪ショートボブ、あご下から肩に付かない程度\n・前髪あり、両サイドに顔を縁取る毛束\n・琥珀色から黄褐色の瞳\n・可愛さと凛々しさの中間の顔立ち\n・戦闘時はやや鋭く集中した目つき\n・冷酷な悪役顔や幼い丸目にしない\n\n【衣装】\n・白い立ち襟の中華武術トップス\n・前中心に黒いチャイナボタンまたは組紐留め\n・黒い縁取り\n・肩、脇、体側に黒い切り替えパネル\n・七分袖から長袖寄りの袖、袖口は黒い縁取り\n・腰から前へ垂れる白い前垂れ、裾は黒い縁取り\n・左右に短い黒い腰布またはサイドパネル\n・黒いレギンス\n・白黒配色の中華武術シューズ\n・金色装飾は少量のみ\n・メイド服、制服、チャイナドレス、現代スポーツウェアにしない\n\n【手】\n・すべての手は五本指\n・掌は四本指と親指一本を明確に分ける\n・掌の向きと親指の位置を一致させる\n・拳は四本の指を内側へ握り、親指を外側へ添える\n・手首を折りすぎない\n・攻撃していない手は顔または身体の中心線を守る\n\n【蹴りと靴】\n・支持脚と蹴り脚の両方に同じ白黒の中華武術シューズを維持する\n・裸足、足指、サンダル、ヒール、ブーツを描かない\n・蹴り脚の股関節、膝、足首を自然につなげる\n・靴の輪郭で踵、靴底、甲、つま先の方向を示す\n・足裏を内側へ反転させない\n・支持脚を完全に接地させる\n・前蹴りと横蹴りを混同しない\n\n【前垂れと腰布】\n・前垂れは身体の運動より少し遅れて自然に流れる\n・股関節、膝、足首、支持脚を完全に隠さない\n・前後の脚が判別できるよう、裾の間に空間を残す\n・前垂れを長いスカートやドレスへ変化させない\n・回転動作では前垂れと腰布を一つの大きな流れへまとめる\n・布を腕、脚、靴へ融合させない\n\n【顔と視線】\n・顔はカメラではなく技の到達方向を見る\n・鼻先、顎、両目を攻撃または受け流し方向へそろえる\n・後方構図でも首だけをカメラへ振り返らせない\n・前景の拳、掌、膝、足で顔を完全に隠さない\n\n【画像仕様】\n・16:9横長\n・ノベルゲーム用の戦闘イラスト\n・完全な無地の白背景\n・背景は純白に近い単色\n・床、地平線、接地影、落ち影、グラデーション、風景を描かない\n・敵、標的、他の人物を描かない\n・全身、髪、両手、両足、前垂れを画面内へ収める\n・攻撃方向へ十分な余白を設ける\n・手足を画面端で切らない\n・人物の周囲に白い縁取りや発光を付けない\n・髪、袖、前垂れ、靴の輪郭が背景と混ざらないよう、線画を明瞭にする\n・文字、番号、技名、ロゴ、透かしを入れない\n\n【画風】\n・高品質な日本のノベルゲーム用アニメイラスト\n・繊細で明瞭な線画\n・柔らかなセル塗り\n・正本と同じ顔、体格、衣装、配色\n・実用的な中華武術動作と身体のシルエットを優先する\n\n【この段階では使用しないもの】\n派手な気功、光、花びら、武器、固有技の演出。\n身体動作を確認するため、エフェクトを一切描かない。\n\n【禁止事項】\n指定番号以外の動作との混合、複数人物、敵、武器、派手なエフェクト、\nロングヘア、ツインテール、ポニーテール、髪色変更、\n子供体型、過剰なグラマー体型、ボディビルダー体型、\nメイド服、制服、チャイナドレス、ドレス、現代スポーツウェア、\n裸足、サンダル、ヒール、ブーツ、素足化、\n余分な腕や脚、六本指、欠けた指、融合した指、二重の手、\n拳から突き出る指、折れた手首、逆関節、反転した足首、浮いた支持脚、\n膝と靴のつま先の不一致、足と靴の分離、\nカメラ目線、身体から切断して見える拳や足、\n前垂れや腰布による関節と支持脚の完全な遮蔽","en":"Using the attached reference images, reproduce the white 3D mannequin\u0027s practical basic motions 01 to 08 as Xiaoling\u0027s battle illustrations.\n\n[Role of the reference images]\nReference image 1: the master standing-illustration candidate of Xiaoling\n- The master for face, apparent age, hairstyle, eyes, outfit, leggings, shoes, and color scheme\n- Always prioritize this for the character\u0027s appearance\n\nReference image 2: Xiaoling\u0027s basic martial-arts stance image\n- A support reference for how the face, build, outfit, and light center of gravity look in combat\n\nReference image 3: the 8 practical basic motions of the white 3D mannequin\n- The master for the specified number\u0027s posture, camera direction, supporting leg, center of gravity, pelvis, rib cage, front-back relationship of the limbs, and contact point\n- Do not carry over the mannequin\u0027s face, white material, joint lines, or simplified limbs\n- Do not mix in motions other than the specified number\n\n[Most important: output method]\nAlways generate 01 to 08 as 8 independent images, one at a time, in order.\n\nImage 1: 01 bow-stance straight punch\nImage 2: 02 piercing palm\nImage 3: 03 front kick\nImage 4: 04 side kick\nImage 5: 05 circular palm parry\nImage 6: 06 double-palm push\nImage 7: 07 retreating-step neutralizing\nImage 8: 08 turning body, changing step\n\nDo not line up multiple motions in one image.\nDo not make a model sheet, grid, split panels, list table, or collage.\nDraw only one Xiaoling and one motion per image.\nMake each image a finished illustration usable on its own.\n\n[Reproducing the pose]\n- Keep the same camera direction as the mannequin of the specified number\n- Keep the supporting leg, foot width, and center of gravity of the specified number\n- Keep the orientation of pelvis and rib cage\n- Keep the positions of shoulder, elbow, wrist, and fist or palm\n- Keep the hip, knee, ankle, and contact point\n- Keep the defensive position of the non-attacking hand\n- Direct the face and gaze toward where the attack or parry reaches\n- Do not change the joints or center of gravity for the sake of the outfit\n- Only if the mannequin has a small anatomical issue, correct it naturally without changing the meaning of the technique\n\n[Composition and center of gravity]\n- Keep the eye level, floor plane, and foot depth relationship decided at the mannequin stage\n- Plant the supporting leg on the floor and let the line of gravity fall onto it or between both feet\n- Connect attacking motions as a single force line from foot, knee, pelvis, spine, shoulder, elbow, and out to the hand or foot tip\n- Do not enlarge only the foreground fist, palm, or foot; keep the connection to shoulder, elbow, hip, and knee\n- Do not make it a motion of only the upper body, only the arms, or only the legs\n\n[Xiaoling\u0027s fixed appearance]\n- An adult woman who looks 21\n- 165 cm tall, about 7.3 heads tall in a natural anime style\n- A supple, well-proportioned, healthy martial-arts physique\n- Not too thin, not too muscular, not excessively glamorous\n- Black short bob, from below the chin to just above the shoulders\n- Bangs, with locks framing the face on both sides\n- Amber to golden-brown eyes\n- A face between cute and dignified\n- Slightly sharp, focused eyes in combat\n- Not a cold villain face or childish round eyes\n\n[Outfit]\n- A white standing-collar Chinese martial-arts top\n- Black frog buttons or braided closures at the front center\n- Black trim\n- Black accent panels at the shoulders, underarms, and body sides\n- Sleeves from three-quarter to long, with black-trimmed cuffs\n- A white front cloth hanging forward from the waist, with black-trimmed hem\n- Short black waist cloths or side panels on left and right\n- Black leggings\n- White-and-black Chinese martial-arts shoes\n- Only a small amount of gold ornament\n- Not a maid outfit, school uniform, qipao dress, or modern sportswear\n\n[Hands]\n- All hands have five fingers\n- Palms clearly separate the four fingers and one thumb\n- Match palm orientation with thumb position\n- Fists curl the four fingers inward with the thumb on the outside\n- Do not over-bend the wrist\n- The non-attacking hand guards the face or the body\u0027s center line\n\n[Kicks and shoes]\n- Keep the same white-and-black Chinese martial-arts shoes on both the supporting and kicking legs\n- Do not draw bare feet, toes, sandals, heels, or boots\n- Connect the hip, knee, and ankle of the kicking leg naturally\n- Show the heel, sole, instep, and toe direction through the shoe outline\n- Do not flip the sole inward\n- Plant the supporting leg fully\n- Do not confuse a front kick with a side kick\n\n[Front cloth and waist cloth]\n- The front cloth flows naturally, slightly behind the body\u0027s motion\n- Do not fully hide the hip, knee, ankle, or supporting leg\n- Leave space between the hems so the front/back legs are distinguishable\n- Do not turn the front cloth into a long skirt or dress\n- In rotational motions, gather the front and waist cloths into one large flow\n- Do not fuse the cloth into the arms, legs, or shoes\n\n[Face and gaze]\n- The face looks toward where the technique reaches, not the camera\n- Align the nose tip, chin, and both eyes with the attack or parry direction\n- Even in a rear composition, do not turn only the neck back to the camera\n- Do not fully hide the face with a foreground fist, palm, knee, or foot\n\n[Image specifications]\n- 16:9 landscape\n- A battle illustration for a novel game\n- A completely plain white background\n- A near-pure-white solid color\n- Do not draw a floor, horizon, contact shadow, cast shadow, gradient, or scenery\n- Do not draw enemies, targets, or other figures\n- Keep the full body, hair, both hands and feet, and the front cloth inside the frame\n- Leave enough margin in the attack direction\n- Do not cut limbs at the frame edge\n- Do not add a white outline or glow around the figure\n- Keep the line art clear so the outlines of hair, sleeves, front cloth, and shoes do not blend with the background\n- Do not include text, numbers, technique names, logos, or watermarks\n\n[Art style]\n- High-quality Japanese novel-game anime illustration\n- Delicate, clear line art\n- Soft cel shading\n- The same face, build, outfit, and colors as the master\n- Prioritize practical Chinese martial-arts motion and body silhouette\n\n[Do not use at this stage]\nFlashy qigong, light, petals, weapons, or signature-technique effects.\nTo check body motion, draw no effects at all.\n\n[Prohibited]\nMixing motions other than the specified number, multiple figures, enemies, weapons, flashy effects,\nlong hair, twin tails, ponytail, hair-color changes,\nchild body, excessively glamorous body, bodybuilder physique,\nmaid outfit, school uniform, qipao dress, dress, modern sportswear,\nbare feet, sandals, heels, boots, turning feet bare,\nextra arms or legs, six fingers, missing fingers, fused fingers, double hands,\nfingers poking out of the fist, broken wrists, reversed joints, flipped ankles, floating supporting leg,\nmismatch between knee and shoe toe, separation of foot and shoe,\ncamera gaze, fists or feet that look severed from the body,\ncomplete blocking of joints and supporting leg by the front or waist cloth"},{"head":"01 弓歩直突き","kind":"block","origLang":"ja","ja":"まず01だけを、新しい独立した一枚として生成してください。\n\nマネキン資料の01と同じ正面カメラ。\n左脚を前、右脚を後ろに置く。\n前脚を曲げ、後脚で床を押す。\n拳を相手の中心へ肩から胸の高さで突き出す。\n反対の手は胸の近くへ引き、守りを残す。\n正面からも両脚の前後差と骨盤の回転を残す。\n拳で顔を完全に隠さない。\n静4、動6。","en":"First, generate only 01 as a new, independent single image.\n\nSame front camera as 01 in the mannequin reference.\nLeft leg forward, right leg back.\nBend the front leg and push the floor with the rear leg.\nThrust the fist toward the opponent\u0027s center at shoulder-to-chest height.\nPull the other hand near the chest, keeping a guard.\nKeep the front-back leg offset and pelvis rotation readable even from the front.\nDo not fully hide the face with the fist.\nStillness 4, motion 6."},{"head":"02 穿掌","kind":"block","origLang":"ja","ja":"次は02だけを、新しい独立した一枚として生成してください。\n\nマネキン資料の02と同じ右前方45度カメラ。\n前方へ開いた掌を差し込むように突き出す。\n指先、手首、肘、肩を一つの線へつなげる。\n反対の手は胸の近くで中心線を守る。\n掌を停止のジェスチャーにしない。\n手首を反らしすぎない。\n静3、動7。","en":"Next, generate only 02 as a new, independent single image.\n\nSame front-right 45-degree camera as 02 in the mannequin reference.\nThrust an open palm forward as if inserting it.\nConnect fingertips, wrist, elbow, and shoulder into one line.\nThe other hand guards the center line near the chest.\nDo not make the palm a \"stop\" gesture.\nDo not over-bend the wrist.\nStillness 3, motion 7."},{"head":"03 前蹴り","kind":"block","origLang":"ja","ja":"次は03だけを、新しい独立した一枚として生成してください。\n\nマネキン資料の03と同じ右側面カメラ。\n右脚を支持脚にする。\n左膝を先に引き上げ、左靴の踵または靴底で前方を押す。\n左股関節、左膝、左足首、靴の踵を同じ進行面へ置く。\n右足裏を完全に接地し、右膝を軽く緩める。\n上体を立て、両手で中心線を守る。\n横蹴りや回し蹴りへ変化させない。\n静4、動6。","en":"Next, generate only 03 as a new, independent single image.\n\nSame right-side camera as 03 in the mannequin reference.\nMake the right leg the supporting leg.\nRaise the left knee first, then push forward with the heel or sole of the left shoe.\nPlace the left hip, left knee, left ankle, and the shoe\u0027s heel on the same plane of travel.\nPlant the right sole fully and keep the right knee slightly relaxed.\nKeep the upper body upright and guard the center line with both hands.\nDo not turn it into a side kick or roundhouse kick.\nStillness 4, motion 6."},{"head":"04 横蹴り","kind":"block","origLang":"ja","ja":"次は04だけを、新しい独立した一枚として生成してください。\n\nマネキン資料の04と同じ右後方45度カメラ。\n軸足を接地し、蹴り脚を横方向へ伸ばす。\n蹴り足の踵または足刀を接触部位にする。\n骨盤を横へ開き、膝と靴のつま先を同じ方向へそろえる。\n上体を倒しすぎず、両手は守りとバランスに使う。\n舞踊的な大開脚にしない。\n静3、動7。","en":"Next, generate only 04 as a new, independent single image.\n\nSame rear-right 45-degree camera as 04 in the mannequin reference.\nPlant the pivot foot and extend the kicking leg sideways.\nMake the heel or foot-blade of the kicking foot the contact point.\nOpen the pelvis to the side and align the knee and the shoe toe in the same direction.\nDo not over-tilt the upper body; use both hands for guard and balance.\nDo not make it a dance-like full split.\nStillness 3, motion 7."},{"head":"05 円掌受け","kind":"block","origLang":"ja","ja":"次は05だけを、新しい独立した一枚として生成してください。\n\nマネキン資料の05と同じ背面カメラ。\n片方の掌で円を描くように相手の力を受け流す。\n肩甲骨、背骨、骨盤の回転が読める構図にする。\n反対の手は胸または顔の近くへ残す。\n首だけをカメラへ振り返らせない。\n視線は受け流す方向へ向ける。\n静5、動5。","en":"Next, generate only 05 as a new, independent single image.\n\nSame rear camera as 05 in the mannequin reference.\nParry the opponent\u0027s force with one palm drawing a circle.\nMake a composition where the rotation of shoulder blades, spine, and pelvis is readable.\nKeep the other hand near the chest or face.\nDo not turn only the neck back toward the camera.\nDirect the gaze toward the parry direction.\nStillness 5, motion 5."},{"head":"06 双掌押し","kind":"block","origLang":"ja","ja":"次は06だけを、新しい独立した一枚として生成してください。\n\nマネキン資料の06と同じ左後方45度カメラ。\n両掌を前方へ押し出す。\n左右の掌に自然な前後差と遠近差を付ける。\n両肘を伸ばし切らない。\n後足から骨盤、背骨、両肩、両掌へ力をつなげる。\n顔は掌の間から技の方向を見る。\n静3、動7。","en":"Next, generate only 06 as a new, independent single image.\n\nSame rear-left 45-degree camera as 06 in the mannequin reference.\nPush both palms forward.\nAdd a natural front-back and perspective offset between the left and right palms.\nDo not fully extend both elbows.\nConnect the force from the rear foot to the pelvis, spine, both shoulders, and both palms.\nThe face looks toward the technique\u0027s direction from between the palms.\nStillness 3, motion 7."},{"head":"07 退歩引化","kind":"block","origLang":"ja","ja":"次は07だけを、新しい独立した一枚として生成してください。\n\nマネキン資料の07と同じ左側面カメラ。\n相手の力を引き込みながら一歩後退する動作。\n後脚へ重心を移し、前脚を軽く引く。\n両手は相手の力を下または斜め後ろへ導くように配置する。\n前進攻撃に見せない。\n背骨を保ち、腰だけを引かない。\n静6、動4。","en":"Next, generate only 07 as a new, independent single image.\n\nSame left-side camera as 07 in the mannequin reference.\nA motion of stepping back one step while pulling in the opponent\u0027s force.\nShift the center of gravity to the rear leg and lightly draw back the front leg.\nPosition both hands to guide the opponent\u0027s force downward or diagonally backward.\nDo not make it look like a forward attack.\nKeep the spine; do not pull back only the hips.\nStillness 6, motion 4."},{"head":"08 旋身換歩","kind":"block","origLang":"ja","ja":"次は08だけを、新しい独立した一枚として生成してください。\n\nマネキン資料の08と同じ左前方45度カメラ。\n軸足を接地し、身体を回転させながら足位置を入れ替える途中。\n骨盤、胸郭、肩、顔と視線を同じ回転方向へつなげる。\n片手は守り、片手は次の攻撃または受けへ移る位置。\n前垂れと腰布は身体の回転より少し遅れて自然に流す。\n跳躍や舞踊ポーズにしない。\n静3、動7。","en":"Next, generate only 08 as a new, independent single image.\n\nSame front-left 45-degree camera as 08 in the mannequin reference.\nMid-way through planting the pivot foot and swapping foot positions while rotating the body.\nConnect the pelvis, rib cage, shoulders, and face/gaze in the same direction of rotation.\nOne hand guards; one hand moves to the position for the next attack or block.\nLet the front cloth and waist cloth flow naturally, slightly behind the body\u0027s rotation.\nDo not make it a jump or dance pose.\nStillness 3, motion 7."}]},{"id":"p06","file":"小鈴_マネキン生成プロンプト.md","character":"xiaoling","charLabel":"小鈴（シャオリン）","title":"小鈴 マネキン生成プロンプト","intro":"小鈴の戦闘構図を検討するための、白い3Dデッサン人形生成用プロンプト。\n- `03_named_images/小鈴/小鈴_正本立ち絵候補_01.png`\n参考画像は、外見の再現ではなく、身長感、頭身、肩幅、胴、骨盤、腕と脚の長さを読み取るために使用する。","blocks":[{"head":"01 体格マネキン四面図","kind":"block","origLang":"ja","ja":"添付した小鈴の立ち絵を参考に、戦闘構図検討用の白い3Dデッサン人形四面図を作成してください。\n\n【参考画像の役割】\n添付画像は、小鈴の身長感、頭身、肩幅、胸郭、胴回り、骨盤、腕と脚の長さを読み取るための体格資料です。\n髪型、顔、衣装、前垂れ、レギンス、靴、色、装飾はマネキンへ引き継がないでください。\n\n【出力形式】\n・一枚の横長モデルシート\n・横4列、縦1行の均等な4パネル\n・左から、正面、右側面、背面、左側面\n・各パネルに同一人物のマネキンを一体\n・全パネルで同じ身長、頭身、肩幅、胸郭、骨盤、手足の長さ\n・カメラ距離、人物サイズ、床の高さを統一する\n・人物同士を重ねない\n・頭頂から足先まで完全に収める\n・薄い縦線でパネルを区切る\n・文字、番号、方向名は画像内へ入れない\n\n【体格】\n・21歳の成人女性型\n・身長165cm相当\n・自然なアニメキャラクター向けの約7.3頭身\n・しなやかで均整の取れた健康的な武術体型\n・細すぎず、筋肉質すぎない\n・肩幅は標準からやや華奢\n・胸は控えめから標準\n・腰は自然に締まっている\n・骨盤は自然で、脚のラインがきれい\n・太ももとふくらはぎに軽い筋肉感\n・腕は細めだが、武術家らしい強さが感じられる\n・ボディビルダー体型、重量級格闘家、子供体型、極端なモデル体型にしない\n\n【マネキンの造形】\n・白または明るい灰色のマット樹脂製3Dデッサン人形\n・写実的な皮膚や毛穴を描かない\n・頭部は簡略化された成人女性型\n・頭部、胸郭、骨盤に薄い中心線\n・肩、肘、手首、股関節、膝、足首の関節位置を明確にする\n・筋肉の境界は控えめにし、関節と身体比率を優先する\n・手は五本指を簡潔に分ける\n・両足は閉じた靴型の簡略形状\n\n【立ち姿】\n・自然な直立姿勢\n・頭を水平に保つ\n・顎を軽く引く\n・肩の力を抜く\n・両腕を身体の横へ自然に下ろす\n・手の甲を外側へ向ける\n・両脚は腰幅から肩幅程度\n・両膝と足先を正面へ向ける\n・左右の足へ均等に重心を置く\n・骨盤や肩を傾けない\n\n【背景と照明】\n・均一な薄いグレー背景\n・水平な薄いグレーの床面\n・足元に弱く自然な接地影\n・柔らかなスタジオ照明\n・輪郭と関節が背景へ溶けない陰影\n・クリーンな3D人体デッサン教材\n\n【構図補助】\n・床面と接地影で足裏の位置と重心を確認できるようにする\n・全パネルでアイレベル、床の高さ、カメラ距離を統一する\n・足元の水平線がずれないようにする\n・身体の中心線、胸郭、骨盤の向きが各方向で読めるようにする\n\n【禁止事項】\n髪、衣装、前垂れ、レギンス、靴、装飾品、武器、敵、\n表情差分、ポーズ差分、複数の体格、左右非対称な身体、\n巨大な胸、極端なくびれ、太すぎる首、過剰な筋肉、\n細すぎる腰、長すぎる脚、短すぎる腕、\n余分な腕や脚、六本指、融合した指、欠けた指、\n曲がった直立姿勢、異なるカメラ距離、広角歪み、\n文字、番号、ロゴ、透かし","en":"Referring to the attached Xiaoling standing illustration, create a white 3D drawing-mannequin four-view sheet for studying battle compositions.\n\n[Role of the reference image]\nThe attached image is a build reference for reading Xiaoling\u0027s sense of height, head-to-body ratio, shoulder width, rib cage, torso girth, pelvis, and arm/leg length.\nDo not carry over the hairstyle, face, outfit, front cloth, leggings, shoes, color, or ornaments to the mannequin.\n\n[Output format]\n- A single landscape model sheet\n- 4 even panels in 4 columns x 1 row\n- From left: front, right side, back, left side\n- One mannequin of the same figure per panel\n- Same height, head ratio, shoulder width, rib cage, pelvis, and limb length across all panels\n- Unify camera distance, figure size, and floor height\n- Do not overlap the figures\n- Fit fully from the top of the head to the toes\n- Divide the panels with thin vertical lines\n- Do not put text, numbers, or direction names inside the image\n\n[Build]\n- A 21-year-old adult female type\n- Equivalent to 165 cm tall\n- About 7.3 heads tall, natural for an anime character\n- A supple, well-proportioned, healthy martial-arts physique\n- Not too thin, not too muscular\n- Shoulder width from standard to slightly slender\n- Bust from modest to standard\n- Naturally tightened waist\n- Natural pelvis with clean leg lines\n- Light muscle tone in the thighs and calves\n- Slim arms, but with a martial artist\u0027s sense of strength\n- Not a bodybuilder physique, heavyweight fighter, child body, or extreme model body\n\n[Mannequin modeling]\n- A matte resin 3D drawing mannequin in white or light gray\n- Do not draw realistic skin or pores\n- A simplified adult female head\n- Faint center lines on the head, rib cage, and pelvis\n- Clearly mark the joint positions of shoulders, elbows, wrists, hips, knees, and ankles\n- Keep muscle boundaries subtle; prioritize joints and body proportions\n- Hands simply separated into five fingers\n- Both feet as simplified closed shoe shapes\n\n[Standing pose]\n- Natural upright posture\n- Keep the head level\n- Chin slightly tucked\n- Relaxed shoulders\n- Both arms hanging naturally at the sides\n- Backs of the hands facing outward\n- Feet from hip width to shoulder width\n- Both knees and toes pointing forward\n- Weight evenly on both feet\n- Do not tilt the pelvis or shoulders\n\n[Background and lighting]\n- Uniform light gray background\n- Horizontal light gray floor plane\n- A weak, natural contact shadow at the feet\n- Soft studio lighting\n- Shading where the outline and joints do not melt into the background\n- A clean 3D anatomy drawing-study look\n\n[Composition support]\n- Make it possible to check sole positions and center of gravity using the floor plane and contact shadow\n- Unify eye level, floor height, and camera distance across all panels\n- Keep the horizontal floor line from shifting\n- Make the body\u0027s center line and the orientation of rib cage and pelvis readable in each direction\n\n[Prohibited]\nHair, outfit, front cloth, leggings, shoes, accessories, weapons, enemies,\nexpression variations, pose variations, multiple builds, left-right asymmetric body,\nhuge bust, extreme waist, too-thick neck, excessive muscle,\ntoo-thin waist, too-long legs, too-short arms,\nextra arms or legs, six fingers, fused fingers, missing fingers,\nbent upright posture, differing camera distance, wide-angle distortion,\ntext, numbers, logo, watermark"},{"head":"02 基本武術構え 八方向","kind":"block","origLang":"ja","ja":"添付した小鈴用の白い3D体格マネキンを使い、同じ中華武術の基本構えを八方向から確認できるポーズ資料を作成してください。\n\n【参考画像の役割】\n添付したマネキン四面図は、身長、頭身、肩幅、胸郭、骨盤、腕と脚の長さの正本です。\n全8パネルで、この体格を変更しないでください。\n\n【最重要】\n8種類の異なる構えを作るのではありません。\n一つの同じ基本構えを固定し、カメラだけを人物の周囲へ45度ずつ移動させてください。\n支持脚、足幅、手の高さ、肘の角度、重心、胸郭と骨盤の向きを全パネルで維持してください。\n\n【出力形式】\n・一枚の16:9横長モデルシート\n・上段4パネル、下段4パネル\n・上段左から01、02、03、04\n・下段左から05、06、07、08\n・各パネルにマネキン一体\n・各パネル内に全身、両手、両足を収める\n・手足をパネル境界で切らない\n・カメラ距離と人物の大きさを統一する\n・細い境界線でパネルを区切る\n・各パネル左上に小さく01から08の番号だけを表示する\n\n【カメラ方向】\n01：正面\n02：右前方45度\n03：右側面\n04：右後方45度\n05：背面\n06：左後方45度\n07：左側面\n08：左前方45度\n\n【基本武術構え】\n・右利きを想定した半身の構え\n・左脚を前、右脚を後ろへ置く\n・両足の間隔は肩幅より少し広い\n・前後の足を一直線へ重ねない\n・左足は前方へ向ける\n・右足は斜め外側へ向ける\n・両膝を軽く曲げる\n・重心は低すぎず、軽く動ける高さ\n・両足裏を床へ接地する\n・前脚へ体重を乗せすぎない\n・後脚へ逃げすぎない\n\n・骨盤は真正面ではなく斜めに構える\n・胸郭は骨盤よりわずかに正面へ戻す\n・背骨を自然に立てる\n・上体を前後左右へ倒しすぎない\n・肩を上げない\n・顎を軽く引く\n\n・左手は前方、胸から肩の高さに開いた掌または軽い手刀で置く\n・右手は胸の近くへ引き、守りと次の攻撃に備える\n・両肘を軽く曲げる\n・脇を完全に開かない\n・手首を折りすぎない\n・左右の手は五本指を明確にする\n\n・顔と視線は常に構えの正面方向を見る\n・カメラへ視線を向けない\n・背面カメラでも首を不自然に振り返らせない\n\n【動作の印象】\n・静かな中華武術の構え\n・軽やかで、受け流しにも踏み込みにも移れる\n・威嚇ではなく、実用的で清潔感のある姿勢\n・静7、動3\n\n【構図補助】\n・全パネルで同じアイレベルと床面を維持する\n・両足の接地影を入れ、足幅と前後差を比較できるようにする\n・骨盤、胸郭、頭部の奥行き関係が読めるようにする\n・前景の手だけを巨大化させず、肩、肘、手首との接続を残す\n\n【禁止事項】\n異なる8種類のポーズ、攻撃中の姿勢、蹴り、跳躍、\n髪、衣装、前垂れ、レギンス、靴、装飾、武器、敵、\n左右の脚を途中で入れ替える、手の高さを変える、重心を変える、\nカメラへ顔を向ける、背面で振り返る、\n前後の足を交差させる、浮いた足、伸び切った膝、\n折れた手首、逆関節、余分な腕や脚、六本指、融合した指、\nパネルごとに異なる体格、異なる頭身、異なるカメラ距離、\n番号以外の文字、技名、ロゴ、透かし","en":"Using the attached white 3D build mannequin for Xiaoling, create a pose reference that shows the same basic Chinese martial-arts stance from eight directions.\n\n[Role of the reference image]\nThe attached mannequin four-view is the master for height, head ratio, shoulder width, rib cage, pelvis, and arm/leg length.\nDo not change this build across all 8 panels.\n\n[Most important]\nThis is not about making 8 different stances.\nFix one single identical basic stance and move only the camera around the figure by 45 degrees each.\nMaintain the supporting leg, foot width, hand height, elbow angle, center of gravity, and orientation of rib cage and pelvis across all panels.\n\n[Output format]\n- A single 16:9 landscape model sheet\n- Top row 4 panels, bottom row 4 panels\n- Top row from left: 01, 02, 03, 04\n- Bottom row from left: 05, 06, 07, 08\n- One mannequin per panel\n- Fit the full body and both hands and feet within each panel\n- Do not cut limbs at the panel borders\n- Unify camera distance and figure size\n- Divide the panels with thin borders\n- Show only a small 01-08 number in the top-left of each panel\n\n[Camera directions]\n01: Front\n02: Front-right 45 degrees\n03: Right side\n04: Rear-right 45 degrees\n05: Back\n06: Rear-left 45 degrees\n07: Left side\n08: Front-left 45 degrees\n\n[Basic martial-arts stance]\n- A half-body stance assuming right-handedness\n- Left leg forward, right leg back\n- The gap between the feet is slightly wider than shoulder width\n- Do not stack the front and rear feet in a single line\n- Left foot points forward\n- Right foot points diagonally outward\n- Both knees slightly bent\n- Center of gravity not too low, at a height that allows light movement\n- Both soles planted on the floor\n- Do not put too much weight on the front leg\n- Do not retreat too much onto the rear leg\n\n- The pelvis is set at an angle, not square to the front\n- The rib cage returns slightly more toward the front than the pelvis\n- The spine stands naturally\n- Do not tilt the upper body too much in any direction\n- Do not raise the shoulders\n- Chin slightly tucked\n\n- The left hand is forward, at chest-to-shoulder height, as an open palm or a light knife-hand\n- The right hand is drawn near the chest, ready for defense and the next attack\n- Both elbows slightly bent\n- Do not fully open the armpits\n- Do not over-bend the wrists\n- Clearly show five fingers on both hands\n\n- The face and gaze always look toward the front direction of the stance\n- Do not direct the gaze at the camera\n- Even on the rear camera, do not unnaturally turn the neck back\n\n[Impression of the motion]\n- A quiet Chinese martial-arts stance\n- Light, ready to shift into either a parry or a step-in\n- Not threatening, but a practical and clean posture\n- Stillness 7, motion 3\n\n[Composition support]\n- Maintain the same eye level and floor plane across all panels\n- Add contact shadows for both feet so foot width and front-back offset can be compared\n- Make the depth relationship of pelvis, rib cage, and head readable\n- Do not enlarge only the foreground hand; keep the connection to shoulder, elbow, and wrist\n\n[Prohibited]\n8 different poses, attacking postures, kicks, jumps,\nhair, outfit, front cloth, leggings, shoes, ornaments, weapons, enemies,\nswitching the left/right legs partway, changing hand height, changing center of gravity,\nfacing the camera, looking back on the rear view,\ncrossing the front and rear feet, floating feet, fully locked knees,\nbroken wrists, reversed joints, extra arms or legs, six fingers, fused fingers,\ndiffering build per panel, differing head ratio, differing camera distance,\ntext other than the numbers, technique names, logo, watermark"}]},{"id":"p07","file":"小鈴_基本立ち絵プロンプト.md","character":"xiaoling","charLabel":"小鈴（シャオリン）","title":"小鈴 基本立ち絵プロンプト","intro":"小鈴の顔、髪型、体格、衣装、色設計を固定するための基本立ち絵プロンプト。\n戦闘ポーズへ進む前に、この外見を正本として確定する。","blocks":[{"head":"Prompt","kind":"prompt","origLang":"en","ja":"小鈴（シャオリン）の全身キャラクターコンセプトアート。21歳の中国武術家の女性。身長165cm、約7.3頭身、しなやかでバランスのとれた運動体型。優美だが実戦的なカンフー体型で、筋肉質になりすぎない引き締まった身体。艶のある黒髪のショートボブで、長さは顎から肩の少し上まで。自然な前髪と、顔を縁取るサイドの髪。琥珀色〜黄褐色の瞳。かわいさと凛々しさの中間の顔立ちで、やや鋭い目元、落ち着いた真剣な表情。清潔で洗練された佇まいの中に、厳しい第一印象の奥にある親しみやすい温かさを感じさせる。\n\n彼女は黒と白を基調とした中国武術服を着用する。黒の縁取りが入った白い立ち襟の上衣、中央に並ぶ黒のチャイナボタンまたは結び留め、肩と脇から腰にかけての黒のサイドパネル、七分袖から長袖の間の実用的な袖に黒の袖口、黒の縁取りが入った白い前掛け状の武術布、腰の左右に短い黒の布パネル、フィットした黒のレギンス、薄いソールの白黒の軽量中国武術シューズ。必要なら金の装飾はごく少量だけ用い、主配色は白と黒を保つ。\n\n姿勢は直立した武術的な構えで、落ち着きながらも準備が整っている。片手は腰の近くに置き、もう片手は自然に下ろし、背筋はまっすぐ、肩は自然、脚は軽く開く。誇張したセクシーなポーズはしない。最初は少し近寄りがたく見えるが、実は親切でまっすぐな、真剣な若いカンフー使いに見えること。\n\n高品質な日本のアニメ・ライトノベル風キャラクターイラスト。クリーンな線画、頭から靴まで全身が見える、読み取りやすいシルエット、柔らかなセルシェーディング、ニュートラルな白〜薄灰色の背景、文字なし、ロゴなし、透かしなし。","en":"Full-body character concept art of Xiaoling, a 21-year-old female Chinese martial artist, 165 cm tall, around 7.3 heads tall, slender and balanced athletic body, graceful but practical kung fu physique, toned without being muscular. She has glossy black short bob hair, chin-length to just above the shoulders, natural bangs, side locks framing her face, amber to golden-brown eyes, a face between cute and dignified, slightly sharp eyes, composed serious expression, clean and refined presence, approachable warmth hidden beneath a strict first impression.\n\nShe wears a black-and-white Chinese martial arts outfit: a white standing-collar top with black trim, black frog buttons or knotted closures down the center, black side panels from the shoulders and underarms to the waist, practical sleeves between three-quarter length and long sleeves with black cuffs, a white front apron-like martial cloth with black trim, short black side cloth panels at the hips, fitted black leggings, and white-and-black lightweight Chinese martial arts shoes with thin soles. Use only a very small amount of gold ornament if needed; the main palette must remain white and black.\n\nHer posture is upright and martial, calm but ready, one hand resting near her hip and the other relaxed, back straight, shoulders natural, legs lightly apart, no exaggerated sexy pose. She should feel like a serious young kung fu practitioner who looks a little hard to approach at first, but is actually kind and straightforward.\n\nHigh-quality Japanese anime light novel character illustration, clean linework, full body visible from head to shoes, readable silhouette, soft cel shading, neutral white or light gray background, no text, no logo, no watermark."},{"head":"Negative Prompt","kind":"negative","origLang":"en","ja":"子供、ティーンエイジャー、中年女性、老女、過度に成熟した顔、過度にセクシーな身体、巨大な胸、ボディビルダー体型、太い筋肉、極端に痩せた身体、ちび、マスコット、ロングヘア、ツインテール、ポニーテール、姫カット、金髪、赤髪、青髪、丸く幼い目、冷たい悪役顔、邪悪な笑み、メイド服、学生服、アイドル衣装、現代のジャージ、ジム服、ドレス、深いスリットのチャイナドレス、露出の多い衣装、素脚、素足、サンダル、ハイヒール、ブーツ、鎧、ファンタジーのローブ、武器、剣、杖、獣耳、尻尾、翼、過剰な宝飾、過剰な金、カラフルな衣装、赤基調の衣装、青基調の衣装、背景の群衆、余分な手足、歪んだ手、6本指、欠けた指、見切れた身体、ぼやけ、文字、ロゴ、透かし","en":"child, teenager, middle-aged woman, old woman, overly mature face, overly sexy body, huge breasts, bodybuilder physique, bulky muscles, extremely skinny body, chibi, mascot, long hair, twin tails, ponytail, hime cut, blonde hair, red hair, blue hair, round childish eyes, cold villain face, evil grin, maid outfit, school uniform, idol costume, modern tracksuit, gym clothes, dress, qipao dress with high slit, revealing outfit, bare legs, bare feet, sandals, high heels, boots, armor, fantasy robe, weapon, sword, staff, animal ears, tail, wings, excessive jewelry, excessive gold, colorful outfit, red dominant outfit, blue dominant outfit, background crowd, extra limbs, distorted hands, six fingers, missing fingers, cropped body, blurry, text, logo, watermark"}]},{"id":"p08","file":"小鈴_基礎動作三方向GIF_マネキンプロンプト.md","character":"xiaoling","charLabel":"小鈴（シャオリン）","title":"小鈴 基礎動作三方向GIF マネキンプロンプト","intro":"小鈴の基礎動作を、正面・左側面・右側面の3方向で連番化し、GIFで一貫した動きになっているか確認するための白い3Dデッサン人形プロンプト。\n戻り動作は生成しない。\nGIF化するときに `01 -\u003e 02 -\u003e 03 -\u003e 02 -\u003e 01` の順で並べる。\n1. 承認済みの小鈴用体格マネキン四面図。\n2. 承認済みの小鈴用基本構えマネキン。\n参考画像は体格、頭身、関節位置、足幅、基本構えの正本として使用する。\n小鈴の髪や衣装はまだ使用しない。","blocks":[{"head":"共通プロンプト","kind":"prompt","origLang":"ja","ja":"添付した小鈴用の白い3D体格マネキンと基本構えマネキンを使用し、指定した基礎動作を正面、左側面、右側面の3方向で確認できる連番ポーズ資料として作成してください。\n\n【目的】\n小鈴の戦闘イラストを作る前に、白い3Dデッサン人形で動作の一貫性を確認するための資料です。\n完成イラストではなく、支持脚、重心、関節、身体の回転、手足の軌道、顔と視線を検証するためのマネキン連番です。\n\n【出力形式】\n・指定した1つの基礎動作だけを作成する\n・正面、左側面、右側面の3方向を作成する\n・各方向につき3ステップを作成する\n・合計9体の白い3Dデッサン人形を、一枚の3列×3行シートに配置する\n・列は左から、正面、左側面、右側面\n・行は上から、01構え、02動作途中、03到達\n・各パネルにマネキン一体だけ\n・全パネルで同じ体格、頭身、関節構造\n・全パネルで同じアイレベル、床面、人物サイズ\n・各パネル内に頭頂、両手、両足を完全に収める\n・手足をパネル境界で切らない\n・細い境界線でパネルを区切る\n・画像内には小さな番号だけを入れてよい\n・技名、説明文、方向名、ロゴ、透かしは入れない\n\n【ステップ】\n01構え:\n・小鈴の基本武術構え\n・左脚前、右脚後ろ\n・両足接地\n・顔と視線は技の方向\n・動作開始前の静かな姿勢\n\n02動作途中:\n・構えから技へ移る途中\n・支持脚、重心移動、骨盤、胸郭、肩、手足の軌道を見せる\n・01と03の中間として自然につながる\n\n03到達:\n・攻撃、受け、移動、回転が成立する最大伸展または接触直前\n・関節を伸ばし切らない\n・支持脚と重心を成立させる\n・顔と視線は技の到達方向\n\n【戻り動作について】\n・引き戻し動作は生成しない\n・GIFでは 01 -\u003e 02 -\u003e 03 -\u003e 02 -\u003e 01 の順で確認する\n・そのため、02は行きと戻りの両方に使える自然な中間姿勢にする\n\n【マネキン】\n・承認済みの小鈴用体格マネキンと同じ成人女性型\n・21歳相当\n・自然なアニメ調約7.3頭身\n・しなやかで均整の取れた健康的な武術体型\n・細すぎず、筋肉質すぎない\n・白または明るい灰色のマット樹脂素材\n・頭部、胸郭、骨盤に薄い中心線\n・肩、肘、手首、股関節、膝、足首を明確にする\n・手は五本指を簡潔に分ける\n・両足は閉じた格闘靴型の簡略形状\n\n【構図補助】\n・薄い床面と接地影を入れ、足裏の位置と重心を確認できるようにする\n・全パネルでアイレベル、床の高さ、カメラ距離、人物サイズを統一する\n・前景の手足だけを巨大化させず、肩、肘、股関節、膝との接続を残す\n・床面上の足位置、骨盤、胸郭、頭部の奥行き関係が読めるようにする\n\n【重心と力線】\n・支持脚を床へ完全に接地させる\n・支持脚の膝を軽く緩める\n・重心線が支持脚または両足の間へ落ちるようにする\n・攻撃動作は、足、膝、骨盤、背骨、肩、肘、手先または足先まで一本の力線としてつなげる\n・上体だけ、腕だけ、脚だけの動作にしない\n\n【顔と視線】\n・顔と視線はカメラではなく、技の到達方向を見る\n・鼻先、顎、両目を技の方向へそろえる\n・側面でも首だけをカメラへ向けない\n・回転動作では、顔と視線を身体の回転より少し先行させる\n\n【禁止事項】\n髪、衣装、前垂れ、レギンス、靴、装飾、武器、敵、\n完成イラスト風の顔や配色、背景、エフェクト、\n同じポーズの繰り返し、3方向の混同、左右の入れ替え、\n戻り動作の追加、4ステップ以上の連番、別の動作との混合、\n余分な腕や脚、六本指、欠けた指、融合した指、\n折れた手首、逆関節、反転した足首、浮いた支持脚、\n膝と足先の不一致、身体から切断して見える手足、\n技名、説明文、方向名、ロゴ、透かし","en":"Using the attached white 3D build mannequin and basic-stance mannequin for Xiaoling, create a numbered pose reference that lets you check the specified basic motion from three directions: front, left side, and right side.\n\n[Purpose]\nThis is a reference for checking the consistency of a motion with a white 3D drawing mannequin before making Xiaoling\u0027s battle illustrations.\nIt is not a finished illustration, but a numbered mannequin series for verifying the supporting leg, center of gravity, joints, body rotation, limb trajectory, and face/gaze.\n\n[Output format]\n- Create only one specified basic motion\n- Create three directions: front, left side, right side\n- Create 3 steps per direction\n- Arrange a total of 9 white 3D drawing mannequins in a single 3-column x 3-row sheet\n- Columns from left: front, left side, right side\n- Rows from top: 01 stance, 02 mid-motion, 03 reach\n- Only one mannequin per panel\n- Same build, head ratio, and joint structure across all panels\n- Same eye level, floor plane, and figure size across all panels\n- Fully fit the top of the head and both hands and feet within each panel\n- Do not cut limbs at the panel borders\n- Divide the panels with thin borders\n- Only small numbers may be placed inside the image\n- Do not add technique names, descriptions, direction names, logo, or watermark\n\n[Steps]\n01 Stance:\n- Xiaoling\u0027s basic martial-arts stance\n- Left leg forward, right leg back\n- Both feet planted\n- Face and gaze toward the technique direction\n- A quiet posture before the motion starts\n\n02 Mid-motion:\n- Mid-way from the stance into the technique\n- Show the supporting leg, weight shift, pelvis, rib cage, shoulders, and limb trajectory\n- Connects naturally as the midpoint between 01 and 03\n\n03 Reach:\n- Maximum extension or just before contact where the attack, block, movement, or rotation is established\n- Do not fully lock out the joints\n- Establish the supporting leg and center of gravity\n- Face and gaze toward where the technique reaches\n\n[About the return motion]\n- Do not generate the pull-back motion\n- In the GIF, check in the order 01 -\u003e 02 -\u003e 03 -\u003e 02 -\u003e 01\n- Therefore, make 02 a natural midpoint usable for both the outgoing and returning motion\n\n[Mannequin]\n- The same adult female type as the approved Xiaoling build mannequin\n- Equivalent to 21 years old\n- About 7.3 heads tall in a natural anime style\n- A supple, well-proportioned, healthy martial-arts physique\n- Not too thin, not too muscular\n- White or light gray matte resin material\n- Faint center lines on head, rib cage, and pelvis\n- Clearly mark shoulders, elbows, wrists, hips, knees, and ankles\n- Hands simply separated into five fingers\n- Both feet as simplified closed fighting-shoe shapes\n\n[Composition support]\n- Add a faint floor plane and contact shadow so the sole positions and center of gravity can be checked\n- Unify eye level, floor height, camera distance, and figure size across all panels\n- Do not enlarge only the foreground hands/feet; keep the connection to shoulders, elbows, hips, and knees\n- Make the depth relationship of foot position, pelvis, rib cage, and head readable\n\n[Center of gravity and force lines]\n- Plant the supporting leg fully on the floor\n- Keep the supporting leg\u0027s knee slightly relaxed\n- Let the line of gravity fall onto the supporting leg or between both feet\n- Connect attacking motions as a single force line from foot, knee, pelvis, spine, shoulder, elbow, and out to the hand or foot tip\n- Do not make it a motion of only the upper body, only the arms, or only the legs\n\n[Face and gaze]\n- The face and gaze look toward where the technique reaches, not the camera\n- Align the nose tip, chin, and both eyes with the technique\u0027s direction\n- Even from the side, do not turn only the neck toward the camera\n- In rotational motions, lead the face and gaze slightly ahead of the body\u0027s rotation\n\n[Prohibited]\nHair, outfit, front cloth, leggings, shoes, ornaments, weapons, enemies,\nfinished-illustration-style face or colors, background, effects,\nrepeating the same pose, confusing the 3 directions, swapping left/right,\nadding a return motion, a series of 4 or more steps, mixing with another motion,\nextra arms or legs, six fingers, missing fingers, fused fingers,\nbroken wrists, reversed joints, flipped ankles, floating supporting leg,\nmismatched knee and foot tip, limbs that look severed from the body,\ntechnique names, descriptions, direction names, logo, watermark"},{"head":"01 前手直突き","kind":"block","origLang":"ja","ja":"上記の共通条件で、01 前手直突きを作成してください。\n\n【動作】\n左脚を前、右脚を後ろにした構えから、左前手の拳を相手の中心へまっすぐ突き出す。\n\n【参考画像の使い方】\n・連続動作参考画像を使う場合は、左上の1→2→3の直突き連続部分だけを参考にする\n・01は構え、02は左拳が伸び始める途中、03は左拳が相手の中心へ届く直前として扱う\n・中央の大きく誇張された直突きポーズは、動きの勢いだけを参考にし、上体前傾や踏み込みを強くしすぎない\n・単発ポーズ画像は、前手と後手の役割、拳・肘・肩の接続だけを低優先の補助として参考にする\n・足幅、支持脚、重心、左右の脚位置は小鈴の基本武術構えマネキンを正本にする\n01構え:\n・左脚前、右脚後ろ\n・左拳は前方、顎から胸の高さ\n・右拳は顔または胸の近くで守る\n\n02動作途中:\n・左拳が前方へ伸び始める\n・左肩が少し前へ出る\n・後ろ足と骨盤から力が伝わる\n・右拳は守りに残る\n\n03到達:\n・左拳が相手の中心へ届く直前\n・左肘は完全に伸ばし切らない\n・肩、肘、手首、拳を自然につなげる\n・拳で顔を完全に隠さない","en":"Under the common conditions above, create 01 lead-hand straight punch.\n\n[Motion]\nFrom a stance with the left leg forward and right leg back, thrust the left lead-hand fist straight toward the opponent\u0027s center.\n\n[How to use the reference image]\n- If using the motion-sequence reference image, use only the 1 -\u003e 2 -\u003e 3 straight-punch sequence in the upper-left area\n- Treat 01 as the stance, 02 as the moment when the left fist begins to extend, and 03 as just before the left fist reaches the opponent\u0027s center\n- Use the large exaggerated straight-punch pose in the center only for the sense of momentum; do not overdo the forward lean or step-in\n- Use single-pose images only as low-priority support for the roles of the lead hand and guard hand, and for the fist-elbow-shoulder connection\n- Use Xiaoling\u0027s basic martial-arts stance mannequin as the master for foot width, supporting leg, center of gravity, and left/right leg positions\n01 Stance:\n- Left leg forward, right leg back\n- Left fist forward, at chin-to-chest height\n- Right fist guarding near the face or chest\n\n02 Mid-motion:\n- The left fist begins to extend forward\n- The left shoulder comes slightly forward\n- Force transmits from the rear foot and pelvis\n- The right fist stays in guard\n\n03 Reach:\n- Just before the left fist reaches the opponent\u0027s center\n- Do not fully lock out the left elbow\n- Connect shoulder, elbow, wrist, and fist naturally\n- Do not fully hide the face with the fist"},{"head":"02 後手直突き","kind":"block","origLang":"ja","ja":"上記の共通条件で、02 後手直突きを作成してください。\n\n【動作】\n左脚前、右脚後ろの構えから、右後手の拳を前方へ突き出す。\n\n01構え:\n・左脚前、右脚後ろ\n・左手は前、右拳は頬から胸の近く\n\n02動作途中:\n・右後足で床を押す\n・右膝、骨盤、背骨、右肩が前方へ連動する\n・左拳は顔の近くで守る\n\n03到達:\n・右拳が相手の中心へ届く直前\n・右後足、右膝、骨盤、背骨、右肩、右肘、右拳を一本の力線へつなげる\n・右肘を伸ばし切らない\n・左拳は守りに残す","en":"Under the common conditions above, create 02 rear-hand straight punch.\n\n[Motion]\nFrom a stance with the left leg forward and right leg back, thrust the right rear-hand fist forward.\n\n01 Stance:\n- Left leg forward, right leg back\n- Left hand forward, right fist near the cheek to chest\n\n02 Mid-motion:\n- Push the floor with the right rear foot\n- The right knee, pelvis, spine, and right shoulder link forward\n- The left fist guards near the face\n\n03 Reach:\n- Just before the right fist reaches the opponent\u0027s center\n- Connect the right rear foot, right knee, pelvis, spine, right shoulder, right elbow, and right fist into a single force line\n- Do not fully lock out the right elbow\n- Keep the left fist in guard"},{"head":"03 穿掌","kind":"block","origLang":"ja","ja":"上記の共通条件で、03 穿掌を作成してください。\n\n【動作】\n開いた掌を前方へ差し込むように突き出す。\n\n01構え:\n・左脚前、右脚後ろ\n・前の手は軽く開く\n・後ろの手は胸の近くで守る\n\n02動作途中:\n・掌が相手の中心線へ差し込まれる\n・指先、手首、肘、肩が一つの線へ近づく\n・骨盤と胸郭が技の方向へつながる\n\n03到達:\n・掌が前方へ伸びる\n・指先から掌全体へ穿つ動き\n・手首を反らしすぎない\n・四本指と親指一本を明確に分ける","en":"Under the common conditions above, create 03 piercing palm.\n\n[Motion]\nThrust an open palm forward as if inserting it.\n\n01 Stance:\n- Left leg forward, right leg back\n- The front hand lightly open\n- The rear hand guarding near the chest\n\n02 Mid-motion:\n- The palm is inserted toward the opponent\u0027s center line\n- Fingertips, wrist, elbow, and shoulder approach a single line\n- The pelvis and rib cage link toward the technique\u0027s direction\n\n03 Reach:\n- The palm extends forward\n- A piercing motion from the fingertips through the whole palm\n- Do not over-bend the wrist\n- Clearly separate the four fingers and one thumb"},{"head":"04 前蹴り","kind":"block","origLang":"ja","ja":"上記の共通条件で、04 前蹴りを作成してください。\n\n【動作】\n支持脚で立ち、膝を引き上げてから、踵または足裏で前方を押す。\n\n01構え:\n・左脚前、右脚後ろ\n・両手で中心線を守る\n\n02動作途中:\n・蹴り脚の膝を先に引き上げる\n・支持脚を床へ完全に接地する\n・骨盤を前へ送りすぎない\n・両手は顔または胸の近くへ残す\n\n03到達:\n・踵または足裏で前方を押す\n・蹴り脚の股関節、膝、足首、踵を同じ進行面へ置く\n・上体は蹴り方向と反対へわずかに傾けるが、反りすぎない\n・横蹴りや回し蹴りにしない","en":"Under the common conditions above, create 04 front kick.\n\n[Motion]\nStand on the supporting leg, raise the knee, then push forward with the heel or sole.\n\n01 Stance:\n- Left leg forward, right leg back\n- Guard the center line with both hands\n\n02 Mid-motion:\n- Raise the knee of the kicking leg first\n- Plant the supporting leg fully on the floor\n- Do not push the pelvis too far forward\n- Keep both hands near the face or chest\n\n03 Reach:\n- Push forward with the heel or sole\n- Place the hip, knee, ankle, and heel of the kicking leg on the same plane of travel\n- Tilt the upper body slightly opposite to the kick direction, but do not over-arch\n- Do not make it a side kick or roundhouse kick"},{"head":"05 横蹴り","kind":"block","origLang":"ja","ja":"上記の共通条件で、05 横蹴りを作成してください。\n\n【動作】\n軸足で立ち、股関節を開いて、踵または足刀を横方向へ伸ばす。\n\n01構え:\n・左脚前、右脚後ろ\n・両手で中心線を守る\n\n02動作途中:\n・膝を横方向へ引き上げる\n・軸足を床へ完全に接地する\n・骨盤を横へ開く\n\n03到達:\n・踵または足刀を横方向へ出す\n・蹴り脚の股関節、膝、足首、足先を同じ面へ置く\n・上体を蹴り脚と反対側へ自然に倒し、重心を軸足上へ残す\n・完全な水平開脚や舞踊的な姿勢にしない","en":"Under the common conditions above, create 05 side kick.\n\n[Motion]\nStand on the pivot foot, open the hip, and extend the heel or foot-blade sideways.\n\n01 Stance:\n- Left leg forward, right leg back\n- Guard the center line with both hands\n\n02 Mid-motion:\n- Raise the knee sideways\n- Plant the pivot foot fully on the floor\n- Open the pelvis to the side\n\n03 Reach:\n- Send the heel or foot-blade out sideways\n- Place the hip, knee, ankle, and foot tip of the kicking leg on the same plane\n- Lean the upper body naturally to the opposite side of the kicking leg, keeping the center of gravity over the pivot foot\n- Do not make it a full horizontal split or dance-like posture"},{"head":"06 円掌受け","kind":"block","origLang":"ja","ja":"上記の共通条件で、06 円掌受けを作成してください。\n\n【動作】\n掌で円を描くように相手の力を受け流す。\n\n01構え:\n・左脚前、右脚後ろ\n・前の手は胸から肩の高さ\n・後ろの手は身体の中心を守る\n\n02動作途中:\n・掌が外から内、または内から外へ円を描く\n・肩甲骨、胸郭、骨盤が受け流し方向へ少し回る\n・反対の手は守りに残す\n\n03到達:\n・掌で力を斜め外または斜め下へ逃がす\n・手首を折りすぎない\n・掌の向きと親指の位置を一致させる\n・顔と視線は受け流す方向へ向ける","en":"Under the common conditions above, create 06 circular palm parry.\n\n[Motion]\nParry the opponent\u0027s force with the palm drawing a circle.\n\n01 Stance:\n- Left leg forward, right leg back\n- The front hand at chest-to-shoulder height\n- The rear hand guarding the body\u0027s center\n\n02 Mid-motion:\n- The palm draws a circle from outside to inside, or inside to outside\n- The shoulder blades, rib cage, and pelvis rotate slightly toward the parry direction\n- The other hand stays in guard\n\n03 Reach:\n- The palm guides the force diagonally outward or downward\n- Do not over-bend the wrist\n- Match palm orientation with thumb position\n- Face and gaze toward the parry direction"},{"head":"07 退歩","kind":"block","origLang":"ja","ja":"上記の共通条件で、07 退歩を作成してください。\n\n【動作】\n相手の力を引き込みながら、一歩後退して重心を移す。\nこれは攻撃の引き戻しではなく、独立した後退歩法です。\n\n01構え:\n・左脚前、右脚後ろ\n・両手は中心線を守る\n\n02動作途中:\n・後脚へ重心を移し始める\n・前脚を軽く引く\n・両手は相手の力を斜め後ろまたは下へ導く\n\n03到達:\n・重心が後脚へ移る\n・前脚は軽く接地または次の動作へ移れる位置\n・背骨を保ち、腰だけを引かない\n・前進攻撃に見せない","en":"Under the common conditions above, create 07 retreating step.\n\n[Motion]\nWhile pulling in the opponent\u0027s force, step back one step and shift the center of gravity.\nThis is not the pull-back of an attack, but an independent retreating footwork.\n\n01 Stance:\n- Left leg forward, right leg back\n- Both hands guard the center line\n\n02 Mid-motion:\n- Begin shifting the center of gravity onto the rear leg\n- Lightly draw back the front leg\n- Both hands guide the opponent\u0027s force diagonally back or down\n\n03 Reach:\n- The center of gravity moves onto the rear leg\n- The front leg lightly planted or positioned to move into the next motion\n- Keep the spine; do not pull back only the hips\n- Do not make it look like a forward attack"},{"head":"08 旋身換歩","kind":"block","origLang":"ja","ja":"上記の共通条件で、08 旋身換歩を作成してください。\n\n【動作】\n軸足を使って身体を回転させ、足位置を入れ替える途中の動作。\n\n01構え:\n・左脚前、右脚後ろ\n・両手は中心線を守る\n\n02動作途中:\n・軸足を床へ接地したまま身体を回転させる\n・骨盤、胸郭、肩が同じ回転方向へつながる\n・顔と視線は回転方向へ少し先行する\n\n03到達:\n・足位置が入れ替わり、次の攻撃または受けへ移れる\n・片手は守り、片手は次の動作へ移る位置\n・重心が浮かない\n・跳躍や舞踊ポーズにしない","en":"Under the common conditions above, create 08 turning body, changing step.\n\n[Motion]\nA motion mid-way through rotating the body with the pivot foot and swapping foot positions.\n\n01 Stance:\n- Left leg forward, right leg back\n- Both hands guard the center line\n\n02 Mid-motion:\n- Rotate the body while keeping the pivot foot planted on the floor\n- The pelvis, rib cage, and shoulders link in the same direction of rotation\n- The face and gaze lead slightly ahead of the rotation direction\n\n03 Reach:\n- The foot positions are swapped, ready to move into the next attack or block\n- One hand guards; one hand is positioned for the next motion\n- The center of gravity does not float\n- Do not make it a jump or dance pose"},{"head":"GIF作成時のフレーム順","kind":"block","origLang":"ja","ja":"01構え -\u003e 02途中 -\u003e 03到達 -\u003e 02途中 -\u003e 01構え","en":"01 stance -\u003e 02 mid -\u003e 03 reach -\u003e 02 mid -\u003e 01 stance"},{"head":"GIF作成時のフレーム順","kind":"block","origLang":"ja","ja":"python \"C:\\モデルイラスト生成ワークフロー\\04_gif_tools\\make_preview_gif.py\" `\n  --frames `\n  \"正面_01構え.png\" `\n  \"正面_02途中.png\" `\n  \"正面_03到達.png\" `\n  \"正面_02途中.png\" `\n  \"正面_01構え.png\" `\n  --out \"小鈴_01前手直突き_正面_確認.gif\" `\n  --duration 180","en":"python \"C:\\モデルイラスト生成ワークフロー\\04_gif_tools\\make_preview_gif.py\" `\n  --frames `\n  \"front_01stance.png\" `\n  \"front_02mid.png\" `\n  \"front_03reach.png\" `\n  \"front_02mid.png\" `\n  \"front_01stance.png\" `\n  --out \"Xiaoling_01lead-straight_front_check.gif\" `\n  --duration 180"}]},{"id":"p09","file":"小鈴_実戦基礎動作_八方向プロンプト.md","character":"xiaoling","charLabel":"小鈴（シャオリン）","title":"小鈴 実戦基礎動作 八方向プロンプト","intro":"小鈴をキャラクター化する前に、白い3Dデッサン人形で実戦的な基本動作を確認するためのプロンプト。\n1. 承認済みの小鈴用体格マネキン四面図。\n2. 必要に応じて、小鈴の基本武術構えマネキン。\n参考画像は体格、頭身、関節位置の正本として使用する。小鈴の髪や衣装はまだ使用しない。","blocks":[{"head":"一括生成プロンプト","kind":"prompt","origLang":"ja","ja":"添付した小鈴用の白い3D体格マネキンを使い、実戦的な中華武術の基本動作8種類を、一枚のポーズ資料として作成してください。\n\n【目的】\n小鈴の完成イラストや固有技を制作する前に、支持脚、重心、関節、身体の回転、カメラ方向を確認するための資料です。\n決めポーズではなく、攻撃や受け流しが成立する直前または途中の実用的な動作を描いてください。\n\n【出力形式】\n・一枚の16:9横長モデルシート\n・上段4パネル、下段4パネル\n・上段左から01、02、03、04\n・下段左から05、06、07、08\n・各パネルに白い3Dデッサン人形を一体だけ配置\n・一体につき一つの動作だけ\n・人物同士を重ねない\n・各パネル内に頭頂、両手、両足を完全に収める\n・手足をパネル境界で切らない\n・全パネルで同じ体格、頭身、関節構造\n・細い境界線でパネルを区切る\n・各パネル左上に小さく01から08の番号だけを表示\n・技名、説明文、方向名は画像内へ入れない\n\n【マネキン】\n・承認済みの小鈴用体格マネキンと同じ成人女性型\n・21歳相当\n・自然なアニメ調約7.3頭身\n・しなやかで均整の取れた健康的な武術体型\n・肩幅は標準からやや華奢\n・細すぎず、筋肉質すぎない\n・白または明るい灰色のマット樹脂素材\n・頭部、胸郭、骨盤に薄い中心線\n・肩、肘、手首、股関節、膝、足首を明確にする\n・手は五本指を簡潔かつ明瞭に分ける\n・両足は閉じた格闘靴型の簡略形状\n\n【全動作共通】\n・右利きを基本とする\n・左脚を前、右脚を後ろにした構えを出発点とする\n・攻撃または受け流しの力を、接地足から骨盤、背骨、肩または股関節へつなげる\n・支持脚を明確にする\n・重心線が支持脚または両足の間へ落ちるようにする\n・攻撃していない手は顔または身体の中心線を守る\n・顔と視線はカメラではなく技の到達方向を見る\n・上体だけで動かず、脚と骨盤を使う\n・人体として実行可能な関節角度にする\n\n【構図補助】\n・薄い床面と接地影を入れ、足裏の位置と重心を確認できるようにする\n・遠近がある動作では、画面内にアイレベルを想定し、攻撃方向または身体の奥行き方向に消失点を置く\n・前景の手足だけを巨大化させず、肩、肘、股関節、膝との接続を残す\n・床面上の足位置、骨盤、胸郭、頭部の奥行き関係が読めるようにする\n・攻撃動作は、足、膝、骨盤、背骨、肩、肘、手先または足先まで一本の力線としてつなげる\n\n【開いた掌】\n・四本指と親指一本の合計五本\n・掌の向きと親指の位置を一致させる\n・指を極端に開かない\n・手首を折りすぎない\n\n【拳】\n・四本の指を内側へ握る\n・親指を四本の指の外側へ添える\n・拳から指を突き出さない\n・手首を前腕の延長上へ置く\n\n【蹴り】\n・支持脚を床へ完全に接地させる\n・支持脚の膝を軽く緩める\n・蹴り脚の股関節、膝、足首を自然につなげる\n・膝と足先を技として正しい方向へそろえる\n・足裏を内側へ反転させない\n・前蹴りと横蹴りを混同しない\n\n【背景】\n・各パネルは均一な薄いグレー背景\n・水平な薄い床面\n・弱い接地影\n・柔らかなスタジオ照明\n・クリーンな3D人体デッサン教材風\n\n【01 正面：弓歩直突き】\nカメラは人物の正面。\n左脚を前、右脚を後ろに置く。\n前脚を曲げ、後脚で床を押す。\n右拳または左拳を相手の中心へ肩から胸の高さで突き出す。\n反対の手は胸の近くへ引き、守りを残す。\n正面からも両脚の前後差と骨盤の回転が分かるようにする。\n\n【02 右前方45度：穿掌】\nカメラは人物の右前方45度。\n前方へ開いた掌を差し込むように突き出す。\n掌根ではなく、指先から掌全体へ伸びる穿つ動作。\n指先、手首、肘、肩を一つの線へつなげる。\n反対の手は胸の近くで中心線を守る。\n手首を反らしすぎず、掌の向きと親指の位置を明確にする。\n\n【03 右側面：前蹴り】\nカメラは人物の右側面。\n右脚を支持脚にする。\n左膝を先に引き上げ、左足の踵または足裏で前方を押す。\n左股関節、膝、足首、踵を同じ進行面へ置く。\n上体は蹴り方向と反対へわずかに傾けるが、反りすぎない。\n右足裏を床へ完全に接地させ、重心線を右支持脚へ落とす。\n両手で中心線を守る。\n横蹴りや回し蹴りにしない。\n\n【04 右後方45度：横蹴り】\nカメラは人物の右後方45度。\n軸足を接地し、蹴り脚を横方向へ伸ばす。\n蹴り足の踵または足刀を接触部位にする。\n骨盤を横へ開き、膝と足先を同じ方向へそろえる。\n上体を蹴り脚と反対側へ自然に倒し、重心を軸足上へ残す。\n両手は、顔を守る手とバランスを取る手に分ける。\n舞踊的な大開脚にしない。\n\n【05 背面：円掌受け】\nカメラは人物の真後ろ。\n片方の掌で外から内へ、または内から外へ円を描くように受け流す。\n肩甲骨、背骨、骨盤の回転が分かるようにする。\n反対の手は胸または顔の近くへ残す。\n首だけをカメラへ振り返らせない。\n視線は受け流す方向へ向ける。\n\n【06 左後方45度：双掌押し】\nカメラは人物の左後方45度。\n両掌を前方へ押し出す。\n左右の掌を同じ高さに完全固定せず、自然な前後差を付ける。\n両肘を伸ばし切らない。\n後足から骨盤、背骨、両肩、両掌へ力をつなげる。\n顔は掌の間から技の方向を見る。\n\n【07 左側面：退歩引化】\nカメラは人物の左側面。\n相手の力を引き込みながら一歩後退する動作。\n後脚へ重心を移し、前脚を軽く引く。\n両手は相手の力を下または斜め後ろへ導くように配置する。\n前進攻撃に見せない。\n背骨を保ち、腰だけを引かない。\n\n【08 左前方45度：旋身換歩】\nカメラは人物の左前方45度。\n軸足を接地し、身体を回転させながら足位置を入れ替える途中。\n軸足、骨盤、胸郭、肩、顔と視線を同じ回転方向へつなげる。\n顔と視線は身体の回転より少し先行する。\n片手は守り、片手は次の攻撃または受けへ移る位置。\n回転しながらも支持脚と重心を明確にする。\n跳躍や舞踊ポーズにしない。\n\n【禁止事項】\n髪、衣装、前垂れ、レギンス、靴、装飾、武器、敵、\nキャラクターの顔や配色、完成イラスト風の衣装、\n8体すべて同じポーズ、同じカメラ方向、方向の重複、\n決めポーズ、威嚇姿勢、非実用的な大開脚、\n余分な腕や脚、六本指、欠けた指、融合した指、\n二重の手、折れた手首、逆関節、反転した足首、\n浮いた支持脚、膝と足先の不一致、身体から切断して見える手足、\n番号以外の文字、技名、ロゴ、透かし","en":"Using the attached white 3D build mannequin for Xiaoling, create 8 practical basic Chinese martial-arts motions as a single pose-reference sheet.\n\n[Purpose]\nThis is a reference for checking the supporting leg, center of gravity, joints, body rotation, and camera direction before producing Xiaoling\u0027s finished illustrations or signature techniques.\nDraw practical motions at the instant just before or during an attack or parry, not decorative finishing poses.\n\n[Output format]\n- A single 16:9 landscape model sheet\n- Top row 4 panels, bottom row 4 panels\n- Top row from left: 01, 02, 03, 04\n- Bottom row from left: 05, 06, 07, 08\n- Place only one white 3D drawing mannequin per panel\n- One motion per figure\n- Do not overlap the figures\n- Fully fit the top of the head and both hands and feet within each panel\n- Do not cut limbs at the panel borders\n- Same build, head ratio, and joint structure across all panels\n- Divide the panels with thin borders\n- Show only a small 01-08 number in the top-left of each panel\n- Do not put technique names, descriptions, or direction names inside the image\n\n[Mannequin]\n- The same adult female type as the approved Xiaoling build mannequin\n- Equivalent to 21 years old\n- About 7.3 heads tall in a natural anime style\n- A supple, well-proportioned, healthy martial-arts physique\n- Shoulder width from standard to slightly slender\n- Not too thin, not too muscular\n- White or light gray matte resin material\n- Faint center lines on head, rib cage, and pelvis\n- Clearly mark shoulders, elbows, wrists, hips, knees, and ankles\n- Hands simply and clearly separated into five fingers\n- Both feet as simplified closed martial-arts-shoe shapes\n\n[Common to all motions]\n- Right-handed by default\n- Start from a stance with the left leg forward, right leg back\n- Connect the force of the attack or parry from the planted foot to the pelvis, spine, and shoulder or hip\n- Make the supporting leg clear\n- Let the line of gravity fall onto the supporting leg or between both feet\n- The non-attacking hand guards the face or the body\u0027s center line\n- The face and gaze look toward where the technique reaches, not the camera\n- Do not move with the upper body alone; use the legs and pelvis\n- Keep joint angles anatomically possible\n\n[Composition support]\n- Add a faint floor plane and contact shadow so the sole positions and center of gravity can be checked\n- For motions with depth, assume an eye level within the frame and place the vanishing point along the attack direction or the body\u0027s depth axis\n- Do not enlarge only the foreground hands/feet; keep the connection to shoulders, elbows, hips, and knees\n- Make the depth relationship of foot position, pelvis, rib cage, and head readable\n- Connect attacking motions as a single force line from foot, knee, pelvis, spine, shoulder, elbow, and out to the hand or foot tip\n\n[Open palm]\n- Four fingers plus one thumb, five total\n- Match palm orientation with thumb position\n- Do not spread the fingers extremely\n- Do not over-bend the wrist\n\n[Fist]\n- The four fingers curl inward\n- The thumb rests on the outside of the four fingers\n- Do not poke fingers out of the fist\n- Place the wrist in line with the forearm\n\n[Kick]\n- Plant the supporting leg fully on the floor\n- Keep the supporting leg\u0027s knee slightly relaxed\n- Connect the hip, knee, and ankle of the kicking leg naturally\n- Align the knee and foot tip in the correct direction for the technique\n- Do not flip the sole inward\n- Do not confuse a front kick with a side kick\n\n[Background]\n- Each panel has a uniform light gray background\n- Horizontal light floor plane\n- Weak contact shadow\n- Soft studio lighting\n- A clean 3D anatomy drawing-study look\n\n[01 Front: bow-stance straight punch]\nCamera at the figure\u0027s front.\nLeft leg forward, right leg back.\nBend the front leg and push the floor with the rear leg.\nThrust the right or left fist toward the opponent\u0027s center at shoulder-to-chest height.\nPull the other hand near the chest, keeping a guard.\nMake the front-back leg offset and pelvis rotation readable even from the front.\n\n[02 Front-right 45 degrees: piercing palm (chuanzhang)]\nCamera at the figure\u0027s front-right 45 degrees.\nThrust an open palm forward as if inserting it.\nA piercing motion extending from the fingertips through the whole palm, not the palm heel.\nConnect fingertips, wrist, elbow, and shoulder into one line.\nThe other hand guards the center line near the chest.\nDo not over-bend the wrist; make palm orientation and thumb position clear.\n\n[03 Right side: front kick]\nCamera at the figure\u0027s right side.\nMake the right leg the supporting leg.\nRaise the left knee first, then push forward with the left heel or sole.\nPlace the left hip, knee, ankle, and heel on the same plane of travel.\nTilt the upper body slightly opposite to the kick direction, but do not over-arch.\nPlant the right sole fully on the floor and drop the line of gravity onto the right supporting leg.\nGuard the center line with both hands.\nDo not make it a side kick or roundhouse kick.\n\n[04 Rear-right 45 degrees: side kick]\nCamera at the figure\u0027s rear-right 45 degrees.\nPlant the pivot foot and extend the kicking leg sideways.\nMake the heel or foot-blade of the kicking foot the contact point.\nOpen the pelvis to the side and align the knee and foot tip in the same direction.\nLean
