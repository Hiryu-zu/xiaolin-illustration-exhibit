the upper body naturally to the opposite side of the kicking leg, keeping the center of gravity over the pivot foot.\nSplit the hands into one guarding the face and one taking balance.\nDo not make it a dance-like full split.\n\n[05 Back: circular palm parry]\nCamera directly behind the figure.\nParry by drawing a circle with one palm from outside to inside, or inside to outside.\nMake the rotation of the shoulder blades, spine, and pelvis readable.\nKeep the other hand near the chest or face.\nDo not turn only the neck back toward the camera.\nDirect the gaze toward the parry direction.\n\n[06 Rear-left 45 degrees: double-palm push]\nCamera at the figure\u0027s rear-left 45 degrees.\nPush both palms forward.\nDo not fully fix both palms at the same height; add a natural front-back offset.\nDo not fully extend both elbows.\nConnect the force from the rear foot to the pelvis, spine, both shoulders, and both palms.\nThe face looks toward the technique\u0027s direction from between the palms.\n\n[07 Left side: retreating-step neutralizing (tuibu yinhua)]\nCamera at the figure\u0027s left side.\nA motion of stepping back one step while pulling in the opponent\u0027s force.\nShift the center of gravity to the rear leg and lightly draw back the front leg.\nPosition both hands to guide the opponent\u0027s force downward or diagonally backward.\nDo not make it look like a forward attack.\nKeep the spine; do not pull back only the hips.\n\n[08 Front-left 45 degrees: turning body, changing step (xuanshen huanbu)]\nCamera at the figure\u0027s front-left 45 degrees.\nMid-way through planting the pivot foot and swapping foot positions while rotating the body.\nConnect the pivot foot, pelvis, rib cage, shoulders, and face/gaze in the same direction of rotation.\nThe face and gaze lead slightly ahead of the body\u0027s rotation.\nOne hand guards; one hand moves to the position for the next attack or block.\nKeep the supporting leg and center of gravity clear even while rotating.\nDo not make it a jump or dance pose.\n\n[Prohibited]\nHair, outfit, front cloth, leggings, shoes, ornaments, weapons, enemies,\ncharacter face or color scheme, finished-illustration-style outfit,\nall 8 figures in the same pose, same camera direction, duplicated directions,\nfinishing poses, threatening postures, impractical full splits,\nextra arms or legs, six fingers, missing fingers, fused fingers,\ndouble hands, broken wrists, reversed joints, flipped ankles,\nfloating supporting leg, mismatched knee and foot tip, limbs that look severed from the body,\ntext other than the numbers, technique names, logo, watermark"}]},{"id":"p10","file":"小鈴_顔角度表情シートプロンプト.md","character":"xiaoling","charLabel":"小鈴（シャオリン）","title":"小鈴 顔角度表情シートプロンプト","intro":"小鈴の戦闘イラストで顔、視線、髪型、目つきを安定させるための5×5顔角度リファレンスを作る。\n全身ポーズではなく、顔と首から肩上あたりの角度資料として使う。\n- `03_named_images/小鈴/小鈴_正本立ち絵候補_01.png`\n- 必要なら、ぐるぐる側の `docs/01_画像生成用テンプレ.png`\nテンプレートは角度と配置の参考。小鈴の外見は正本立ち絵を優先する。","blocks":[{"head":"01 目開け・口とじ・通常表情","kind":"block","origLang":"ja","ja":"添付された小鈴のキャラクター参照画像と、5×5顔角度テンプレート画像を参照して、同じキャラクターの5×5顔角度リファレンスシートを作成してください。\n\n【目的】\n小鈴の戦闘イラストで顔の向き、目線、黒髪ショートボブ、琥珀色の瞳、鋭い目つきを安定させるための資料です。\n全身絵ではなく、顔から首、肩上あたりまでの角度資料として作成してください。\n\n【小鈴の固定外見】\n・21歳の成人女性\n・可愛さと凛々しさの中間の顔立ち\n・普段はやや鋭い目つき\n・琥珀色から黄褐色の瞳\n・黒髪ショートボブ\n・長さはあご下から肩に付かない程度\n・前髪あり\n・両サイドに顔を縁取る毛束\n・白い立ち襟の中華武術トップス\n・黒い縁取りと黒いチャイナボタン\n・清潔感があり、凛々しいが親しみやすさもある\n\n【5×5の角度構成】\n画像全体は正方形。\n25個の頭部から肩上アイコンを5列×5行で均等に配置してください。\n背景はシンプルな薄いグレー。\n全マスで同じキャラクター、同じ絵柄、同じ線画、同じ髪型、同じ服装、同じ色で統一してください。\n各マスでは顔と首の角度だけを変えてください。\n\n列方向、左から右:\n1列目: 左向き横顔\n2列目: 左斜め45度\n3列目: 正面\n4列目: 右斜め45度\n5列目: 右向き横顔\n\n行方向、上から下:\n1行目: 強く上を向く\n2行目: 少し上を向く\n3行目: 水平、正面高さ\n4行目: 少し下を向く\n5行目: 強く下を向く\n\n【統一条件】\n・全ての顔の大きさ、頭部スケール、配置バランスを統一する\n・どのマスの顔も同じくらいの大きさに見えるようにする\n・全体のバウンディングボックスを揃える\n・髪型、前髪、サイドの毛束、瞳色、襟、黒い縁取りを変えない\n・顔の角度に合わせて髪と襟も自然に回転させる\n・左右反転時も髪型と衣装の印象を保つ\n\n【表情】\n・全てのマスで目は開ける\n・全てのマスで口は閉じる\n・表情は小鈴らしい通常の凛々しい真顔\n・怒り顔にしすぎない\n・幼い丸目や甘すぎる笑顔にしない\n・冷酷な悪役顔にしない\n\n【画風】\n高品質な日本のアニメ・ノベルゲーム風イラスト、きれいな線画、柔らかなセル塗り、同一キャラクターの顔角度資料、均等な5×5グリッド、薄いグレー背景。\n\n【禁止事項】\n別キャラクターにしない、髪型を変えない、ロングヘアにしない、ツインテールにしない、瞳色を変えない、服装を変えない、表情を大きく変えない、体全体を描かない、背景を複雑にしない、文字、番号、ロゴ、透かしを入れない、5×5以外の配置にしない、同じ角度を繰り返さない、顔のサイズをバラバラにしない、口を開けない、目を閉じない、ウインクしない。","en":"Referring to the attached Xiaoling character reference image and the 5x5 face-angle template image, create a 5x5 face-angle reference sheet of the same character.\n\n[Purpose]\nThis is a reference for stabilizing the face orientation, gaze, black short bob, amber eyes, and sharp eyes of Xiaoling in battle illustrations.\nCreate it not as a full-body picture, but as an angle reference covering from the face to the neck and around the upper shoulders.\n\n[Xiaoling\u0027s fixed appearance]\n- A 21-year-old adult woman\n- A face between cute and dignified\n- Usually slightly sharp eyes\n- Amber to golden-brown eyes\n- Black short bob hair\n- Length from below the chin to just above the shoulders\n- Has bangs\n- Locks of hair framing the face on both sides\n- A white standing-collar Chinese martial-arts top\n- Black trim and black frog buttons\n- Clean and dignified, but also approachable\n\n[5x5 angle layout]\nThe whole image is square.\nEvenly arrange 25 head-and-upper-shoulder icons in 5 columns x 5 rows.\nThe background is a simple light gray.\nUnify the same character, same art style, same line art, same hairstyle, same clothing, and same colors in all cells.\nIn each cell, change only the angle of the face and neck.\n\nColumns, left to right:\nColumn 1: profile facing left\nColumn 2: diagonal left 45 degrees\nColumn 3: front\nColumn 4: diagonal right 45 degrees\nColumn 5: profile facing right\n\nRows, top to bottom:\nRow 1: looking strongly up\nRow 2: looking slightly up\nRow 3: level, front height\nRow 4: looking slightly down\nRow 5: looking strongly down\n\n[Unification conditions]\n- Unify the size of every face, head scale, and placement balance\n- Make the face in every cell look about the same size\n- Align the overall bounding boxes\n- Do not change the hairstyle, bangs, side locks, eye color, collar, or black trim\n- Rotate the hair and collar naturally to match the face angle\n- Keep the impression of the hairstyle and outfit even when mirrored\n\n[Expression]\n- Eyes open in all cells\n- Mouth closed in all cells\n- An expression that is Xiaoling\u0027s usual dignified neutral face\n- Do not make it too angry\n- Do not make childish round eyes or an overly sweet smile\n- Do not make a cold villain face\n\n[Art style]\nHigh-quality Japanese anime / novel-game style illustration, clean line art, soft cel shading, a same-character face-angle reference, an even 5x5 grid, light gray background.\n\n[Prohibited]\nDo not make it a different character, do not change the hairstyle, no long hair, no twin tails, do not change the eye color, do not change the clothing, do not change the expression greatly, do not draw the whole body, do not make the background complex, no text, numbers, logo, or watermark, no layout other than 5x5, do not repeat the same angle, do not make the face sizes inconsistent, do not open the mouth, do not close the eyes, no winking."},{"head":"02 目閉じ差分","kind":"block","origLang":"ja","ja":"この5×5顔角度シートの全てのポジションを、目を閉じた表情にしてください。\n目以外は変更しないでください。\n髪型、顔の角度、頭部サイズ、首、襟、服装、配色、配置、背景、絵柄を維持してください。\n口は閉じたままにしてください。","en":"Make all positions in this 5x5 face-angle sheet have a closed-eye expression.\nDo not change anything other than the eyes.\nMaintain the hairstyle, face angles, head size, neck, collar, clothing, color scheme, layout, background, and art style.\nKeep the mouth closed."},{"head":"03 軽い笑顔差分","kind":"block","origLang":"ja","ja":"この5×5顔角度シートの全てのポジションを、小鈴らしい軽い笑顔にしてください。\n口元だけを少し柔らかくし、目つきの凛々しさは残してください。\n顔の角度、髪型、頭部サイズ、首、襟、服装、配色、配置、背景、絵柄を維持してください。\n大きく笑わせないでください。","en":"Make all positions in this 5x5 face-angle sheet have a light, Xiaoling-like smile.\nSoften only the mouth slightly, and keep the dignified sharpness of the eyes.\nMaintain the face angles, hairstyle, head size, neck, collar, clothing, color scheme, layout, background, and art style.\nDo not make a big smile."},{"head":"04 戦闘集中差分","kind":"block","origLang":"ja","ja":"この5×5顔角度シートの全てのポジションを、戦闘時の集中した表情にしてください。\n眉と目元を少しだけ鋭くし、口は引き締めてください。\n怒り顔や悪役顔にしないでください。\n顔の角度、髪型、頭部サイズ、首、襟、服装、配色、配置、背景、絵柄を維持してください。","en":"Make all positions in this 5x5 face-angle sheet have a focused combat expression.\nSharpen the brows and eyes just slightly, and tighten the mouth.\nDo not make an angry face or a villain face.\nMaintain the face angles, hairstyle, head size, neck, collar, clothing, color scheme, layout, background, and art style."}]},{"id":"p11","file":"牙焔_コミカル日常プロンプト集.md","character":"gaen","charLabel":"牙焔（ガエン）","title":"牙焔 コミカル日常プロンプト集","intro":"牙焔の日常パート用。\n戦闘時の暗さや危険さではなく、「本人は無愛想なのに状況が妙に平和」「乱暴な優しさが漏れている」方向を優先する。\n---\n- 案05の見た目を基準にする。\n- 見た目年齢は20代前半。\n- 体格は中肉中背を維持する。高身長だが、太い戦士体型にはしない。\n- 肩幅、胸板、腕は標準からやや引き締まった程度に抑える。\n- 動物を出す場合は2、3匹までに抑える。\n- 背景は明るい温室街、昼光、暖色照明、生活感を使う。\n- 炎や煙は控えめ。日常絵では火力より表情と状況のギャップを優先する。\n- 牙焔本人は基本的に真顔、仏頂面、照れ隠し。\n- コミカルでもチビキャラ化しない。\n---","blocks":[{"head":"■ 01 昼寝と動物","kind":"block","origLang":"en","ja":"WORLD ECLIPSE の牙焔（ガエン）の、明るくコミカルな日常アニメイラスト。採用候補の見た目に基づく：20代前半、中肉中背、平均〜引き締まった体型、鍛えてはいるが筋肉質すぎない、黒い学ラン風ロングコート、短い赤い鬼角の付いた目深の黒い帽子、鋭く影の落ちた目、荒々しく若い顔。\n\nシーン：昼間のスケイルシティの暖かい温室街、ガラス越しの柔らかな日差し、淡い緑の植物、暖かいパイプ、清潔で穏やかな雰囲気。\n\n動作：牙焔は暖かいパイプにもたれて座ったまま、またはベンチにぎこちなく横たわって眠っており、腕を組み、帽子はかぶったまま。合計2〜3匹だけの小さな野良動物（例えば猫2匹と小犬1匹）が彼の近くで眠り、コートの裾やブーツを暖かい場所として使っている。牙焔は眠っていても威圧的だが、動物たちは彼の周りで完全にくつろいでいる。\n\n雰囲気：おかしく、穏やかで、ひそかに優しい日常もの。コメディは、危険な見た目と、彼を安全なヒーター扱いする動物たちの対比から生まれる。\n\n画風：高品質な日本のアニメ・ライトノベル風イラスト、クリーンな線画、柔らかく明るい色、暖かな昼光、濃い煙なし、戦闘エフェクトなし、文字なし、ロゴなし、透かしなし。","en":"Bright comedic daily-life anime illustration of Gaen from WORLD ECLIPSE, based on the selected candidate look: early twenties, medium build, average-to-fit body type, toned but not muscular, black gakuran-inspired long coat, low black cap with short red oni horns, sharp shadowed eyes, rough youthful face.\n\nScene: a warm greenhouse district in Scale City during daytime, soft sunlight through glass panels, pale green plants, warm pipes, clean and peaceful atmosphere.\n\nAction: Gaen is asleep while sitting against a warm pipe or lying awkwardly on a bench, arms crossed, still wearing his cap. Only two or three small stray animals total, such as two cats and one small dog, are sleeping near him, using his coat hem or boots as a warm place. Gaen looks intimidating even while asleep, but the animals are completely relaxed around him.\n\nMood: funny, peaceful, secretly kind, slice-of-life. The comedy comes from the contrast between his dangerous appearance and the animals treating him like a safe heater.\n\nStyle: high-quality Japanese anime light novel illustration, clean linework, soft bright colors, warm daylight, no heavy smoke, no battle effects, no text, no logo, no watermark."},{"head":"Negative","kind":"negative","origLang":"en","ja":"暗い戦場、ホラーの雰囲気、濃い煙、過剰な炎、動物が多すぎる、動物の群れ、ちび、マスコット風、中年男性、老けた顔、ボディビルダー体型、太い胴体、巨大な腕、巨大な角、翼、尻尾、牙焔の獣耳、青い炎、白い聖なるオーラ、流血、邪悪な笑み、文字、ロゴ、透かし、歪んだ手、余分な手足","en":"dark battlefield, horror mood, heavy smoke, excessive fire, too many animals, animal crowd, chibi, mascot style, middle-aged man, old face, bodybuilder physique, bulky torso, huge arms, giant horns, wings, tail, animal ears on Gaen, blue flame, white holy aura, gore, evil grin, text, logo, watermark, distorted hands, extra limbs"},{"head":"■ 02 中華料理を爆食い","kind":"block","origLang":"en","ja":"WORLD ECLIPSE の牙焔（ガエン）の、コミカルなアニメ・ライトノベル風日常イラスト。20代前半、中肉中背、平均〜引き締まった体型、鍛えてはいるが筋肉質すぎない、黒い学ラン風ロングコート、短い赤い鬼角の付いた目深の黒い帽子、鋭い目、荒々しいが若い顔。\n\nシーン：スケイルシティの明るくカジュアルな中華料理店または屋台エリア、暖かな昼光、赤い提灯、熱い料理の湯気、賑やかだが混みすぎてはいない。\n\n動作：牙焔が真剣な顔で大量の中華料理を爆食いしている。激辛の麻婆豆腐、炒飯、餃子、麺、ラー油、積み上がった皿。まるで戦いのように真剣な集中で箸を握っている。激辛料理の周りに炎のような熱の揺らめきがわずかに現れるが、コミカルで制御された範囲に留める。\n\n雰囲気：おかしく、エネルギッシュで、腹ペコで、ぶっきらぼう。彼は笑っておらず、食事を決闘のように扱って勝っている、というのが笑いどころ。\n\n画風：高品質な日本のアニメ・ライトノベル風イラスト、明るく暖かい色、クリーンな線画、表情豊かな料理、湯気と香辛料のエフェクト、暗い背景なし、戦闘的暴力なし、文字なし、ロゴなし、透かしなし。","en":"Comedic anime light novel daily-life illustration of Gaen from WORLD EC "blocks":[{"head":"01 牙焔 四面立ち絵","kind":"block","origLang":"ja","ja":"添付した参考画像を使用し、牙焔の全身四面立ち絵を作成してください。\n\n【参考画像の役割】\n参考画像1：牙焔の正本イラスト\n・顔、見た目年齢、髪型、目、帽子、角、衣装、手袋、ブーツ、配色の正本\n・キャラクターの外見は必ずこちらを優先する\n\n参考画像2：白い3D体格マネキン四面図\n・身長、頭身、肩幅、胸郭、胴回り、骨盤、腕と脚の長さ、四方向の身体形状の正本\n・マネキンの顔、材質、白色、関節線は引き継がない\n\n【出力形式】\n・一枚の横長キャラクター設定シート\n・横4列、縦1行の均等な4パネル\n・左から正面、右側面、背面、左側面\n・各パネルに牙焔を一人ずつ配置する\n・全4体は同一人物、同じ直立姿勢、同じ表情\n・身長、頭身、肩幅、胴回り、手足の長さを統一する\n・人物サイズ、床の高さ、カメラ距離をそろえる\n・頭頂、帽子、角、コート裾、ブーツを完全に画面内へ収める\n・人物同士を重ねない\n・薄い境界線でパネルを区切る\n・文字、方向名、番号、寸法線は入れない\n\n【牙焔の固定外見】\n・20代前半に見える成人男性\n・若いが幼くない、荒々しさのある無愛想な青年\n・高身長だが重量級ではない\n・自然なアニメ調約7頭身\n・中肉中背、標準からやや引き締まった体格\n・肩幅は標準からやや広め\n・胸板、腕、太腿を過剰に太くしない\n・胴回りを太くしない\n・細身の美少年や中性的な体格にしない\n・30代以上の中年顔、深い皺、重い顎にしない\n\n・黒い短髪\n・前髪が片目へ自然にかかる\n・鋭い赤い目\n・不機嫌で静かな表情\n・目深に被った黒い帽子\n・帽子から短い鬼角が二本だけ突き出る\n・角を巨大化させない\n・帽子を消さない\n\n【衣装】\n・黒基調の学ラン風特攻服\n・深紅のラインとパイピング\n・縦長でスマートなシルエット\n・長いロングコートの前後の裾\n・黒い手袋\n・黒いブーツ\n・金属装飾は正本の範囲に限定する\n・中世鎧、軍用装備、バイクスーツへ変更しない\n・翼、尻尾、獣耳を追加しない\n\n【四方向の整合性】\n・正面、側面、背面で帽子と角の位置を一致させる\n・左右側面で顔、鼻、顎、後頭部の形状を一致させる\n・コートの襟、肩、袖、腰、裾の構造を四方向で統一する\n・正面と背面で肩幅、腰幅、脚幅を一致させる\n・手袋とブーツの形状を四方向で統一する\n・側面と背面でも前髪と後ろ髪の長さを維持する\n・背面へ正面用のボタンや胸飾りを複製しない\n・左右側面を単純な鏡像にせず、髪と衣装の前後関係を正しく描く\n\n【姿勢】\n・マネキン四面図と同じ自然な直立姿勢\n・頭を水平に保つ\n・顎を軽く引く\n・両肩を水平にする\n・両腕を身体の横へ自然に下ろす\n・両脚を腰幅から肩幅程度に開く\n・両膝とブーツのつま先を正面へ向ける\n・左右の足へ均等に重心を置く\n・衣装でマネキンの体格や関節位置を変更しない\n\n【背景と画風】\n・均一な白背景\n・床、地平線、接地影、風景を描かない\n・高品質な日本のアニメ、ノベルゲーム用キャラクター設定画\n・繊細で明瞭な線画\n・柔らかなセル塗り\n・全パネルで同じ描画密度、色、照明\n・炎、火花、熱歪みは使用しない\n\n【禁止事項】\n異なる衣装、異なる年齢、異なる体格、異なる表情、\n巨大な角、帽子なし、長髪、白髪、獣耳、翼、尻尾、\n重量級、ボディビルダー、細身の美少年、中年男性、\n中世ファンタジー鎧、現代軍装、バイクスーツ、\n武器、炎、エフェクト、敵、背景風景、床、影、\n余分な腕や脚、六本指、融合した指、左右非対称な身体、\n文字、方向名、番号、ロゴ、透かし","en":"Using the attached reference images, create a full-body four-view standing illustration of Gaen.\n\n[Role of the reference images]\nReference image 1: the master illustration of Gaen\n- The master for face, apparent age, hairstyle, eyes, cap, horns, outfit, gloves, boots, and color scheme\n- Always prioritize this for the character\u0027s appearance\n\nReference image 2: the white 3D build mannequin four-view\n- The master for height, head ratio, shoulder width, rib cage, torso girth, pelvis, arm/leg length, and the body shape in four directions\n- Do not carry over the mannequin\u0027s face, material, white color, or joint lines\n\n[Output format]\n- A single landscape character-setting sheet\n- 4 even panels in 4 columns x 1 row\n- From left: front, right side, back, left side\n- One Gaen per panel\n- All 4 figures are the same person, same upright posture, same expression\n- Unify height, head ratio, shoulder width, torso girth, and limb length\n- Align figure size, floor height, and camera distance\n- Fully fit the top of the head, cap, horns, coat hem, and boots within the frame\n- Do not overlap the figures\n- Divide the panels with thin borders\n- Do not add text, direction names, numbers, or dimension lines\n\n[Gaen\u0027s fixed appearance]\n- An adult male who looks early twenties\n- Young but not boyish, a rough, blunt youth\n- Tall but not heavyweight\n- About 7 heads tall in a natural anime style\n- Medium build, from standard to slightly toned\n- Shoulder width from standard to slightly broad\n- Do not over-thicken the chest, arms, or thighs\n- Do not thicken the torso\n- Not a slim handsome boy or androgynous build\n- Not a middle-aged face of 30+, deep wrinkles, or a heavy jaw\n\n- Black short hair\n- Bangs naturally falling over one eye\n- Sharp red eyes\n- A sullen, quiet expression\n- A black cap worn low over the eyes\n- Only two short oni horns protruding from the cap\n- Do not enlarge the horns\n- Do not remove the cap\n\n[Outfit]\n- A black-based gakuran-style delinquent uniform\n- Deep crimson lines and piping\n- A long, slim silhouette\n- The front and rear hems of a long coat\n- Black gloves\n- Black boots\n- Limit metal ornaments to the range of the master\n- Do not change to medieval armor, military gear, or a biker suit\n- Do not add wings, tail, or animal ears\n\n[Consistency across four directions]\n- Match the cap and horn positions in front, side, and back\n- Match the shape of the face, nose, chin, and back of the head in the left and right sides\n- Unify the structure of the coat\u0027s collar, shoulders, sleeves, waist, and hem across four directions\n- Match shoulder width, waist width, and leg width in front and back\n- Unify the shape of gloves and boots across four directions\n- Maintain the length of the bangs and back hair in side and back views too\n- Do not duplicate front buttons or chest ornaments onto the back\n- Do not make the left and right sides simple mirror images; draw the front-back relationship of hair and outfit correctly\n\n[Posture]\n- The same natural upright posture as the mannequin four-view\n- Keep the head level\n- Chin slightly tucked\n- Keep both shoulders level\n- Both arms hanging naturally at the sides\n- Feet opened from hip to shoulder width\n- Both knees and boot toes pointing forward\n- Weight evenly on both feet\n- Do not change the mannequin\u0027s build or joint positions for the outfit\n\n[Background and art style]\n- Uniform white background\n- Do not draw a floor, horizon, contact shadow, or scenery\n- High-quality Japanese anime / novel-game character setting art\n- Delicate, clear line art\n- Soft cel shading\n- Same drawing density, color, and lighting across all panels\n- Do not use fire, sparks, or heat distortion\n\n[Prohibited]\nDifferent outfits, different ages, different builds, different expressions,\ngiant horns, no cap, long hair, white hair, animal ears, wings, tail,\nheavyweight, bodybuilder, slim handsome boy, middle-aged man,\nmedieval fantasy armor, modern military gear, biker suit,\nweapons, fire, effects, enemies, background scenery, floor, shadows,\nextra arms or legs, six fingers, fused fingers, left-right asymmetric body,\ntext, direction names, numbers, logo, watermark"},{"head":"02 牙焔 基本格闘構え 八方向","kind":"block","origLang":"ja","ja":"添付した参考画像を使用し、牙焔が基本格闘構えを取った姿を、八方向から8枚の独立した画像として順番に作成してください。\n\n【参考画像の役割】\n参考画像1：牙焔の正本イラスト\n・顔、年齢、髪型、目、帽子、角、衣装、手袋、ブーツ、配色の正本\n\n参考画像2：牙焔用の白い3D体格マネキン四面図\n・身長、頭身、肩幅、胴回り、骨盤、手足の長さの正本\n\n参考画像3：基本格闘構えの八方向マネキン\n・各番号のカメラ方向、支持脚、足幅、重心、拳の高さ、肘の角度、胸郭と骨盤の向きの正本\n・マネキンの顔、材質、白色、関節線は引き継がない\n\n【最重要：出力方法】\n八方向を、必ず8枚の独立した画像として一枚ずつ生成する。\n\n1枚目：01 正面\n2枚目：02 右前方45度\n3枚目：03 右側面\n4枚目：04 右後方45度\n5枚目：05 背面\n6枚目：06 左後方45度\n7枚目：07 左側面\n8枚目：08 左前方45度\n\n一枚に複数方向を並べない。\nモデルシート、グリッド、分割パネル、一覧表、コラージュにしない。\n一枚につき牙焔一人、一つの基本構えだけを描く。\n各画像を単独で使用できる完成イラストにする。\n\n【ポーズの統一】\n8種類の異なるポーズを作らない。\n一つの同じ基本格闘構えを固定し、カメラだけを人物の周囲へ45度ずつ移動させる。\n全8枚で左脚が前、右脚が後ろ。\n支持脚、足幅、拳の高さ、肘の角度、重心、胸郭と骨盤の向きを維持する。\n左右反転や手足の入れ替えを行わない。\n\n【基本格闘構え】\n・右利きの半身姿勢\n・左脚を前、右脚を後ろ\n・足幅は肩幅より少し広い\n・前後の足を一直線へ重ねない\n・左足は前方、右足は斜め外側へ向ける\n・両膝を軽く曲げる\n・腰を落とし、低い重心を作る\n・両足裏を完全に接地する\n\n・骨盤は斜め\n・胸郭は骨盤よりわずかに正面へ戻す\n・背骨を自然に立てる\n・上体を倒しすぎない\n・肩を上げない\n・顎を軽く引く\n\n・左拳を前方、顎から胸の高さ\n・右拳を頬から肋骨付近\n・両肘を軽く曲げる\n・両脇を開きすぎない\n・手首を前腕の延長上へ置く\n・拳の親指を四本の指の外側へ添える\n・顔と視線は構えの正面方向を見る\n・カメラ目線にしない\n\n【牙焔の固定外見】\n・20代前半の成人男性\n・高身長だが重量級ではない\n・中肉中背、標準からやや引き締まった体格\n・黒い短髪、片目へかかる前髪\n・鋭い赤い目\n・不機嫌で集中した表情\n・目深に被った黒い帽子\n・帽子から突き出る短い鬼角二本\n・黒基調の学ラン風特攻服\n・深紅のライン\n・黒い手袋とブーツ\n・長いロングコート\n\n【コートの扱い】\n・コートを身体の動きへ自然に合わせる\n・肩、肘、手首、骨盤、膝、足首の位置を衣装で変えない\n・前後の脚をコート裾で完全に隠さない\n・基本構えなので裾を派手になびかせない\n・裾は重力に従って静かに垂らす\n・側面と背面でもコートの前後構造を維持する\n・コート裾を脚や腕へ融合させない\n\n【画像仕様】\n・16:9横長\n・均一な白背景\n・敵、標的、他の人物なし\n・全身、帽子、角、両手、両足、コート裾を画面内へ収める\n・技が進む正面方向へ適度な余白を取る\n・床、地平線、影、背景風景を描かない\n・炎、火花、熱歪み、武器を描かない\n・画像内に番号、方向名、文字を入れない\n\n【画風】\n・高品質な日本のノベルゲーム用アニメイラスト\n・繊細で明瞭な線画\n・柔らかなセル塗り\n・全8枚で顔、体格、衣装、配色、描画密度を統一する\n・技を出す前の静かな緊張感\n・静7、動3\n\n【身体の禁止事項】\n足の入れ替え、左右反転、浮いた足、伸び切った膝、\n異なる拳の高さ、異なる足幅、異なる重心、\n折れた手首、逆関節、膝と足先の不一致、\n余分な腕や脚、六本指、欠けた指、融合した指、\n拳から突き出る指、身体から切断して見える手足\n\n【キャラクターの禁止事項】\n巨大な角、帽子なし、翼、尻尾、獣耳、長髪、\n重量級、ボディビルダー、細身の美少年、中年男性、\n中世鎧、軍装、バイクスーツ、剣、銃、\n炎、オーラ、爆発、敵、背景風景、文字、ロゴ、透かし","en":"Using the attached reference images, create Gaen taking the basic fighting stance, as 8 independent images from eight directions, in order.\n\n[Role of the reference images]\nReference image 1: the master illustration of Gaen\n- The master for face, age, hairstyle, eyes, cap, horns, outfit, gloves, boots, and color scheme\n\nReference image 2: the white 3D build mannequin four-view for Gaen\n- The master for height, head ratio, shoulder width, torso girth, pelvis, and limb length\n\nReference image 3: the eight-direction mannequin of the basic fighting stance\n- The master for each number\u0027s camera direction, supporting leg, foot width, center of gravity, fist height, elbow angle, and orientation of rib cage and pelvis\n- Do not carry over the mannequin\u0027s face, material, white color, or joint lines\n\n[Most important: output method]\nAlways generate the eight directions as 8 independent images, one at a time.\n\nImage 1: 01 front\nImage 2: 02 front-right 45 degrees\nImage 3: 03 right side\nImage 4: 04 rear-right 45 degrees\nImage 5: 05 back\nImage 6: 06 rear-left 45 degrees\nImage 7: 07 left side\nImage 8: 08 front-left 45 degrees\n\nDo not line up multiple directions in one image.\nDo not make a model sheet, grid, split panels, list table, or collage.\nDraw only one Gaen and one basic stance per image.\nMake each image a finished illustration usable on its own.\n\n[Unifying the pose]\nDo not make 8 different poses.\nFix one single identical basic fighting stance and move only the camera around the figure by 45 degrees each.\nLeft leg forward, right leg back in all 8 images.\nMaintain the supporting leg, foot width, fist height, elbow angle, center of gravity, and orientation of rib cage and pelvis.\nDo not mirror or swap the limbs.\n\n[Basic fighting stance]\n- A right-handed half-body posture\n- Left leg forward, right leg back\n- Foot width slightly wider than shoulder width\n- Do not stack the front and rear feet in a single line\n- Left foot forward, right foot pointing diagonally outward\n- Both knees slightly bent\n- Lower the hips and make a low center of gravity\n- Plant both soles fully\n\n- Pelvis at an angle\n- Rib cage returning slightly more toward the front than the pelvis\n- The spine standing naturally\n- Do not over-tilt the upper body\n- Do not raise the shoulders\n- Chin slightly tucked\n\n- Left fist forward, at chin-to-chest height\n- Right fist near the cheek to the ribs\n- Both elbows slightly bent\n- Do not open the armpits too much\n- Place the wrists in line with the forearms\n- The thumb rests on the outside of the four fingers\n- The face and gaze look toward the front direction of the stance\n- No camera gaze\n\n[Gaen\u0027s fixed appearance]\n- An adult male in his early twenties\n- Tall but not heavyweight\n- Medium build, from standard to slightly toned\n- Black short hair, bangs over one eye\n- Sharp red eyes\n- A sullen, focused expression\n- A black cap worn low over the eyes\n- Two short oni horns protruding from the cap\n- A black-based gakuran-style delinquent uniform\n- Deep crimson lines\n- Black gloves and boots\n- A long coat\n\n[Handling the coat]\n- Match the coat naturally to the body\u0027s motion\n- Do not change the positions of shoulder, elbow, wrist, pelvis, knee, and ankle with the outfit\n- Do not fully hide the front/back legs with the coat hem\n- Since it is a basic stance, do not flutter the hem flashily\n- Let the hem hang quietly with gravity\n- Maintain the coat\u0027s front-back structure in side and back views too\n- Do not fuse the coat hem into the legs or arms\n\n[Image specifications]\n- 16:9 landscape\n- Uniform white background\n- No enemies, targets, or other figures\n- Fit the full body, cap, horns, both hands and feet, and coat hem within the frame\n- Leave moderate margin in the front direction the technique faces\n- Do not draw a floor, horizon, shadows, or background scenery\n- Do not draw fire, sparks, heat distortion, or weapons\n- Do not put numbers, direction names, or text inside the image\n\n[Art style]\n- High-quality Japanese novel-game anime illustration\n- Delicate, clear line art\n- Soft cel shading\n- Unify face, build, outfit, colors, and drawing density across all 8 images\n- A quiet tension before the technique\n- Stillness 7, motion 3\n\n[Body prohibitions]\nSwapping the feet, mirroring, floating feet, fully locked knees,\ndifferent fist heights, different foot widths, different centers of gravity,\nbroken wrists, reversed joints, mismatched knee and foot tip,\nextra arms or legs, six fingers, missing fingers, fused fingers,\nfingers poking out of the fist, limbs that look severed from the body\n\n[Character prohibitions]\nGiant horns, no cap, wings, tail, animal ears, long hair,\nheavyweight, bodybuilder, slim handsome boy, middle-aged man,\nmedieval armor, military gear, biker suit, sword, gun,\nfire, aura, explosion, enemies, background scenery, text, logo, watermark"},{"head":"01 正面","kind":"block","origLang":"ja","ja":"まず01の正面構図だけを、新しい独立した一枚として生成してください。\nマネキン資料の01と同じカメラ方向、支持脚、重心、手足の配置を維持してください。","en":"First, generate only the 01 front composition as a new, independent single image.\nMaintain the same camera direction, supporting leg, center of gravity, and limb placement as 01 in the mannequin reference."},{"head":"02以降","kind":"block","origLang":"ja","ja":"次は02の右前方45度だけを、新しい独立した一枚として生成してください。\nポーズを変更せず、カメラ方向だけをマネキン資料の02へ変更してください。\n外見、体格、衣装、足幅、拳の高さ、重心は01と統一してください。","en":"Next, generate only the 02 front-right 45 degrees as a new, independent single image.\nDo not change the pose; change only the camera direction to 02 in the mannequin reference.\nKeep the appearance, build, outfit, foot width, fist height, and center of gravity unified with 01."}]},{"id":"p13","file":"牙焔_マネキン実戦動作_キャラクター変換プロンプト.md","character":"gaen","charLabel":"牙焔（ガエン）","title":"牙焔 マネキン実戦動作 キャラクター変換プロンプト","intro":"白い3D体格マネキンで作成した実戦基礎動作8種類を、同じ姿勢とカメラ方向のまま牙焔へ変換するためのプロンプト。\n1. 牙焔の正本立ち絵。\n2. 牙焔の基本格闘構え画像。\n3. 白い3Dマネキンの実戦基礎動作8種類一覧。\n必要に応じて、牙焔の体格マネキン四面図も追加する。","blocks":[{"head":"共通変換プロンプト","kind":"prompt","origLang":"ja","ja":"添付した参考画像を使用し、白い3Dマネキンの実戦基礎動作01から08を、牙焔の戦闘イラストとして再現してください。\n\n【参考画像の役割】\n参考画像1：牙焔の正本立ち絵\n・顔、見た目年齢、髪型、目、帽子、角、衣装、手袋、ブーツ、配色の正本\n・キャラクターの外見は必ずこちらを優先する\n\n参考画像2：牙焔の基本格闘構え画像\n・戦闘時の顔、体格、衣装の見え方、コートの構造、低い重心の補助資料\n\n参考画像3：白い3Dマネキンの実戦基礎動作8種類\n・指定番号の姿勢、カメラ方向、支持脚、重心、骨盤、胸郭、手足の前後関係、接触部位の正本\n・マネキンの顔、白い材質、関節線、簡略化された手足は引き継がない\n・指定番号以外の動作を混合しない\n\n【最重要：出力方法】\n01から08を、必ず8枚の独立した画像として一枚ずつ順番に生成する。\n\n1枚目：01 左前手直突き\n2枚目：02 右後手直突き\n3枚目：03 左踏み込み掌底\n4枚目：04 右フック\n5枚目：05 左後ろ肘\n6枚目：06 右膝蹴り\n7枚目：07 左前蹴り\n8枚目：08 右中段回し蹴り\n\n一枚に複数動作を並べない。\nモデルシート、グリッド、分割パネル、一覧表、コラージュにしない。\n一枚につき牙焔一人、一つの動作だけを描く。\n各画像を単独で使用できる完成イラストにする。\n\n【ポーズの再現】\n・指定番号のマネキンと同じカメラ方向を維持する\n・指定番号の支持脚、足幅、重心を維持する\n・骨盤と胸郭の向きを維持する\n・肩、肘、手首、拳または掌の位置を維持する\n・股関節、膝、足首、接触部位を維持する\n・攻撃していない手の防御位置を維持する\n・顔と視線を攻撃の到達方向へ向ける\n・衣装の都合で関節や重心を変更しない\n・マネキンに解剖学的な小さな問題がある場合のみ、技の意味を変えず自然に修正する\n\n【牙焔の固定外見】\n・20代前半に見える成人男性\n・若いが幼くない、荒々しさのある無愛想な青年\n・高身長だが重量級ではない\n・自然なアニメ調約7頭身\n・中肉中背、標準からやや引き締まった体格\n・肩幅は標準からやや広め\n・胸板、腕、胴、太腿を過剰に太くしない\n・細身の美少年、重量級格闘家、ボディビルダー、中年男性へ変更しない\n\n・黒い短髪\n・前髪が片目へ自然にかかる\n・鋭い赤い目\n・不機嫌で集中した戦闘表情\n・目深に被った黒い帽子\n・帽子から短い鬼角が二本だけ突き出る\n・角を巨大化させない\n・帽子を消さない\n\n【衣装】\n・黒基調の学ラン風特攻服\n・深紅のラインとパイピング\n・長いロングコート\n・黒いフィンガーレス手袋\n・黒い編み上げブーツ\n・ベルトと腰の装飾鎖\n・正本にない鎧、武器、翼、尻尾、獣耳を追加しない\n\n【拳と手袋】\n・拳は四本の指を内側へ握る\n・親指を四本の指の外側へ添える\n・拳から指を突き出さない\n・手首を前腕の延長上へ置く\n・左右とも手袋を維持する\n・手袋と素手を二重に描かない\n・攻撃していない拳は顔または身体の中心線を守る\n\n【掌底】\n・四本指と親指一本の合計五本\n・掌の向きと親指の位置を一致させる\n・掌根を接触部位として前方へ向ける\n・指を極端に開かない\n・手首を反らしすぎない\n・手袋を維持したまま掌の形を判読できるようにする\n\n【蹴りとブーツ】\n・支持脚と蹴り脚の両方に同じ黒い編み上げブーツを維持する\n・裸足、足指、異なる靴を描かない\n・蹴り脚の股関節、膝、足首を自然につなげる\n・ブーツの輪郭で踵、靴底、甲、つま先の方向を示す\n・足裏を内側へ反転させない\n・支持脚を完全に接地させる\n・前蹴り、膝蹴り、回し蹴りを混同しない\n\n【コート】\n・コートは身体の運動より少し遅れて流れる\n・攻撃方向と逆側へ自然になびかせる\n・肩、肘、手首、骨盤、膝、足首をコートで完全に隠さない\n・前後の脚が判別できるよう、裾の間に空間を残す\n・裾を腕、脚、ブーツ、腰の鎖へ融合させない\n・回転動作では裾を一つの大きな弧へまとめる\n・直線打撃では裾を過剰に広げない\n\n【腰の装飾鎖】\n・腰の装飾鎖は短く、衣装へ固定された受動的な装飾として描く\n・手に持たせない\n・攻撃用の長い鎖へ変化させない\n・脚、コート、腕へ融合させない\n\n【顔と視線】\n・顔はカメラではなく攻撃の到達方向を見る\n・鼻先、顎、両目を攻撃方向へそろえる\n・後方構図でも首だけをカメラへ振り返らせない\n・前景の拳、肘、膝、足で顔を完全に隠さない\n\n【画像仕様】\n・16:9横長\n・ノベルゲーム用の戦闘イラスト\n・均一な白背景\n・床、地平線、接地影、風景を描かない\n・敵、標的、他の人物を描かない\n・全身、帽子、角、両手、両足、コート裾を画面内へ収める\n・攻撃方向へ十分な余白を設ける\n・手足を画面端で切らない\n・文字、番号、技名、ロゴ、透かしを入れない\n\n【画風】\n・高品質な日本のノベルゲーム用アニメイラスト\n・繊細で明瞭な線画\n・柔らかなセル塗り\n・正本と同じ顔、体格、衣装、配色\n・実用的な格闘動作と身体のシルエットを優先する\n\n【この段階では使用しないもの】\n炎、火花、熱歪み、オーラ、爆発、鎖攻撃、武器、固有技の演出。\n身体動作を確認するため、エフェクトを一切描かない。\n\n【禁止事項】\n指定番号以外の動作との混合、複数人物、敵、武器、炎、\n巨大な角、帽子なし、翼、尻尾、獣耳、長髪、\n重量級、ボディビルダー、中年男性、細身の美少年、\n中世鎧、軍装、バイクスーツ、\n余分な腕や脚、六本指、欠けた指、融合した指、二重の手、\n手袋から生える素手、拳から突き出る指、\n折れた手首、逆関節、反転した足首、浮いた支持脚、\n膝とブーツのつま先の不一致、足とブーツの分離、\nカメラ目線、身体から切断して見える拳や足、\nコートによる関節と支持脚の完全な遮蔽","en":"Using the attached reference images, reproduce the white 3D mannequin\u0027s practical basic motions 01 to 08 as Gaen\u0027s battle illustrations.\n\n[Role of the reference images]\nReference image 1: the master standing illustration of Gaen\n- The master for face, apparent age, hairstyle, eyes, cap, horns, outfit, gloves, boots, and color scheme\n- Always prioritize this for the character\u0027s appearance\n\nReference image 2: Gaen\u0027s basic fighting-stance image\n- A support reference for how the face, build, and outfit look in combat, the coat structure, and the low center of gravity\n\nReference image 3: the 8 practical basic motions of the white 3D mannequin\n- The master for the specified number\u0027s posture, camera direction, supporting leg, center of gravity, pelvis, rib cage, front-back relationship of the limbs, and contact point\n- Do not carry over the mannequin\u0027s face, white material, joint lines, or simplified limbs\n- Do not mix in motions other than the specified number\n\n[Most important: output method]\nAlways generate 01 to 08 as 8 independent images, one at a time, in order.\n\nImage 1: 01 left lead-hand straight punch\nImage 2: 02 right rear-hand straight punch\nImage 3: 03 left step-in palm-heel\nImage 4: 04 right hook\nImage 5: 05 left rear elbow\nImage 6: 06 right knee kick\nImage 7: 07 left front kick\nImage 8: 08 right middle roundhouse kick\n\nDo not line up multiple motions in one image.\nDo not make a model sheet, grid, split panels, list table, or collage.\nDraw only one Gaen and one motion per image.\nMake each image a finished illustration usable on its own.\n\n[Reproducing the pose]\n- Keep the same camera direction as the mannequin of the specified number\n- Keep the supporting leg, foot width, and center of gravity of the specified number\n- Keep the orientation of pelvis and rib cage\n- Keep the positions of shoulder, elbow, wrist, and fist or palm\n- Keep the hip, knee, ankle, and contact point\n- Keep the defensive position of the non-attacking hand\n- Direct the face and gaze toward where the attack reaches\n- Do not change the joints or center of gravity for the sake of the outfit\n- Only if the mannequin has a small anatomical issue, correct it naturally without changing the meaning of the technique\n\n[Gaen\u0027s fixed appearance]\n- An adult male who looks early twenties\n- Young but not boyish, a rough, blunt youth\n- Tall but not heavyweight\n- About 7 heads tall in a natural anime style\n- Medium build, from standard to slightly toned\n- Shoulder width from standard to slightly broad\n- Do not over-thicken the chest, arms, torso, or thighs\n- Do not change to a slim handsome boy, heavyweight fighter, bodybuilder, or middle-aged man\n\n- Black short hair\n- Bangs naturally falling over one eye\n- Sharp red eyes\n- A sullen, focused combat expression\n- A black cap worn low over the eyes\n- Only two short oni horns protruding from the cap\n- Do not enlarge the horns\n- Do not remove the cap\n\n[Outfit]\n- A black-based gakuran-style delinquent uniform\n- Deep crimson lines and piping\n- A long coat\n- Black fingerless gloves\n- Black laced boots\n- A belt and a decorative chain at the waist\n- Do not add armor, weapons, wings, tail, or animal ears not in the master\n\n[Fists and gloves]\n- Fists curl the four fingers inward\n- The thumb rests on the outside of the four fingers\n- Do not poke fingers out of the fist\n- Place the wrist in line with the forearm\n- Keep the gloves on both hands\n- Do not draw the glove and a bare hand doubled\n- The non-attacking fist guards the face or the body\u0027s center line\n\n[Palm heel]\n- Four fingers plus one thumb, five total\n- Match palm orientation with thumb position\n- Point the palm heel forward as the contact point\n- Do not spread the fingers extremely\n- Do not over-bend the wrist\n- Keep the palm shape readable while maintaining the glove\n\n[Kicks and boots]\n- Keep the same black laced boots on both the supporting and kicking legs\n- Do not draw bare feet, toes, or different shoes\n- Connect the hip, knee, and ankle of the kicking leg naturally\n- Show the heel, sole, instep, and toe direction through the boot outline\n- Do not flip the sole inward\n- Plant the supporting leg fully\n- Do not confuse a front kick, knee kick, and roundhouse kick\n\n[Coat]\n- The coat flows slightly behind the body\u0027s motion\n- Let it flutter naturally to the opposite side of the attack direction\n- Do not fully hide the shoulder, elbow, wrist, pelvis, knee, or ankle with the coat\n- Leave space between the hems so the front/back legs are distinguishable\n- Do not fuse the hem into the arms, legs, boots, or waist chain\n- In rotational motions, gather the hem into one large arc\n- In straight strikes, do not spread the hem excessively\n\n[Decorative waist chain]\n- Draw the decorative waist chain short, as a passive ornament fixed to the outfit\n- Do not put it in the hand\n- Do not turn it into a long attacking chain\n- Do not fuse it into the legs, coat, or arms\n\n[Face and gaze]\n- The face looks toward where the attack reaches, not the camera\n- Align the nose tip, chin, and both eyes with the attack direction\n- Even in a rear composition, do not turn only the neck back to the camera\n- Do not fully hide the face with a foreground fist, elbow, knee, or foot\n\n[Image specifications]\n- 16:9 landscape\n- A battle illustration for a novel game\n- Uniform white background\n- Do not draw a floor, horizon, contact shadow, or scenery\n- Do not draw enemies, targets, or other figures\n- Fit the full body, cap, horns, both hands and feet, and coat hem within the frame\n- Leave enough margin in the attack direction\n- Do not cut limbs at the frame edge\n- Do not include text, numbers, technique names, logo, or watermark\n\n[Art style]\n- High-quality Japanese novel-game anime illustration\n- Delicate, clear line art\n- Soft cel shading\n- The same face, build, outfit, and colors as the master\n- Prioritize practical fighting motion and body silhouette\n\n[Do not use at this stage]\nFire, sparks, heat distortion, aura, explosions, chain attacks, weapons, signature-technique effects.\nTo check body motion, draw no effects at all.\n\n[Prohibited]\nMixing motions other than the specified number, multiple figures, enemies, weapons, fire,\ngiant horns, no cap, wings, tail, animal ears, long hair,\nheavyweight, bodybuilder, middle-aged man, slim handsome boy,\nmedieval armor, military gear, biker suit,\nextra arms or legs, six fingers, missing fingers, fused fingers, double hands,\na bare hand growing out of the glove, fingers poking out of the fist,\nbroken wrists, reversed joints, flipped ankles, floating supporting leg,\nmismatch between knee and boot toe, separation of foot and boot,\ncamera gaze, fists or feet that look severed from the body,\ncomplete blocking of joints and supporting leg by the coat"},{"head":"01 左前手直突き","kind":"block","origLang":"ja","ja":"まず01だけを、新しい独立した一枚として生成してください。\n\nマネキン資料の01と同じ正面カメラ。\n左脚を前、右脚を後ろに置く。\n左拳を相手の中心へ肩から胸の高さで突き出す。\n左肘を完全に伸ばし切らない。\n右拳は顎の横へ残し、顔を守る。\n後ろ足から骨盤、背骨、左肩、左拳へ力をつなげる。\n正面からも両脚の前後差を残す。\n拳で顔を完全に隠さない。\n静4、動6。","en":"First, generate only 01 as a new, independent single image.\n\nSame front camera as 01 in the mannequin reference.\nLeft leg forward, right leg back.\nThrust the left fist toward the opponent\u0027s center at shoulder-to-chest height.\nDo not fully lock out the left elbow.\nKeep the right fist beside the chin to guard the face.\nConnect the force from the rear foot to the pelvis, spine, left shoulder, and left fist.\nKeep the front-back leg offset even from the front.\nDo not fully hide the face with the fist.\nStillness 4, motion 6."},{"head":"02 右後手直突き","kind":"block","origLang":"ja","ja":"次は02だけを、新しい独立した一枚として生成してください。\n\nマネキン資料の02と同じ右前方45度カメラ。\n左脚を前、右脚を後ろに保つ。\n右拳を前方へ強く突き出す。\n右後足、右膝、骨盤、背骨、右肩、右拳を一つの螺旋へつなげる。\n左拳は顎の横へ引き、顔を守る。\n拳を適度に前景へ出すが、肩と肘の接続を残す。\n静3、動7。","en":"Next, generate only 02 as a new, independent single image.\n\nSame front-right 45-degree camera as 02 in the mannequin reference.\nKeep the left leg forward, right leg back.\nThrust the right fist strongly forward.\nConnect the right rear foot, right knee, pelvis, spine, right shoulder, and right fist into one spiral.\nPull the left fist beside the chin to guard the face.\nBring the fist moderately into the foreground, but keep the shoulder and elbow connection.\nStillness 3, motion 7."},{"head":"03 左踏み込み掌底","kind":"block","origLang":"ja","ja":"次は03だけを、新しい独立した一枚として生成してください。\n\nマネキン資料の03と同じ右側面カメラ。\n左足を前方へ踏み込み、接地した直後。\n左掌根を相手の胸または顎の高さへ押し込む。\n指先は上向きまたは斜め上。\n右拳は胸の近くへ残す。\n側面から歩幅、骨盤移動、背骨、肩、掌底への力線を見せる。\n掌を停止のジェスチャーにしない。\n静3、動7。","en":"Next, generate only 03 as a new, independent single image.\n\nSame right-side camera as 03 in the mannequin reference.\nJust after the left foot steps forward and plants.\nDrive the left palm heel toward the opponent\u0027s chest or chin height.\nFingertips pointing up or diagonally up.\nKeep the right fist near the chest.\nFrom the side, show the stride, pelvis movement, spine, shoulder, and the force line into the palm heel.\nDo not make the palm a \"stop\" gesture.\nStillness 3, motion 7."},{"head":"04 右フック","kind":"block","origLang":"ja","ja":"次は04だけを、新しい独立した一枚として生成してください。\n\nマネキン資料の04と同じ右後方45度カメラ。\n右拳で顔の高さへの横鉤突きを放つ。\n右肘を約90度に曲げる。\n右拳、右肘、右肩を同じ水平面へ置く。\n軸足、骨盤、背骨、右肩を同じ回転方向へそろえる。\n左拳は顔を守る。\n背中、肩甲骨、骨盤の回転が読める構図にする。\n腕だけを横へ振らない。\n静3、動7。","en":"Next, generate only 04 as a new, independent single image.\n\nSame rear-right 45-degree camera as 04 in the mannequin reference.\nThrow a horizontal hook at face height with the right fist.\nBend the right elbow to about 90 degrees.\nPlace the right fist, right elbow, and right shoulder on the same horizontal plane.\nAlign the pivot foot, pelvis, spine, and right shoulder in the same direction of rotation.\nThe left fist guards the face.\nMake a composition where the rotation of the back, shoulder blades, and pelvis is readable.\nDo not swing only the arm sideways.\nStillness 3, motion 7."},{"head":"05 左後ろ肘","kind":"block","origLang":"ja","ja":"次は05だけを、新しい独立した一枚として生成してください。\n\nマネキン資料の05と同じ背面カメラ。\n左後方へ左肘を短く鋭く打ち込む。\n左拳を顔の近くへ畳み、左肘を接触点にする。\n右拳は身体の中心線を守る。\n軸足を接地し、骨盤と胸郭を左肘の方向へ回す。\n背面から肩甲骨、背骨、骨盤、支持脚の連動を見せる。\n首だけをカメラへ振り返らせない。\n視線は肘を打つ方向へ向ける。\n静4、動6。","en":"Next, generate only 05 as a new, independent single image.\n\nSame rear camera as 05 in the mannequin reference.\nDrive a short, sharp left elbow to the rear-left.\nFold the left fist near the face and make the left elbow the contact point.\nThe right fist guards the body\u0027s center line.\nPlant the pivot foot and rotate the pelvis and rib cage toward the left elbow\u0027s direction.\nFrom the back, show the linkage of shoulder blades, spine, pelvis, and supporting leg.\nDo not turn only the neck back toward the camera.\nDirect the gaze toward the elbow strike direction.\nStillness 4, motion 6."},{"head":"06 右膝蹴り","kind":"block","origLang":"ja","ja":"次は06だけを、新しい独立した一枚として生成してください。\n\nマネキン資料の06と同じ左後方45度カメラ。\n左脚を支持脚にする。\n右膝を相手の腹部へ突き上げる。\n右足は膝の下へ自然に畳む。\n左足裏を完全に接地し、左膝を軽く曲げる。\n骨盤を前へ押し出すが、上体を反らしすぎない。\n両拳は顔の近くへ残す。\nコート裾で右股関節、右膝、左支持脚を隠さない。\n静3、動7。","en":"Next, generate only 06 as a new, independent single image.\n\nSame rear-left 45-degree camera as 06 in the mannequin reference.\nMake the left leg the supporting leg.\nThrust the right knee up toward the opponent\u0027s abdomen.\nFold the right foot naturally under the knee.\nPlant the left sole fully and bend the left knee slightly.\nPush the pelvis forward, but do not over-arch the upper body.\nKeep both fists near the face.\nDo not hide the right hip, right knee, or left supporting leg with the coat hem.\nStillness 3, motion 7."},{"head":"07 左前蹴り","kind":"block","origLang":"ja","ja":"次は07だけを、新しい独立した一枚として生成してください。\n\nマネキン資料の07と同じ左側面カメラ。\n右脚を支持脚にする。\n左膝を先に引き上げ、左ブーツの踵または靴底で前方を押す。\n左股関節、左膝、左足首、ブーツの踵を同じ進行面へ置く。\n右足裏を完全に接地し、右膝を軽く緩める。\n上体を立て、両拳で中心線を守る。\n横蹴りや回し蹴りへ変化させない。\n静4、動6。","en":"Next, generate only 07 as a new, independent single image.\n\nSame left-side camera as 07 in the mannequin reference.\nMake the right leg the supporting leg.\nRaise the left knee first, then push forward with the heel or sole of the left boot.\nPlace the left hip, left knee, left ankle, and the boot\u0027s heel on the same plane of travel.\nPlant the right sole fully and keep the right knee slightly relaxed.\nKeep the upper body upright and guard the center line with both fists.\nDo not turn it into a side kick or roundhouse kick.\nStillness 4, motion 6."},{"head":"08 右中段回し蹴り","kind":"block","origLang":"ja","ja":"次は08だけを、新しい独立した一枚として生成してください。\n\nマネキン資料の08と同じ左前方45度カメラ。\n左脚を軸足として回す。\n右脚で相手の胴体へ中段回し蹴りを放つ。\n右膝、右脛、右ブーツの甲を同じ回転面へ置く。\n左軸足、骨盤、胸郭、右脚を同じ回転方向へそろえる。\n右ブーツの足裏を内側へ反転させない。\n左拳を顔の近くへ残す。\n右腕は回転の均衡を取る位置へ流す。\nコート裾は回転と逆側へ遅れ、一つの大きな弧を描く。\n完全な水平開脚や舞踊的な姿勢にしない。\n静2、動8。","en":"Next, generate only 08 as a new, independent single image.\n\nSame front-left 45-degree camera as 08 in the mannequin reference.\nPivot on the left leg.\nThrow a middle roundhouse kick with the right leg at the opponent\u0027s torso.\nPlace the right knee, right shin, and right boot instep on the same plane of rotation.\nAlign the left pivot foot, pelvis, rib cage, and right leg in the same direction of rotation.\nDo not flip the sole of the right boot inward.\nKeep the left fist near the face.\nLet the right arm flow to a position balancing the rotation.\nThe coat hem lags to the opposite side of the rotation, drawing one large arc.\nDo not make it a full horizontal split or dance-like posture.\nStillness 2, motion 8."},{"head":"次段階","kind":"block","origLang":"ja","ja":"固有技 = 承認済み身体動作 + 遠近調整 + 炎または鎖 + 技固有の演出","en":"signature technique = approved body motion + perspective adjustment + fire or chain + technique-specific staging"}]},{"id":"p14","file":"牙焔_マネキン実戦基礎動作_八方向プロンプト.md","character":"gaen","charLabel":"牙焔（ガエン）","title":"牙焔 マネキン実戦基礎動作 八方向プロンプト","intro":"牙焔をキャラクター化する前に、白い3Dデッサン人形で実戦的な打撃と蹴りの構造を確認するためのプロンプト。\n添付する画像:\n1. 承認済みの牙焔用体格マネキン四面図。\n2. 必要に応じて、牙焔の基本格闘構えマネキン。\n参考画像は体格、頭身、関節位置の正本として使用する。牙焔の衣装や炎はまだ使用しない。","blocks":[{"head":"一括生成プロンプト","kind":"prompt","origLang":"ja","ja":"添付した牙焔用の白い3D体格マネキンを使い、実戦的な基本打撃と蹴り8種類を、一枚のポーズ資料として作成してください。\n\n【目的】\n牙焔の完成イラストや固有技を制作する前に、格闘動作の支持脚、重心、関節、身体の回転、カメラ方向を確認するための資料です。\n決めポーズではなく、攻撃が相手へ届く直前または途中の実用的な動作を描いてください。\n\n【出力形式】\n・一枚の16:9横長モデルシート\n・上段4パネル、下段4パネル\n・上段左から01、02、03、04\n・下段左から05、06、07、08\n・各パネルに白い3Dデッサン人形を一体だけ配置\n・一体につき一つの動作だけ\n・人物同士を重ねない\n・各パネル内に頭頂、両手、両足を完全に収める\n・手足をパネル境界で切らない\n・全パネルで同じ体格、頭身、関節構造\n・細い境界線でパネルを区切る\n・各パネル左上に小さく01から08の番号だけを表示\n・技名、説明文、方向名は画像内へ入れない\n\n【マネキン】\n・承認済みの牙焔用体格マネキンと同じ成人男性型\n・20代前半相当\n・自然なアニメ調約7頭身\n・高身長だが重量級ではない\n・中肉中背、標準からやや引き締まった体格\n・肩幅は標準からやや広め\n・胸板、腕、胴、太腿を過剰に太くしない\n・白または明るい灰色のマット樹脂素材\n・頭部、胸郭、骨盤に薄い中心線\n・肩、肘、手首、股関節、膝、足首を明確にする\n・手は五本指を簡潔かつ明瞭に分ける\n・両足は閉じた格闘靴型の簡略形状\n\n【全動作共通】\n・右利きを基本とする\n・左脚を前、右脚を後ろにした構えを出発点とする\n・攻撃の力を、接地足から骨盤、背骨、肩または股関節へつなげる\n・支持脚を明確にする\n・攻撃していない手は顔または身体の中心線を守る\n・顔と視線はカメラではなく攻撃の到達方向を見る\n・上体だけで攻撃せず、脚と骨盤を使う\n・人体として実行可能な関節角度にする\n\n【拳】\n・四本の指を内側へ握る\n・親指を四本の指の外側へ添える\n・拳から指を突き出さない\n・手首を前腕の延長上へ置く\n\n【開いた掌】\n・四本指と親指一本の合計五本\n・掌の向きと親指の位置を一致させる\n・指を極端に開かない\n・手首を折りすぎない\n\n【蹴り】\n・支持脚を床へ完全に接地させる\n・支持脚の膝を軽く緩める\n・蹴り脚の股関節、膝、足首を自然につなげる\n・膝と足先を技として正しい方向へそろえる\n・足裏を内側へ反転させない\n・前蹴り、膝蹴り、回し蹴りを混同しない\n\n【背景】\n・各パネルは均一な薄いグレー背景\n・水平な薄い床面\n・弱い接地影\n・柔らかなスタジオ照明\n・クリーンな3D人体デッサン教材風\n\n【01 正面：左前手直突き】\nカメラは人物の正面。\n左脚を前、右脚を後ろに置く。\n左拳を相手の中心へ肩から胸の高さで突き出す。\n左肘を完全に伸ばし切らない。\n右拳は顎の横へ残す。\n正面からも両脚の前後差と骨盤の回転が分かるようにする。\n\n【02 右前方45度：右後手直突き】\nカメラは人物の右前方45度。\n右拳を前方へ強く突き出す。\n右後足、右膝、骨盤、背骨、右肩、右拳を一つの螺旋へつなげる。\n左拳は顔を守る。\n拳を前景へ出すが、肩と肘の接続を残す。\n\n【03 右側面：左踏み込み掌底】\nカメラは人物の右側面。\n左足を前方へ踏み込んで接地した直後。\n左掌根を相手の胸または顎の高さへ押し込む。\n左指先は上向きまたは斜め上。\n右拳は胸の近くへ残す。\n側面から歩幅、骨盤移動、背骨、肩、掌底への力線を見せる。\n\n【04 右後方45度：右フック】\nカメラは人物の右後方45度。\n右拳で顔の高さへの横鉤突きを放つ。\n右肘を約90度に曲げる。\n拳、肘、肩を同じ水平面へ置く。\n軸足、骨盤、背骨、右肩を同じ回転方向へそろえる。\n左拳は顔を守る。\n\n【05 背面：左後ろ肘】\nカメラは人物の真後ろ。\n左後方へ左肘を短く鋭く打ち込む。\n左拳を顔の近くへ畳み、左肘を接触点にする。\n右拳は身体の中心線を守る。\n背面から肩甲骨、背骨、骨盤、支持脚の連動を見せる。\n首だけをカメラへ振り返らせない。\n\n【06 左後方45度：右膝蹴り】\nカメラは人物の左後方45度。\n左脚を支持脚にする。\n右膝を相手の腹部へ突き上げる。\n右足は膝の下へ自然に畳む。\n左足裏を完全に接地する。\n骨盤を前へ押し出すが、上体を反らしすぎない。\n両拳は顔の近くへ残す。\n\n【07 左側面：左前蹴り】\nカメラは人物の左側面。\n右脚を支持脚にする。\n左膝を先に引き上げ、左足の踵または足裏で前方を押す。\n左股関節、膝、足首、踵を同じ進行面へ置く。\n上体を立て、両拳で中心線を守る。\n横蹴りや回し蹴りにしない。\n\n【08 左前方45度：右中段回し蹴り】\nカメラは人物の左前方45度。\n左脚を軸足として回す。\n右脚で相手の胴体へ中段回し蹴りを放つ。\n右膝、右脛、足の甲を同じ回転面へ置く。\n左軸足、骨盤、胸郭、右脚を同じ回転方向へそろえる。\n蹴り脚の足裏を内側へ反転させない。\n左拳を顔の近くへ残す。\n完全な水平開脚や舞踊的な姿勢にしない。\n\n【禁止事項】\n髪、帽子、角、衣装、コート、手袋、炎、火花、オーラ、鎖、武器、敵、\nキャラクターの顔や配色、完成イラスト風の衣装、\n8体すべて同じポーズ、同じカメラ方向、方向の重複、\n決めポーズ、威嚇姿勢、非実用的な大開脚、\n余分な腕や脚、六本指、欠けた指、融合した指、\n二重の手、折れた手首、逆関節、反転した足首、\n浮いた支持脚、膝と足先の不一致、身体から切断して見える手足、\n番号以外の文字、技名、ロゴ、透かし","en":"Using the attached white 3D build mannequin for Gaen, create 8 practical basic strikes and kicks as a single pose-reference sheet.\n\n[Purpose]\nThis is a reference for checking the supporting leg, center of gravity, joints, body rotation, and camera direction of the fighting motions before producing Gaen\u0027s finished illustrations or signature techniques.\nDraw practical motions at the instant just before or during an attack reaching the opponent, not decorative finishing poses.\n\n[Output format]\n- A single 16:9 landscape model sheet\n- Top row 4 panels, bottom row 4 panels\n- Top row from left: 01, 02, 03, 04\n- Bottom row from left: 05, 06, 07, 08\n- Place only one white 3D drawing mannequin per panel\n- One motion per figure\n- Do not overlap the figures\n- Fully fit the top of the head and both hands and feet within each panel\n- Do not cut limbs at the panel borders\n- Same build, head ratio, and joint structure across all panels\n- Divide the panels with thin borders\n- Show only a small 01-08 number in the top-left of each panel\n- Do not put technique names, descriptions, or direction names inside the image\n\n[Mannequin]\n- The same adult male type as the approved Gaen build mannequin\n- Equivalent to early twenties\n- About 7 heads tall in a natural anime style\n- Tall but not heavyweight\n- Medium build, from standard to slightly toned\n- Shoulder width from standard to slightly broad\n- Do not over-thicken the chest, arms, torso, or thighs\n- White or light gray matte resin material\n- Faint center lines on head, rib cage, and pelvis\n- Clearly mark shoulders, elbows, wrists, hips, knees, and ankles\n- Hands simply and clearly separated into five fingers\n- Both feet as simplified closed fighting-shoe shapes\n\n[Common to all motions]\n- Right-handed by default\n- Start from a stance with the left leg forward, right leg back\n- Connect the force of the attack from the planted foot to the pelvis, spine, and shoulder or hip\n- Make the supporting leg clear\n- The non-attacking hand guards the face or the body\u0027s center line\n- The face and gaze look toward where the attack reaches, not the camera\n- Do not attack with the upper body alone; use the legs and pelvis\n- Keep joint angles anatomically possible\n\n[Fist]\n- The four fingers curl inward\n- The thumb rests on the outside of the four fingers\n- Do not poke fingers out of the fist\n- Place the wrist in line with the forearm\n\n[Open palm]\n- Four fingers plus one thumb, five total\n- Match palm orientation with thumb position\n- Do not spread the fingers extremely\n- Do not over-bend the wrist\n\n[Kick]\n- Plant the supporting leg fully on the floor\n- Keep the supporting leg\u0027s knee slightly relaxed\n- Connect the hip, knee, and ankle of the kicking leg naturally\n- Align the knee and foot tip in the correct direction for the technique\n- Do not flip the sole inward\n- Do not confuse a front kick, knee kick, and roundhouse kick\n\n[Background]\n- Each panel has a uniform light gray background\n- Horizontal light floor plane\n- Weak contact shadow\n- Soft studio lighting\n- A clean 3D anatomy drawing-study look\n\n[01 Front: left lead-hand straight punch]\nCamera at the figure\u0027s front.\nLeft leg forward, right leg back.\nThrust the left fist toward the opponent\u0027s center at shoulder-to-chest height.\nDo not fully lock out the left elbow.\nKeep the right fist by the chin.\nMake the front-back leg offset and pelvis rotation readable even from the front.\n\n[02 Front-right 45 degrees: right rear-hand straight punch]\nCamera at the figure\u0027s front-right 45 degrees.\nThrust the right fist strongly forward.\nConnect the right rear foot, right knee, pelvis, spine, right shoulder, and right fist into one spiral.\nThe left fist guards the face.\nBring the fist into the foreground, but keep the shoulder and elbow connection.\n\n[03 Right side: left step-in palm-heel]\nCamera at the figure\u0027s right side.\nJust after the left foot steps forward and plants.\nDrive the left palm heel toward the opponent\u0027s chest or chin height.\nLeft fingertips pointing up or diagonally up.\nKeep the right fist near the chest.\nFrom the side, show the stride, pelvis movement, spine, shoulder, and the force line into the palm heel.\n\n[04 Rear-right 45 degrees: right hook]\nCamera at the figure\u0027s rear-right 45 degrees.\nThrow a horizontal hook at face height with the right fist.\nBend the right elbow to about 90 degrees.\nPlace the fist, elbow, and shoulder on the same horizontal plane.\nAlign the pivot foot, pelvis, spine, and right shoulder in the same direction of rotation.\nThe left fist guards the face.\n\n[05 Back: left rear elbow]\nCamera directly behind the figure.\nDrive a short, sharp left elbow to the rear-left.\nFold the left fist near the face and make the left elbow the contact point.\nThe right fist guards the body\u0027s center line.\nFrom the back, show the linkage of shoulder blades, spine, pelvis, and supporting leg.\nDo not turn only the neck back toward the camera.\n\n[06 Rear-left 45 degrees: right knee kick]\nCamera at the figure\u0027s rear-left 45 degrees.\nMake the left leg the supporting leg.\nThrust the right knee up toward the opponent\u0027s abdomen.\nFold the right foot naturally under the knee.\nPlant the left sole fully.\nPush the pelvis forward, but do not over-arch the upper body.\nKeep both fists near the face.\n\n[07 Left side: left front kick]\nCamera at the figure\u0027s left side.\nMake the right leg the supporting leg.\nRaise the left knee first, then push forward with the left heel or sole.\nPlace the left hip, knee, ankle, and heel on the same plane of travel.\nKeep the upper body upright and guard the center line with both fists.\nDo not make it a side kick or roundhouse kick.\n\n[08 Front-left 45 degrees: right middle roundhouse kick]\nCamera at the figure\u0027s front-left 45 degrees.\nPivot on the left leg.\nThrow a middle roundhouse kick with the right leg at the opponent\u0027s torso.\nPlace the right knee, right shin, and instep on the same plane of rotation.\nAlign the left pivot foot, pelvis, rib cage, and right leg in the same direction of rotation.\nDo not flip the sole of the kicking foot inward.\nKeep the left fist near the face.\nDo not make it a full horizontal split or dance-like posture.\n\n[Prohibited]\nHair, cap, horns, outfit, coat, gloves, fire, sparks, aura, chains, weapons, enemies,\ncharacter face or color scheme, finished-illustration-style outfit,\nall 8 figures in the same pose, same camera direction, duplicated directions,\nfinishing poses, threatening postures, impractical full splits,\nextra arms or legs, six fingers, missing fingers, fused fingers,\ndouble hands, broken wrists, reversed joints, flipped ankles,\nfloating supporting leg, mismatched knee and foot tip, limbs that look severed from the body,\ntext other than the numbers, technique names, logo, watermark"},{"head":"修正運用","kind":"block","origLang":"ja","ja":"ポーズ資料のXXだけを、同じ白い3D体格マネキンで一枚生成する。\n16:9横長、全身、薄いグレー背景、床面と接地影。\n他番号の動作を混合しない。\n修正点: \u003c具体的な修正内容\u003e","en":"Generate only XX of the pose reference, as a single image with the same white 3D build mannequin.\n16:9 landscape, full body, light gray background, floor plane and contact shadow.\nDo not mix in motions of other numbers.\nCorrection points: \u003cspecific correction details\u003e"}]},{"id":"p15","file":"牙焔_マネキン生成プロンプト.md","character":"gaen","charLabel":"牙焔（ガエン）","title":"牙焔 マネキン生成プロンプト","intro":"牙焔の戦闘構図を検討するための、白い3Dデッサン人形生成用プロンプト。\n使用する参考画像:\n- 牙焔の正本立ち絵\n- 必要に応じて牙焔の三面図または既存戦闘画像\n参考画像は外見を再現するためではなく、体格、頭身、肩幅、手足の長さを読み取るために使用する。","blocks":[{"head":"01 体格マネキン四面図","kind":"block","origLang":"ja","ja":"添付した牙焔の立ち絵を参考に、戦闘構図検討用の白い3Dデッサン人形四面図を作成してください。\n\n【参考画像の役割】\n添付画像は、牙焔の身長感、頭身、肩幅、胸郭、胴回り、骨盤、腕と脚の長さを読み取るための体格資料です。\n髪型、帽子、角、衣装、コート、装飾、炎、色はマネキンへ引き継がないでください。\n\n【出力形式】\n・一枚の横長モデルシート\n・横4列、縦1行の均等な4パネル\n・左から、正面、右側面、背面、左側面\n・各パネルに同一人物のマネキンを一体\n・全パネルで同じ身長、頭身、肩幅、胸郭、骨盤、手足の長さ\n・カメラ距離、人物サイズ、床の高さを統一する\n・人物同士を重ねない\n・頭頂から足先まで完全に収める\n・薄い縦線でパネルを区切る\n・文字、番号、方向名は画像内へ入れない\n\n【体格】\n・20代前半の成人男性型\n・自然なアニメキャラクター向けの約7頭身\n・高身長に見える縦長の身体比率\n・中肉中背\n・標準からやや引き締まった体格\n・肩幅は標準からやや広め\n・胸郭は自然な厚み\n・胴回りと腰は太くしない\n・腕は引き締まっているが太すぎない\n・太腿とふくらはぎは格闘動作を支えられる自然な太さ\n・手足を極端に大きくしない\n・重量級格闘家やボディビルダーにしない\n・細身の美少年体型や中性的な体格にしない\n\n【マネキンの造形】\n・白または明るい灰色のマット樹脂製3Dデッサン人形\n・写実的な皮膚や毛穴を描かない\n・頭部は簡略化された成人男性型\n・頭部、胸郭、骨盤に薄い中心線\n・肩、肘、手首、股関節、膝、足首の関節位置を明確にする\n・筋肉の境界は控えめにし、関節と身体比率を優先する\n・手は五本指を簡潔に分ける\n・両足は閉じた靴型の簡略形状\n\n【立ち姿】\n・自然な直立姿勢\n・頭を水平に保つ\n・顎を軽く引く\n・肩の力を抜く\n・両腕を身体の横へ自然に下ろす\n・手の甲を外側へ向ける\n・両脚は腰幅から肩幅程度\n・両膝と足先を正面へ向ける\n・左右の足へ均等に重心を置く\n・骨盤や肩を傾けない\n\n【背景と照明】\n・均一な薄いグレー背景\n・水平な薄いグレーの床面\n・足元に弱く自然な接地影\n・柔らかなスタジオ照明\n・輪郭と関節が背景へ溶けない陰影\n・クリーンな3D人体デッサン教材\n\n【禁止事項】\n髪、帽子、角、衣装、コート、手袋、装飾品、炎、武器、敵、\n表情差分、ポーズ差分、複数の体格、左右非対称な身体、\n巨大な胸板、太すぎる首、太い胴体、過剰な筋肉、\n細すぎる腰、長すぎる脚、短すぎる腕、\n余分な腕や脚、六本指、融合した指、欠けた指、\n曲がった直立姿勢、異なるカメラ距離、広角歪み、\n文字、番号、ロゴ、透かし","en":"Referring to the attached Gaen standing illustration, create a white 3D drawing-mannequin four-view sheet for studying battle compositions.\n\n[Role of the reference image]\nThe attached image is a build reference for reading Gaen\u0027s sense of height, head ratio, shoulder width, rib cage, torso girth, pelvis, and arm/leg length.\nDo not carry over the hairstyle, cap, horns, outfit, coat, ornaments, fire, or color to the mannequin.\n\n[Output format]\n- A single landscape model sheet\n- 4 even panels in 4 columns x 1 row\n- From left: front, right side, back, left side\n- One mannequin of the same figure per panel\n- Same height, head ratio, shoulder width, rib cage, pelvis, and limb length across all panels\n- Unify camera distance, figure size, and floor height\n- Do not overlap the figures\n- Fit fully from the top of the head to the toes\n- Divide the panels with thin vertical lines\n- Do not put text, numbers, or direction names inside the image\n\n[Build]\n- An adult male type in his early twenties\n- About 7 heads tall, natural for an anime character\n- A vertically long body ratio that looks tall\n- Medium build\n- From standard to slightly toned\n- Shoulder width from standard to slightly broad\n- A natural thickness in the rib cage\n- Do not thicken the torso girth or waist\n- Toned arms, but not too thick\n- Thighs and calves at a natural thickness that can support fighting motion\n- Do not make the hands or feet extremely large\n- Not a heavyweight fighter or bodybuilder\n- Not a slim handsome-boy body or androgynous build\n\n[Mannequin modeling]\n- A matte resin 3D drawing mannequin in white or light gray\n- Do not draw realistic skin or pores\n- A simplified adult male head\n- Faint center lines on head, rib cage, and pelvis\n- Clearly mark the joint positions of shoulders, elbows, wrists, hips, knees, and ankles\n- Keep muscle boundaries subtle; prioritize joints and body proportions\n- Hands simply separated into five fingers\n- Both feet as simplified closed shoe shapes\n\n[Standing pose]\n- Natural upright posture\n- Keep the head level\n- Chin slightly tucked\n- Relaxed shoulders\n- Both arms hanging naturally at the sides\n- Backs of the hands facing outward\n- Feet from hip to shoulder width\n- Both knees and toes pointing forward\n- Weight evenly on both feet\n- Do not tilt the pelvis or shoulders\n\n[Background and lighting]\n- Uniform light gray background\n- Horizontal light gray floor plane\n- A weak, natural contact shadow at the feet\n- Soft studio lighting\n- Shading where the outline and joints do not melt into the background\n- A clean 3D anatomy drawing-study look\n\n[Prohibited]\nHair, cap, horns, outfit, coat, gloves, accessories, fire, weapons, enemies,\nexpression variations, pose variations, multiple builds, left-right asymmetric body,\nhuge chest, too-thick neck, thick torso, excessive muscle,\ntoo-thin waist, too-long legs, too-short arms,\nextra arms or legs, six fingers, fused fingers, missing fingers,\nbent upright posture, differing camera distance, wide-angle distortion,\ntext, numbers, logo, watermark"},{"head":"02 基本格闘構え 八方向","kind":"block","origLang":"ja","ja":"添付した牙焔用の白い3D体格マネキンを使い、同じ基本格闘構えを八方向から確認できるポーズ資料を作成してください。\n\n【参考画像の役割】\n添付したマネキン四面図は、身長、頭身、肩幅、胸郭、骨盤、腕と脚の長さの正本です。\n全8パネルで、この体格を変更しないでください。\n\n【最重要】\n8種類の異なる構えを作るのではありません。\n一つの同じ格闘構えを固定し、カメラだけを人物の周囲へ45度ずつ移動させてください。\n支持脚、足幅、手の高さ、肘の角度、重心、胸郭と骨盤の向きを全パネルで維持してください。\n\n【出力形式】\n・一枚の16:9横長モデルシート\n・上段4パネル、下段4パネル\n・上段左から01、02、03、04\n・下段左から05、06、07、08\n・各パネルにマネキン一体\n・各パネル内に全身、両手、両足を収める\n・手足をパネル境界で切らない\n・カメラ距離と人物の大きさを統一する\n・細い境界線でパネルを区切る\n・各パネル左上に小さく01から08の番号だけを表示する\n\n【カメラ方向】\n01：正面\n02：右前方45度\n03：右側面\n04：右後方45度\n05：背面\n06：左後方45度\n07：左側面\n08：左前方45度\n\n【基本格闘構え】\n・右利きを想定した半身の構え\n・左脚を前、右脚を後ろへ置く\n・両足の間隔は肩幅より少し広い\n・前後の足を一直線へ重ねない\n・左足は前方へ向ける\n・右足は斜め外側へ向ける\n・両膝を軽く曲げる\n・重心を両脚の中央より少し低い位置へ置く\n・両足裏を床へ接地する\n・前脚へ体重を乗せすぎない\n・後脚へ逃げすぎない\n\n・骨盤は真正面ではなく斜めに構える\n・胸郭は骨盤よりわずかに正面へ戻す\n・背骨を自然に立てる\n・上体を前後左右へ倒しすぎない\n・肩を上げない\n・顎を軽く引く\n\n・左拳を前方、顎から胸の高さへ置く\n・右拳を頬から肋骨付近へ置く\n・両拳を顔へ密着させない\n・両肘を軽く曲げる\n・脇を完全に開かない\n・拳の手首を前腕の延長上へ置く\n・親指は四本の指の外側へ添える\n・拳から指を突き出さない\n\n・顔と視線は常に構えの正面方向を見る\n・カメラへ視線を向けない\n・背面カメラでも首を不自然に振り返らせない\n\n【動作の印象】\n・攻撃開始前の静かな構え\n・低い重心\n・前進にも防御にも移れる中間姿勢\n・威嚇のポーズではなく、実用的な格闘姿勢\n・静7、動3\n\n【マネキン表現】\n・白または明るい灰色のマット樹脂製3Dデッサン人形\n・成人男性型、約7頭身\n・牙焔の四面図と同じ中肉中背の引き締まった体格\n・頭部、胸郭、骨盤に薄い中心線\n・肩、肘、手首、股関節、膝、足首を明確にする\n・両手は正しい五本指構造\n・両足は閉じた靴型\n\n【背景】\n・均一な薄いグレー背景\n・薄い床面\n・弱い接地影\n・柔らかなスタジオ照明\n・クリーンな3D人体デッサン教材風\n\n【禁止事項】\n異なる8種類のポーズ、攻撃中の姿勢、蹴り、跳躍、炎、武器、\n髪、帽子、角、衣装、コート、手袋、装飾、\n左右の脚を途中で入れ替える、拳の高さを変える、重心を変える、\nカメラへ顔を向ける、背面で振り返る、\n前後の足を交差させる、浮いた足、伸び切った膝、\n折れた手首、逆関節、余分な腕や脚、六本指、融合した指、\nパネルごとに異なる体格、異なる頭身、異なるカメラ距離、\n番号以外の文字、技名、ロゴ、透かし","en":"Using the attached white 3D build mannequin for Gaen, create a pose reference that shows the same basic fighting stance from eight directions.\n\n[Role of the reference image]\nThe attached mannequin four-view is the master for height, head ratio, shoulder width, rib cage, pelvis, and arm/leg length.\nDo not change this build across all 8 panels.\n\n[Most important]\nThis is not about making 8 different stances.\nFix one single identical fighting stance and move only the camera around the figure by 45 degrees each.\nMaintain the supporting leg, foot width, hand height, elbow angle, center of gravity, and orientation of rib cage and pelvis across all panels.\n\n[Output format]\n- A single 16:9 landscape model sheet\n- Top row 4 panels, bottom row 4 panels\n- Top row from left: 01, 02, 03, 04\n- Bottom row from left: 05, 06, 07, 08\n- One mannequin per panel\n- Fit the full body and both hands and feet within each panel\n- Do not cut limbs at the panel borders\n- Unify camera distance and figure size\n- Divide the panels with thin borders\n- Show only a small 01-08 number in the top-left of each panel\n\n[Camera directions]\n01: Front\n02: Front-right 45 degrees\n03: Right side\n04: Rear-right 45 degrees\n05: Back\n06: Rear-left 45 degrees\n07: Left side\n08: Front-left 45 degrees\n\n[Basic fighting stance]\n- A half-body stance assuming right-handedness\n- Left leg forward, right leg back\n- The gap between the feet is slightly wider than shoulder width\n- Do not stack the front and rear feet in a single line\n- Left foot points forward\n- Right foot points diagonally outward\n- Both knees slightly bent\n- Place the center of gravity slightly lower than the midpoint of both legs\n- Both soles planted on the floor\n- Do not put too much weight on the front leg\n- Do not retreat too much onto the rear leg\n\n- The pelvis is set at an angle, not square to the front\n- The rib cage returns slightly more toward the front than the pelvis\n- The spine stands naturally\n- Do not tilt the upper body too much in any direction\n- Do not raise the shoulders\n- Chin slightly tucked\n\n- The left fist is forward, at chin-to-chest height\n- The right fist is near the cheek to the ribs\n- Do not press both fists against the face\n- Both elbows slightly bent\n- Do not fully open the armpits\n- Place the wrist in line with the forearm\n- The thumb rests on the outside of the four fingers\n- Do not poke fingers out of the fist\n\n- The face and gaze always look toward the front direction of the stance\n- Do not direct the gaze at the camera\n- Even on the rear camera, do not unnaturally turn the neck back\n\n[Impression of the motion]\n- A quiet stance before starting an attack\n- A low center of gravity\n- An intermediate posture ready to shift into either advance or defense\n- Not a threatening pose, but a practical fighting posture\n- Stillness 7, motion 3\n\n[Mannequin expression]\n- A matte resin 3D drawing mannequin in white or light gray\n- Adult male type, about 7 heads tall\n- The same medium, toned build as Gaen\u0027s four-view\n- Faint center lines on head, rib cage, and pelvis\n- Clearly mark shoulders, elbows, wrists, hips, knees, and ankles\n- Both hands with a correct five-finger structure\n- Both feet as closed shoe shapes\n\n[Background]\n- Uniform light gray background\n- Light floor plane\n- Weak contact shadow\n- Soft studio lighting\n- A clean 3D anatomy drawing-study look\n\n[Prohibited]\n8 different poses, attacking postures, kicks, jumps, fire, weapons,\nhair, cap, horns, outfit, coat, gloves, ornaments,\nswitching the left/right legs partway, changing fist height, changing center of gravity,\nfacing the camera, looking back on the rear view,\ncrossing the front and rear feet, floating feet, fully locked knees,\nbroken wrists, reversed joints, extra arms or legs, six fingers, fused fingers,\ndiffering build per panel, differing head ratio, differing camera distance,\ntext other than the numbers, technique names, logo, watermark"}]},{"id":"p16","file":"牙焔_マネキン経由戦闘構図ワークフロー.md","character":"gaen","charLabel":"牙焔（ガエン）","title":"牙焔 マネキン経由戦闘構図ワークフロー","intro":"牙焔の戦闘構図を、固有技や炎エフェクトからではなく、体格、重心、関節、基本動作から再設計する。\n制作順は次の通り。\n1. 立ち絵から体格を抽出し、マネキン四面図を作る。\n2. 基本構えを八方向から確認する。\n3. 打撃、蹴り、受け、移動、回転、空中動作をマネキンで網羅する。\n4. 良い構図を牙焔へキャラクター化する。\n5. 最後に固有技と炎エフェクトを加える。\n固有技を先に作ると、技名とエフェクトに身体が引っ張られ、足首、指、支持脚、武器の接続が崩れやすい。先に「牙焔が自然に取れる身体動作の辞書」を作り、その上へ技を構築する。\n- **牙焔の立ち絵**: 顔、年齢、体格、頭身、衣装、帽子、角、配色の正本。\n- **マネキン四面図**: 衣装を外した身体比率と関節位置の正本。\n- **ポーズマネキン**: 姿勢、支持脚、重心、カメラ方向、手足の前後関係の正本。\n- **戦闘構図ガイド**: 遠近、武器、指、エフェクト、生成後検品の補助資料。\n- **文章プロンプト**: 動作の目的、瞬間、視線、運動方向、禁止事項を定義する。\n関連資料:\n- [牙焔 正本ビジュアル参照](../01_reference/正本ビジュアル参照.md)\n- [牙焔 戦闘構図ガイド](./牙焔_戦闘構図ガイド.md)\n- [牙焔 マネキン生成プロンプト](./牙焔_マネキン生成プロンプト.md)\n- [牙焔 マネキンからキャラクター再現プロンプト](./牙焔_マネキンからキャラクター再現プロンプト.md)\n- [牙焔 マネキン実戦基礎動作 八方向プロンプト](./牙焔_マネキン実戦基礎動作_八方向プロンプト.md)\n- [牙焔 マネキン実戦動作 キャラクター変換プロンプト](./牙焔_マネキン実戦動作_キャラクター変換プロンプト.md)\n- [牙焔 実戦基礎動作 八方向プロンプト](./牙焔_実戦基礎動作_八方向プロンプト.md)\n衣装の見た目ではなく、その下にある身体を推定する。\n- 20代前半の成人男性。\n- 高身長だが重量級ではない。\n- 自然なアニメ調の約7頭身。\n- 中肉中背から、やや引き締まった体格。\n- 肩幅は標準からやや広め。\n- 胸板、腕、太腿を過剰に太くしない。\n- 胴回りは細めに保ち、縦長のシルエットを作る。\n- ボディビルダー、重量級格闘家、細身の美少年にしない。\n- 強さは筋肉量ではなく、骨盤の安定、姿勢、鋭い視線で表す。\n一枚の横長資料へ、同じマネキンを四体並べる。\n1. 正面\n2. 右側面\n3. 背面\n4. 左側面\nすべて自然な直立姿勢とし、カメラ距離、人物サイズ、足位置を統一する。","blocks":[{"head":"四面図プロンプト","kind":"prompt","origLang":"ja","ja":"添付した牙焔の立ち絵から、衣装の下にある身体比率を抽出し、\n同一人物の白い3Dデッサン人形四面図を作成する。\n\n一枚の横長画像を4分割し、左から正面、右側面、背面、左側面。\n全パネルで同じ頭身、身長、肩幅、胸郭、骨盤、手足の長さを維持する。\n人物の大きさ、足元の高さ、カメラ距離をそろえる。\n\n成人男性、20代前半、自然なアニメ調約7頭身。\n高身長だが重量級ではない。\n中肉中背で、標準からやや引き締まった体格。\n肩幅は標準からやや広め、胴回りは太くしない。\n腕、胸、太腿をボディビルダーのように肥大させない。\n\n白いマット樹脂製の3Dデッサン人形。\n頭部、胸郭、骨盤に薄い中心線。\n肩、肘、手首、股関節、膝、足首を明確にする。\n髪、帽子、角、衣装、コート、装飾、炎は付けない。\n両手は自然に下ろし、両足は肩幅程度。\n薄いグレー背景、弱い床面、薄い接地影。","en":"From the attached Gaen standing illustration, extract the body proportions beneath the outfit and create a white 3D drawing-mannequin four-view of the same person.\n\nDivide a single landscape image into 4; from left: front, right side, back, left side.\nMaintain the same head ratio, height, shoulder width, rib cage, pelvis, and limb length across all panels.\nAlign the figure size, foot height, and camera distance.\n\nAdult male, early twenties, about 7 heads tall in a natural anime style.\nTall but not heavyweight.\nMedium build, from standard to slightly toned.\nShoulder width from standard to slightly broad; do not thicken the torso girth.\nDo not enlarge the arms, chest, or thighs like a bodybuilder.\n\nA white matte resin 3D drawing mannequin.\nFaint center lines on head, rib cage, and pelvis.\nClearly mark shoulders, elbows, wrists, hips, knees, and ankles.\nDo not add hair, cap, horns, outfit, coat, ornaments, or fire.\nBoth hands hanging naturally, feet about shoulder width.\nLight gray background, weak floor plane, faint contact shadow."},{"head":"八方向プロンプト","kind":"prompt","origLang":"ja","ja":"承認済みの牙焔体格マネキンを使い、同じ基本格闘構えを八方向から示す。\n一枚の比較用モデルシートに8パネルで配置する。\n各パネルは同一ポーズを、人物の周囲45度刻みのカメラから見る。\n\nポーズを回転させず、カメラだけを移動する。\n全パネルで支持脚、手の高さ、足幅、重心、頭身を維持する。\n髪、衣装、帽子、角、炎、武器は付けない。","en":"Using the approved Gaen build mannequin, show the same basic fighting stance from eight directions.\nArrange them in 8 panels on a single comparison model sheet.\nEach panel shows the same pose, viewed from a camera moving around the figure in 45-degree increments.\n\nDo not rotate the pose; move only the camera.\nMaintain the supporting leg, hand height, foot width, center of gravity, and head ratio across all panels.\nDo not add hair, outfit, cap, horns, fire, or weapons."},{"head":"参考画像の役割","kind":"block","origLang":"ja","ja":"参考画像1: 牙焔の正本立ち絵。顔、年齢、体格、髪、帽子、角、衣装、配色の正本。\n参考画像2: 承認済みマネキン。姿勢、支持脚、重心、関節、手足の前後関係、カメラ方向の正本。","en":"Reference image 1: Gaen\u0027s master standing illustration. The master for face, age, build, hair, cap, horns, outfit, and color scheme.\nReference image 2: the approved mannequin. The master for posture, supporting leg, center of gravity, joints, front-back relationship of the limbs, and camera direction."},{"head":"出力形式","kind":"block","origLang":"ja","ja":"複数の動作を一枚へ並べない。\nモデルシート、グリッド、分割パネル、コラージュにしない。\n16:9横長、均一な白背景、敵なし。","en":"Do not line up multiple motions in one image.\nDo not make a model sheet, grid, split panels, or collage.\n16:9 landscape, uniform white background, no enemies."},{"head":"第5段階 固有技への展開","kind":"block","origLang":"ja","ja":"固有技 = 基本動作 + 重心変化 + 遠近 + エフェクト + 技固有の手または武器","en":"signature technique = basic motion + change in center of gravity + perspective + effects + technique-specific hand or weapon"},{"head":"マネキン用共通プロンプト","kind":"prompt","origLang":"ja","ja":"完成イラストではなく、戦闘構図確認用の白い3Dデッサン人形。\n牙焔の承認済み体格マネキンを使用する。\n\n成人男性、20代前半、自然なアニメ調約7頭身。\n高身長だが重量級ではない。\n中肉中背、標準からやや引き締まった体格。\n\n頭部、胸郭、骨盤に薄い中心線。\n肩、肘、手首、股関節、膝、足首を明確にする。\n両手は五本指。掌の向きと親指の位置を一致させる。\n両足は簡略化した閉じた靴型。\n\n髪、帽子、角、衣装、コート、装飾、炎、武器、敵は描かない。\n薄いグレー背景、薄い床面、接地影。\n全身、両手、両足を収める。\n関節を人体として不可能な方向へ曲げない。","en":"Not a finished illustration, but a white 3D drawing mannequin for checking battle composition.\nUse Gaen\u0027s approved build mannequin.\n\nAdult male, early twenties, about 7 heads tall in a natural anime style.\nTall but not heavyweight.\nMedium build, from standard to slightly toned.\n\nFaint center lines on head, rib cage, and pelvis.\nClearly mark shoulders, elbows, wrists, hips, knees, and ankles.\nBoth hands with five fingers. Match palm orientation with thumb position.\nBoth feet as simplified closed shoe shapes.\n\nDo not draw hair, cap, horns, outfit, coat, ornaments, fire, weapons, or enemies.\nLight gray background, light floor plane, contact shadow.\nFit the full body and both hands and feet.\nDo not bend joints in anatomically impossible directions."},{"head":"ポーズ指定テンプレート","kind":"block","origLang":"ja","ja":"動作名:\n動作の目的:\n動作の瞬間:\nカメラ方向:\n技の進行方向:\n支持脚:\n離地する足:\n重心:\n骨盤の向き:\n胸郭の向き:\n前の手:\n後ろの手:\n顔と視線:\n遠近:\n静と動:\n重点確認する関節:\n禁止する類似動作:","en":"Motion name:\nPurpose of the motion:\nMoment of the motion:\nCamera direction:\nDirection the technique travels:\nSupporting leg:\nFoot leaving the ground:\nCenter of gravity:\nPelvis orientation:\nRib cage orientation:\nFront hand:\nRear hand:\nFace and gaze:\nPerspective:\nStillness vs. motion:\nJoints to check carefully:\nSimilar motions to prohibit:"},{"head":"保存方針","kind":"block","origLang":"en","ja":"01_reference/\n  Gaen_build-mannequin_four-view.png\n\n03_outputs/\n  mannequin/\n    stance/\n    strikes/\n    kicks/\n    defense/\n    movement/\n    rotation/\n    aerial/\n  character/\n  techniques/","en":"01_reference/\n  牙焔_体格マネキン四面図.png\n\n03_outputs/\n  mannequin/\n    stance/\n    strikes/\n    kicks/\n    defense/\n    movement/\n    rotation/\n    aerial/\n  character/\n  techniques/"},{"head":"保存方針","kind":"block","origLang":"ja","ja":"牙焔_マネキン_基本構え_八方向.png\n牙焔_マネキン_中段回し蹴り_右前45度.png\n牙焔_基礎動作_中段回し蹴り_白背景.png\n牙焔_固有技_炎脚回転蹴り_v01.png","en":"Gaen_mannequin_basic-stance_eight-direction.png\nGaen_mannequin_middle-roundhouse-kick_front-right-45.png\nGaen_basic-motion_middle-roundhouse-kick_white-bg.png\nGaen_signature_flame-spin-kick_v01.png"}]},{"id":"p17","file":"牙焔_基本立ち絵プロンプト.md","character":"gaen","charLabel":"牙焔（ガエン）","title":"牙焔 基本立ち絵プロンプト","intro":"キャラクターの正面性、服装、体格、色設計を固めるための基本立ち絵。\n最初の生成ではこのプロンプトを優先する。\n---","blocks":[{"head":"■ Prompt","kind":"prompt","origLang":"en","ja":"牙焔（ガエン）の全身キャラクターコンセプトアート。地獄界の喧嘩屋の青年男性で、見た目は明らかに20代前半、中肉中背、平均〜引き締まった体型、鍛えてはいるが筋肉質すぎない、鋭く威圧的な目、荒々しい不良の雰囲気、守るが危険。顔は若いが少年っぽくはない。笑わない20代前半の不良武術家で、影の落ちた目元、より硬い威圧的な睨み、わずかに緊張した眉、荒々しい不良顔、頬 faintly around his fists and shoulders, with ember sparks, heat shimmer, scorched air, and a faint molten glow. The mood is intense, blunt, and defiant, not evil. His expression is a scowl with hidden kindness, a reckless guardian who protects the weak by standing in front.\n\nAnime light novel character illustration, clean linework, high detail, dramatic but readable silhouette, dark charcoal and black color palette with deep crimson accents, ember orange highlights, neutral simple background, full body visible, no text, no logo, no watermark."},{"head":"■ Negative Prompt","kind":"negative","origLang":"en","ja":"子供、ティーンの少年、中年男性、老人、老けた顔、深い皺、重く角ばった顎、過度に成熟した荒々しい顔、柔らかく穏やかな顔、優しく微笑む顔、丸くかわいい目、甘いアイドル表情、清潔なアイドル顔、美少年顔、中性的な綺麗な少年、痩せた身体、ボディビルダー体型、太い胴体、過大な胸板、巨大な腕、太い腰、いかつい肩、大柄で筋肉質な身体、優雅な王子、洗練された紳士、上品な貴族、整いすぎた礼服、上級軍服、アイドル風、ホスト風、ファッションモデルのポーズ、ありがちな魔王、中世の鎧、ファンタジーの王、こめかみの角、頭頂中央の角、非対称の角、片方だけの角、過大な角、巨大な翼、尻尾、獣耳、剣、銃、槍、青い炎、純白の聖なるオーラ、バイカーのレザースーツ、過剰なタトゥー、過剰な宝飾、露出の多い衣装、セクシーなポーズ、邪悪な笑み、怪物形態、ちび、マスコット、文字、ロゴ、透かし、ぼやけ、見切れた身体、余分な手足、歪んだ手","en":"child, teenage boy, middle-aged man, old man, aged face, deep wrinkles, heavy square jaw, overly mature rugged face, soft gentle face, kind smiling face, round cute eyes, sweet idol expression, clean idol face, bishonen face, androgynous pretty boy, skinny body, bodybuilder physique, bulky torso, oversized chest, huge arms, thick waist, massive shoulders, large muscular body, elegant prince, refined gentleman, graceful noble, polished formal uniform, high-class military uniform, idol look, host-club look, fashion model pose, generic demon lord, medieval armor, fantasy king, horns on temples, horns on top center of head, asymmetrical horns, one horn, oversized horns, huge wings, tail, animal ears, sword, gun, spear, blue flame, pure white holy aura, biker leather suit, excessive tattoos, excessive jewelry, revealing outfit, sexy pose, evil grin, monster form, chibi, mascot, text, logo, watermark, blurry, cropped body, extra limbs, distorted hands"}]},{"id":"p18","file":"牙焔_実戦基礎動作_八方向プロンプト.md","character":"gaen","charLabel":"牙焔（ガエン）","title":"牙焔 実戦基礎動作 八方向プロンプト","intro":"キャラクター化する前に、[牙焔 マネキン実戦基礎動作 八方向プロンプト](./牙焔_マネキン実戦基礎動作_八方向プロンプト.md)で身体構造を確認する。\nマネキン資料が完成した後は、[牙焔 マネキン実戦動作 キャラクター変換プロンプト](./牙焔_マネキン実戦動作_キャラクター変換プロンプト.md)を使用する。\n`GPT出力イラスト_牙焔`へ出力した8枚は、牙焔の顔、帽子、角、体格、衣装、ブーツの再現資料として使用できる。\nただし、カメラ方向は十分に八方向化されていない。\n- 01から04は、ほぼ同じ斜め前の構図。\n- 05は背面構図として有効。\n- 06から08も、ほぼ同じ斜め前の構図。\n- 足幅、拳の高さ、体格、衣装はおおむね安定。\n- コート裾の間から両脚が確認でき、基礎資料として使いやすい。\n次段階では、一つの静止構えを回転させるのではなく、八方向それぞれへ異なる実戦動作を割り当てる。\n牙焔に適した基本打撃と蹴りを、全周のカメラ方向から収集する。\nこれは固有技集ではない。炎、鎖、技名、魔法表現を加える前の、身体動作と構図の基礎資料である。\n八方向で次の要素を網羅する。\n- 正面から見た直線打撃。\n- 斜め前から見た全身連動。\n- 側面から見た踏み込みと間合い。\n- 斜め後ろから見た肩、背骨、骨盤の回転。\n- 背面から見た肘打ち。\n- 反対側後方から見た膝蹴り。\n- 反対側面から見た前蹴り。\n- 斜め前から見た回転蹴り。\n1. 牙焔の正本立ち絵。\n2. 牙焔の体格マネキン四面図。\n3. 牙焔の基本格闘構え画像。\n4. 必要な場合は、対応する白いポーズマネキン。","blocks":[{"head":"使用する参考画像","kind":"block","origLang":"ja","ja":"参考画像1は、顔、年齢、髪、帽子、角、衣装、手袋、ブーツ、配色の正本。\n参考画像2は、身長、頭身、肩幅、胴回り、骨盤、手足の長さの正本。\n参考画像3は、牙焔の基準となる戦闘時の外見、足幅、低い重心の参考。\n参考画像4は、指定動作の姿勢、支持脚、関節、手足の前後関係の正本。","en":"Reference image 1 is the master for face, age, hair, cap, horns, outfit, gloves, boots, and color scheme.\nReference image 2 is the master for height, head ratio, shoulder width, torso girth, pelvis, and limb length.\nReference image 3 is a reference for Gaen\u0027s baseline combat appearance, foot width, and low center of gravity.\nReference image 4 is the master for the specified motion\u0027s posture, supporting leg, joints, and front-back relationship of the limbs."},{"head":"共通プロンプト","kind":"prompt","origLang":"ja","ja":"添付した参考画像を使用し、牙焔の実戦的な基本打撃と蹴りを作成してください。\n\n【最重要：出力方法】\n01から08を、必ず8枚の独立した画像として一枚ずつ生成する。\n一枚に複数動作を並べない。\nモデルシート、グリッド、分割パネル、コラージュにしない。\n一枚につき牙焔一人、一つの動作だけを描く。\n\n【制作目的】\n固有技や炎を加える前に、牙焔の実戦的な身体動作を確認する。\n威嚇用の決めポーズではなく、攻撃が相手へ届く途中または直前の瞬間を描く。\n格闘技として支持脚、重心、間合い、全身連動が成立していることを優先する。\n\n【牙焔の固定外見】\n・20代前半の成人男性\n・高身長だが重量級ではない\n・自然なアニメ調約7頭身\n・中肉中背、標準からやや引き締まった体格\n・肩幅は標準からやや広め\n・胴回り、胸板、腕、太腿を過剰に太くしない\n・黒い短髪、片目へかかる前髪\n・鋭い赤い目\n・不機嫌で集中した表情\n・目深に被った黒い帽子\n・帽子から突き出る短い鬼角二本\n・黒基調の学ラン風ロングコート\n・深紅のライン\n・黒い手袋\n・黒い編み上げブーツ\n\n【身体動作】\n・攻撃の力を、接地足から骨盤、背骨、肩または股関節へ連続させる\n・支持脚を明確にする\n・膝とブーツのつま先を同じ方向へ向ける\n・肩、肘、手首を自然につなげる\n・股関節、膝、足首を自然につなげる\n・上体だけで攻撃せず、骨盤と脚を使う\n・攻撃していない手は顔または身体の中心線を守る\n・顔と視線はカメラではなく攻撃の到達方向を見る\n\n【拳と手袋】\n・拳の親指を四本の指の外側へ添える\n・拳から指を突き出さない\n・手首を前腕の延長上へ置く\n・左右の手袋を維持する\n・手袋から素手の指を二重に描かない\n\n【蹴りとブーツ】\n・支持脚と蹴り脚の両方に同じブーツを維持する\n・裸足や別の靴へ変更しない\n・蹴り脚の膝、脛、踵、つま先を同じ運動面へ置く\n・ブーツの輪郭で接触部位と足首の向きを示す\n・足裏を内側へ反転させない\n\n【コート】\n・コートは身体より少し遅れて、運動方向の逆側へ流す\n・肩、肘、骨盤、膝、足首をコートで完全に隠さない\n・前後の脚が判別できるように裾を分ける\n・裾を腕、脚、炎と融合させない\n・回転動作では一つの大きな弧へまとめる\n\n【画像仕様】\n・16:9横長\n・均一な白背景\n・敵、標的、他の人物なし\n・全身、帽子、角、両手、両足、コート裾を画面内に収める\n・攻撃方向へ余白を取る\n・床、接地影、風景、建物を描かない\n・文字、番号、技名、ロゴ、透かしを入れない\n\n【この段階では使わないもの】\n炎、火花、熱歪み、オーラ、鎖、武器、爆発、固有技の演出。\nまず身体動作だけを明確にする。\n\n【禁止事項】\n巨大な角、帽子なし、翼、尻尾、獣耳、長髪、\n重量級、ボディビルダー、中年男性、細身の美少年、\n剣、銃、鎧、炎、敵、背景風景、\n余分な腕や脚、六本指、融合した指、二重の手、\n折れた手首、逆関節、反転した足首、浮いた支持脚、\n膝と足先の不一致、足とブーツの分離、\nカメラ目線、身体から切断して見える前景の拳や足","en":"Using the attached reference images, create Gaen\u0027s practical basic strikes and kicks.\n\n[Most important: output method]\nAlways generate 01 to 08 as 8 independent images, one at a time.\nDo not line up multiple motions in one image.\nDo not make a model sheet, grid, split panels, or collage.\nDraw only one Gaen and one motion per image.\n\n[Production purpose]\nCheck Gaen\u0027s practical body motion before adding signature techniques or fire.\nDraw the moment mid-way through or just before an attack reaches the opponent, not a threatening finishing pose.\nPrioritize that the supporting leg, center of gravity, distancing, and full-body linkage are established as martial arts.\n\n[Gaen\u0027s fixed appearance]\n- An adult male in his early twenties\n- Tall but not heavyweight\n- About 7 heads tall in a natural anime style\n- Medium build, from standard to slightly toned\n- Shoulder width from standard to slightly broad\n- Do not over-thicken the torso girth, chest, arms, or thighs\n- Black short hair, bangs over one eye\n- Sharp r
